body:
  text: 姑蘇堯峯蘭若沙門遵式述二答外問中二初問中二初上書致意劉公致問致立也遠法師傳云劉程之字仲思彭城人漢楚元王之裔承積慶之沖粹體方外之虗心百家淵談靡不遊目精研佛理以盡斯妙晉文帝義熙中曾宰江州柴桑縣後棄宦林藪高尚隱趣即居廬阜朋親遠師十有二年卒因生上人入關從學回乃以般若無知論示之劉公歎曰不意方袍復有平叔因呈之遠師乃撫機歎曰未嘗有也今致問者下云但暗者難以頓曉猶有餘疑一兩此亦叩擊玄微欲自他無昧於真旨耳因先有書敘通問意今此四字為題乃後人節段於後亦猶譯者品分於經段焉遺民未見傳文疑其隱山自稱之名必然矣和南致敬之辭頃䬸徽聞去呼徽美也釆于盛德故曰徽聞有懷遙佇遙有佇望之懷歲末寒嚴十二月書體中如何音寄雍隔秦晉不通故增用抱蘊用者樊仰也懷抱蘊積於思詠弟子沉痾草澤常有弊瘵耳痾瘵皆病病時故也因慧明道人北遊廬阜望長安曰北裁通其情作書通意也古人不以形踈致淡悟涉則親古人如此今何不然下云是以雖復江山悠邈不面當年形疏至於企懷風味企望也君子之德如風教有義故曰味鏡心象迹心向師之教迹如鏡對於物象佇悅之勤良以深矣緬遠也然無因秦晉遠隔無因相見瞻霞永歎瞻嚮如在雲霞永歎不息順時愛敬冀因行李履同古時字少數有承問人來望音欲承其問伏願此下伸意譯場高德彼大衆逍遙園衆康和外國法師常休納丘慈羅什北竺跋陀等尋常納休美上人指論主以悟發之器而遘遇也茲淵對對羅什深談想開究之功開解研究於般若義也足以盡過半之思繫詞云智者觀其彖詞思過半矣解已過半也故以每惟乖闊隔遠也憤愧恨也何深深歎恨也此山僧敘廬嶽勝事清常道戒彌厲彌多也厲策也戒行多策勤禪隱之餘則惟研究至理惟講論教義恂恂穆穆王肅注論語云恂恂恭貌也穆穆和也行謹而同六和故曰恂恂穆穆故可樂落音矣悅服其事故弟子既以遂宿心昔有林泉之心今已遂遁而覩茲上軌又見蓮社清節感寄之誠寄託有感日月銘至銘記也至極也心誠不昧以日月為銘故遠法師頃恆履宜思業精詣乾乾宵夕易云九三君子終日乾乾夕惕若厲無咎乾健也進趣不息自非道用潛流理為神御心神詣至理孰以過順之年孰何也孔子云六十而耳順湛氣若茲之勤神氣不疲蓋資道德所以憑慰愛也既深仰謝逾絶謝之不已去年夏末始見生上人示無知論才運清旨中沈尤深契至理推涉聖文婉而有歸援引諸經各有所詣披味殷勤不能釋捨也手真可謂浴心方等之淵歎此教義是大乘方等真乘如淵流可以浴滌心塵使除染著而悟懷絶冥之肆者矣又如市肆可以觀鑒虗實破三乘冥昧決乎權疑若令此辨遂通則般若衆流般若有八部大品小品放光光讚道行文殊問金剛實相故曰衆流殆且也不言而會可不欣乎可不欣乎且不待言議而可解會重言者欣之至也然夫理微者辭險高峻曰險詮旨深故辭高唱獨者應希少也事出文選陽春白雪之詞唱高而和寡苟非絶言象之表者者人也自非得意之人焉契言象之外將以存象而致乖乎存言象則乖意趣也意謂答以緣求智之章婉轉美而連環窮盡極為精巧義盡精詣文並巧美無所間然矣但暗者敘問意也自謙曰暗昧之者難以頓曉猶有餘疑一兩一兩條疑向下伸述今輒題之如別別紙想從容之暇間也復能粗略也為釋之二正致疑問三初牒疑文論序云劉公指前標宗已下問答之前為論序云也般若之體非有非無虗不失照照不失虗故曰不動等覺而建立諸法前云其為物也實而不有等文下章云前十八章問答中云異乎人者神明故不可以事相求之耳答體用中文也又云第十八章中文用即寂寂即用實也神彌靜應逾動權也此上文義如前已釋劉公見文理相違故牒此為問端也二陳疑問二初通致問二別致問者然通別二問即康法師科或有云前是從來疑後是當論疑文中云常所彌昧故曰從來書無明文又似疑者之過越劉公乃遠法師之座賓豈不能開決所疑不遠於千里而求悟也蓋抑揚論旨窮詰幽微以曉於未來此如先佛會中本高迹下諸大士也今既先牒本論疑文次開通別二問文義連續理必如此常所彌昧亦疑者自謙之通語就通致問中二初敘所疑文二初總夫聖心冥寂理極同無此下總問前般若體用今敘述之文皆順正理但後有所疑之辭今先明體言聖心者標權實也冥寂者顯體也冥暗也六合冥然千差都泯權實歸體寂而虗焉故曰冥寂理者道理也同無者似太虗也虗空略有二義一平等而住二體無生滅故智體道理窮極亦爾此即敘前般若之體非有非無等也不疾而疾不徐而徐此疑用也疾速也徐緩也南華云不徐不疾得之於手應之於心口不能言也今敘全體智用言其體則不徐不疾語其用乃而徐而疾有感則應故疾未感未應故徐不可測故二別是以知不廢寂寂不廢知未始不寂未始不知此敘實智體用廢險也知即用也寂即體也上二句明體用不相失下二句明相即知時即寂故未始不寂寂時即知故未始不知此疑前用即寂寂即用文也故其運物成功化世之道雖處有名之中而遠與無名同此敘權智體用也運物成功者先明其用聖人運悲願以拯物為功業為成此業故化世令進獲出世之益此行利他之因故名曰道雖處有名之中者牒上用也佛具十號百億垂形現同類之名相演同類之言音種種差別一一不同即處有名而能應之體本寂故與無名無相同也此疑前應逾動二陳能疑斯理之玄固常所彌昧者矣斯理者指上所敘體用道理也玄者深也理深難曉固與故同即所以也彌甚也由寂用難同有無不並此理難曉所以常有昧心若觀前敘疑之文豈不知體用深旨此乃假設疑詞以開未悟也二別致問中二初呈疑但今談者所疑於高論之旨欲求聖心之異但語詞也談者即劉公指談論之人也疑論中所説聖心權實體用有無有異故致下三問二致問三初體用必有何無問三初敘述疑意二初敘體為謂窮靈極數妙盡冥符耶此初問因前所説體非有無用寂相即動靜同時理既幽玄故今先敘定而問也此先定體言為謂者審定之辭先即極也靈知即智數也妙盡者智體無知也冥符者智體無知即與無相理冥合也耶疑詞也疑意云為當窮極智數妙盡知照之相冥符虗無之理故曰體無知耶二敘用為將心體自然靈怕獨感耶次定用也為將亦審定之辭心體靈怕並智也自然者無所作為也獨感者常途説感屬生應屬聖今明聖心唯自感悟無所應化曰獨感意謂為當心體無所作為智用獨自感悟乃曰用無應耶據此所敘般若無知為體無作為用甚得玄旨但向下別有疑情耳二牒問體用文二初難體屬定慧若窮靈極數妙盡冥符牒上智體同無則寂照之名故是定慧之體耳劉公意謂冥符體上必有靈照不昧故欲立寂照定慧之名而詮召之由此故情解未亡即乖法體故論主向下不許也二難用當息應若心體自然靈怕獨感牒上無為之用則羣數之應固以幾乎息矣羣數者隨機不一之智為能應幾者將近也息止也劉公雖知靈照無心未達無心普應故疑寂怕自然則應化之心近於止息矣此乃錯謂無心為不應故論主向下不許三牒上請答夫心數既玄而孤運其照此牒上敘體雖心體虗玄而靈照孤運故欲召之為寂照神淳智用自然化表獨感不化曰化表而慧明獨存既無心應用慧明自悟故曰獨存此牒上敘用也然據劉公已達般若寂照為體無作為用深得玄旨但不合立寂照之名為體用中以無心為不應此乃故問以為將來下請答當有深證可試為辨之請意云論主一向以無知為體無應為用必當深有證見且為辨析之二照用空有不同問四初呈疑疑者當以撫會應機覩變之知不可謂之不有矣此因前云俯仰順化應接無窮而無照功疑云既撫會應機必有知照何謂而無照功故曰不可謂之不有不有即無知也二引論而論旨云本無惑取之知而未釋所以不取之理前第一問答中所説本無惑取之知之義今劉公牒文為疑若為本無惑取故曰無知者而論主未釋不取之理有何所以三正難二初開兩關謂宜先定聖心所以應會之道欲定聖心知有知無方可明應會之所以為當唯照無相耶一向照理即知無也為當咸覩其變耶變即萬變事法一向達事故即照有也二明互違若覩其變則異乎無相照事則事有相與無相之理有異若唯照無相則無會可撫照理則理空寂故無應會撫接衆生故下論主答云豈復真偽殊心空有異照耶既無會可撫而有撫會之功既無心接物何以前明聖心有撫接應會之功前所謂俯仰順化等則必須有知不可云無知四請答意有未悟幸復誨之悟曉也未曉應而無知之旨幸乞訓誨開示也三是當是非悟惑問四初牒前論論云無當則物無不當無是則物無不是物無不是故是而無是物無不當故當而無當此文已釋今先牒之二敘所解夫無當而物無不當乃所以為至當劉公已知真境無相之相為至極當對也無是而物無不是乃所以為真是又知真智無知之知此為真實是當之智此上皆領悟也但不曉拂迹云是而無是當而無當故有疑也今先敘所解然後致疑三致疑問文二初是非問豈有真是而非是至當而非當而云當而無當是而無是耶疑云論主對至當説非當故云當而無當又對真是立非是故云是而無是耶之一字即疑辭也二悟惑問若謂至當非常當真是非常是此蓋悟惑之言本異耳常是常當者泛常境智也本者從來義劉公又疑論中約悟達者説前至當真是約迷惑者説今常是常當既悟惑有異乃云是而無是當而無當若然者則一悟一惑從來自異何必言之四求示誨固論旨所以不明也固者承上之詞雖以是非悟惑疑其所説如此尚未明決定之義故曰不明願復重喻以祛其惑矣喻明也祛遣也願論主再為明之遣迷惑之心也三總結問二初敘宗乘結問論至日至廬山日也即與遠法師詳省之劉公在白蓮社故與遠法師同見此論詳而尋省法師亦好句去呼相領得意遠師亦好尚此文兼領得意趣此上明解同下明疑異但標位似各有本標位者標指師承之位也各有本者宗各有本然般若論最為先作劉公未見前五名一義之宗故自云論主師羅什以一音為宗劉公師遠法師以法性為宗宗本各別故有所疑也或當平不必理盡同矣連為一句讀或當者恐也即疑辭意謂師承各別或恐見理不必盡同故有所不曉乃致前問也二敘同友結問頃兼以班諸有懷句屢有擊其節者而恨不得與斯人同時也頃者向也非唯遠法師同問兼諸友人疑意亦然也班分布也有懷者懷道同人也擊節者扣擊節要也者即人也斯人者彼指論主也謂得此論日又分布示諸同人屢有扣擊節要之者皆有所恨不得與論主同處一時而決所疑也二釋答文二初回書敘答法師釋答論主釋答前問亦先有書敘答意此亦後人題之耳不面在昔佇想用勞慧明道人至得去年十二月疏疏也疏通情意即前書也并問披尋返覆欣若暫對如暫面對涼風屆節頃常如何爾雅云北風曰涼秋風多北貧道自謙也乏道德曰貧道勞疾勤勞未息患不知道故多不佳耳佳勝也信書也南返不悉不備悉也返復南方故八月十五日釋僧肇疏答古者書有廣略此上略陳下廣云服像雖殊雖僧俗像異服飾亦殊妙期不二微妙為期彼此不二江山雖緬遠也理契即鄰近也所以望途致想虗𢙿心也虗自心致想有寄如有所託君既遂嘉遁之志遁隱也標越俗之美獨恬心靜曰恬事外歡足方寸塵外之歡足悅於心心曰方寸每一言集聚也何嘗不遠指彼聚集言論何有不遠喻林下之雅詠高致悠然喻比也悠然遠也晉有七賢即劉靈向秀等俱隱山陽竹林高遠雅詠劉君比之亦然清散未期未期相見厚自保愛每因行李數有承問願彼山僧祝頌廬山清衆無恙爾雅云恙憂也安曰無恙道俗通佳遠師領徒七百於時周續之靁次宗等入蓮社故曰道俗佳者勝也承遠法師之勝常以為欣慰道行異常雖未清承清心承稟然服膺高軌企佇之勤為日久矣佇望日久公遠公以過順之年湛氣彌厲彌多也厲勤也養徒幽巖抱一沖谷抱一者心契一乘玄門沖深也遐邇遠近也仰詠何美如之每亦翹想一隅方也想遠師所居懸庇霄岸如在雲霄之下承彼庇廕故無由寫敬致慨歎也良深君清對終日快有悟心之歡也劉君清對遠師故有悟心之歡悅即此大衆尋常答前問逍遙園事什法師如宜常也秦王後秦第二主諱興道性自然道法自然秦王得之天機邁俗邁超也城塹三寶城下河曰塹此護其城故可比秦王護三寶也弘道是務以弘道為務由使異典下云新經二百餘部勝僧下文可見方始也遠而至靈鷲之風萃於茲土昔日世尊説上乘於靈鷲山真風玄範今並聚於秦國領公遠舉往也支法領往西土取經乃千載之津梁橋梁可以渡流溺比至教可以越塵勞故曰津梁也於西域還得方等新經二百餘部古華嚴等經請大乘禪師一人即佛度跋陀羅此云覺賢善得大乘禪觀故於時慧觀慧嚴等於西域請一大德東歸彼諸德曰非佛陀餘人不可遂共來之長安後廬山遠法師迎接人山翻譯禪經從其稟受後於揚州謝司空寺譯古華嚴經三藏法師一人雖解通三藏而傳譯律乘即弗若多羅毗婆沙法師二人論師譯毗婆沙論即曇摩掘多與曇摩耶舍什法師於大石寺出新至諸經法藏淵曠日有異聞即法華金剛等經禪師於瓦官寺教習禪道門徒數百三四已上皆數徒者屬也教習禪心道業夙夜匪懈毛詩次句云以事一人即䇿勤不捨朝夕也雍雍和也肅肅整齊也致可欣樂愛樂也三藏法師於中寺出律藏本末精悉弗若多羅也同羅今譯十誦律六十一卷淫盜殺妄四戒為根本僧伽已下枝末譯之無失曰精悉若覩初制如見佛之初制毗婆沙法師於石羊寺出舍利弗阿毗曇秦言無比法胡本胡是梵也論有二十二卷或三十卷道標法師序雖未及譯時問中事發言奇新弘始十年譯十一年羅什亡即知此書是九年中事預問論中事理言論奇新也貧道一生猥參嘉運遇茲盛化猥弊也謙云弊迹嘉運者善時見聞異典勝僧故盛化即遇秦王明化故自恨不覩釋迦祗桓之集但恨不在祇園親預佛會餘復何恨餘無所恨而慨歎不得與清勝君子同斯法集耳不得與劉公同會逍遙法集又有此恨也生上人頃向也在此同止數年生公在秦三年至於言話之際常相稱詠歎也中途還南中途指前路也已歸廬阜故曰還南君得與相見未更近問惘悒何言惘悒者心之懸想無已何以言也威道人至曇威亦廬山人至長安也得君念佛三昧詠并得遠法師三昧詠及序三昧此云正受此通事理正念於佛故云念佛三昧遠法師序詠此事劉君繼和威道人示論主故今美之此作興寄既高毛詩序云詩有六義曰風曰賊曰比曰興曰雅曰頌念佛之詠乃寄興之義美其高作也辭致清婉美也立文清美能文之士率稱其美率伏也作者皆率伏稱美可謂遊涉聖門叩玄關之唱也詠念佛之旨故遊涉聖門叩擊玄關也君與法師當數有文集因來何少求見廣集什法師以午年弘始八年屬丙午出維摩經譯出也貧道時預聽次參承之暇輒復條記誠言以為注解什師隨譯而講肇師隨聽而注即今現行四注之一也條記者逐文記録也誠言者講者諦實之辭也辭雖不文然義承有本承講者所説為本據今因信持一本往南南附呈劉公君間詳試可取看得間詳審且試取看來問婉切正敘前問婉美切當也難為郢人莊子云郢人以污漫其鼻端若蠅翼使匠石斫之匠石運釿成風聽而斫之盡污而鼻不傷郢人立不失容今比劉公切問如彼匠石論主自謂難為對受故如郢人貧道思不關微兼拙於筆語並謙語也心不涉玄語多短拙且至趣無言言必乖趣理本絶言問答皆失云云不已竟何所辨今問答不已則乖旨失趣何所辨耶下云相期於文外耳聊以狂言示酬來旨耳無言強言曰狂言所為酬來旨也二正答所問三初總答疑意二初略牒所問疏云古多以書曰疏疏疏也疏通情意今指彼書云稱聖心冥寂理極同無雖處有名之中而遠與無名同斯理之玄故常所彌昧者稱者指彼所説也者字是牒二勸令證悟以此為懷自可忘言內得取定方寸為前劉公述所疑皆合正理但能疑之心自稱彌昧故今更不別答但勸令捨執除疑苟不滯言理當自顯既以至論在懷理圓言偏言生理喪故當內照而亡言得旨取定在心不在言也下責之云復何足以人情之所異而求聖心之異乎前云欲求聖心之異世人斷常情執則有異聖心豈有異也二別答三問三初體用不二真常答文四初正明體用答二先牒問疏曰談者謂牒彼疏曰指彼談論之者所謂也窮靈極數妙盡冥符則寂照之名故是定慧之體耳若心體自然靈怕獨感則羣數之應故以幾乎息矣二正答文二初雙非顯不二意謂論主自意所謂也妙盡冥符不可以定慧為名窮極智體以至於無知妙盡冥符之義甚顯寂照定慧但此體具非即是體以體絶思議故云不可也此則許劉公已知體性靈寂但不合立定慧寂照之強名故知解不亡豈能證入靈怕獨感不可稱羣數以息已知智用靈怕自感此為應本有緣則應何嘗止息故云不可此如明鏡無心隨照現像之義今許劉公已達無心之心但不合以無心為不應故今雙非之也兩言雖殊妙用常一一體一用曰兩言體不礙用故無知而知用不礙體故應而無應既全體全用故曰妙用常一也或體有知無知兩言用有應無應兩言總之則有無兩言在般若常一也迹我而乖在聖不殊也迹言也言是心之迹執我之言則體用有無見異在聖人得之體未嘗殊用用未嘗異體所以虗不失照照不失虗也二推釋明體用二初推何者何故體不可名定慧用不可稱息應二釋中二初釋體夫聖人舉人顯智玄心默照理極同無玄心者心智虗玄照無照相故曰默照此則玄心猶屬智默照即理也智即理故極同虗無此即前所謂窮靈極數妙盡冥符也清涼云照體無目即是證如理智雖有二名而無二體此正明一心理智也既曰為同同無不極無不極者蓋言於至極也許劉公既推智即於理此乃達之於至極不奪云何有同無之極而有定慧之名定慧者華嚴云禪定持心常一緣智慧了境同三昧定者心一境性也即心冥境之一性曰定了境之性一曰慧此皆心境照用也今既始覺合本內證自心豈容更立心境可定可慧之解心耶故責云何有也若有解心即同分別定慧之名非同句外之稱也定慧名義即所解之境必有能解之心故非同無之妙契乃知是妙盡冥符外之名稱耳下先釋非同云若稱生同內有稱非同若有定慧之稱須具心境能所故非理智同無也故觀云以生心動念即乖法體失正念故次釋外之稱云若稱生同外稱非我也若知定慧之稱是內證外之名字即知非我智體所有也故上云不可以定慧為名二釋用又釋上所推何故用不可言息應聖心虗微妙絶常境能應之心本無思慮故虗寂玄微也即前所謂心體自然常境者常情有無境也妄心因境而起隨境有無聖智靈明永悟故妙絶常境即靈怕獨感此明虗無為體長存以為應本也感無不應會無不通感屬生應屬聖會即合也易云感而遂通天下之故聖人無心而長應應之于有感衆生根感則聖應無不會合故能應之心無所不通也冥機潛運其用不勤樞機乃運動之處以喻於智今由冥寂潛密即無用之用故用無勤勞也前所謂神彌靜應逾動下責所問云羣數之應亦何為而息耶亦何為者本自不為也今何説息耶故云不可稱羣數以息然劉公所問已達心體虗無用常無作但欲體上立定慧之名用中疑其不應今但除其疑不除其解疑情果遣體用不二之理自明則寂而常用用而常寂何所惑也二揀異斷常答四初對妄顯真且夫心之有也前問意所謂體必有知用必有應蓋以斷常之心欲求聖智之異故今揀破且夫者泛敘之辭心之有者心有知用也以其有有有不自有有有者有境故心有知用也則知用之有不自常有既由境有則心有境無則心亦無此體此用不離斷常也故聖心不有有聖人之心體用真常不因有境而暫有也不有有故有無有有無有者有體有用全同虗無之有也有無有故則無無既真心體用虗無長有故無斷見之永無無無故牒上也聖心不有不無不同常見之有亦不同斷見之無不有不無其神乃虗神者不測也智之體用不可以有無測者乃同虗寂故也此明般若一心體用不同斷常之情惑也二推釋真妄二初總推何者何故妄心不離有無真心不有不無也二別釋中二初釋妄心夫有也無也心真也之影響也有無者妄心也影響者喻不實也影有光影及照物成影今取後義響有聲響及谷中答響今亦取後義因物有影因呵有響以喻全真心起妄心由境有故心有境無故心無有無妄心乃即真之影響也言也象也影響之所攀緣也言象有無乃妄心攀緣之所此明劉公以妄心取言象有無為般若也略例云言生於象故可尋言以觀象象生於意故可尋象以觀意又云得象而忘言得意而忘象所以達心境有無者當即妄以會真也二釋真心二初明即妄之真有無既廢則心相也無影響有無妄心由即真故廢而自盡即真心本無影響之虗妄如即波了水波相自盡影響既淪則言象莫測淪沒也泯絶之義影響妄情既泯則言教義象亦絶故云莫測言象莫測則道絶羣方道謂教道也羣方者不一之法門所謂寂照定慧體用有無等本為遣情故立義解今情亡解泯教道法門並絶故曰道絶羣方即觀云不可亦不可也道絶羣方故能窮靈極數教道絶故唯證相應故能窮極智數以至於虗玄也窮靈極數乃曰妙盡妙盡者智即無知也妙盡之道本乎無寄智無知故同真理之寂滅理智不二迥絶無可寄也此則無分別智合無差別理故清涼云照體無自即是證如前所謂妙盡冥符理當如此豈於此存寂照定慧之虗名也二顯即體二用謂問者體用各陳故有無疑異今由即妄顯真真能境智故次明即體之用文二初正明體用夫無寄在乎冥寂冥寂故虗以謂之述體也冥寂者智即理故冥同寂滅謂之虗玄是言體也妙盡存乎極數極數故數以應之明用也妙盡之義由窮極智數至於無知故曰存乎極數雖極數體寂而靈知不味常照於理事故曰數以應之有本上句末多妙盡此句中少極數近人以古本校之加削今詳上下相躡於理頗當故今從之也數以應之故動與事會動用也即體照用常與事理會合虗以謂之故道超名外言體則常談於虗寂理超名相故道超名外因謂之無知即無知應即無應既顯智體故曰般若無知無慮動與事會因謂之有無知即知無應即應言用故曰智有知神有應二結用歸體因謂之有者應夫真有語用則真有知應強謂之然耳彼何然哉體本具用故立知應之強名用本自寂何有知應可得之相三引經證成故經云聖智無知而無所不知無為而無所不為上句實智即體而用下句權智即體而用故聖人照理達事之用未嘗離體四結顯不二此無言無相寂滅之道此指智體也離言説相離心緣相究竟寂滅之道唯證可到豈曰有而為有無而為無動而乖靜靜而廢用也為是也豈聞説有無動靜而以斷常之情測度也又有無約實動靜約權權實皆即體之用故無有無動靜之異也三責問非真答四初泛敘迷真二初敘迷情而今談者者即是人雖泛敘今時談論意在責於問者多即言以定旨多謂多分未必全如此也即言定旨如以所標指為明月也尋大方而徵隅懷前識以標玄大方語出道經云大方無隅徵者推也隅即角也欲尋大方必曉無隅而推覓隅角者豈曉大方也懷心也前識者亦道經云前識者道之華則前識非玄道標者指也認前識為玄道豈謂達道也此則借外書以斥學者執言教而迷至理滯於有無劉公所云欲求聖心之異是也存所存之必當去呼是也存執也心為能存道理為所存心存異解乃謂必是正理故執有無疑於聖智也二明執教是以聞聖有知謂之有心聞聖無知謂等太虗有無之境邊見所存豈是處中莫二之道乎邊見者有無二邊執見也見為能存二邊為所存聞説聖心有則執有如於妄想聞説聖心無則執無同於太虗即以邊見而滯有無豈於有無不二之間得般若之玄道二推釋玄旨二初推何者何以謂之處中莫二之道二釋三初標真境萬物雖殊相也然性本常一性也此則不壞假名而談實相故曰處中妙道二示迷悟不可而物然非不物上句不可執相為真下句不可壞相見理言非不物者非無物也可物於物則名相異陳執有則迷一性平等故名相異陳不物於物則物而即真不滯相而見性故即物而契真此曰處中莫二也三明智照是以聖人不物於物不非物於物不非物者不壞物相也不滯物相為實不壞物相求真不物於物物非有也不非物於物物非無也緣相非實有緣起非實無非有所以不取非無所以不捨不取物相相虗幻故不捨物相相顯然故不捨故妙存即真不捨物相即相而觀無相曰妙存故即事即真也此顯即隨緣而觀不變所以不捨不取故名相靡因萬物雖衆非名即相靡無也因由也萬物皆真性攬緣而起外無別因故曰靡因以離真理外無片事可得故此明即不變而達隨緣所以不取名相靡因非有知也了真無俗智無取相之有妙存即真非無知也即事契真智非木石之無三引經證成故經云般若於諸法標境智無取非有所以不取無捨非無所以不捨無知非有知也無不知非無知也此證成上義四結責情執此攀緣之外絶心之域攀緣即妄想絶心者絶妄心妄心即攀緣攀緣即著有無聖智出於外故絶之也此結上下責而欲以有無詰者不亦遠乎詰問也欲求聖心有無而致問者甚違遠也然情不可及智故遠之彌甚四返詰玄旨答文二初推有無二初標意請詰夫陳有無者請求也詰問也夫語助也陳説也劉公前説般若體用有無之異今推求詰問必無此理也者是牒辭也二推詰三初求有不成夫智之生也極於相內生起也妄智因境而起故極於相內乃曰有知法本無相聖智何知聖智照真法真法本無相真智何有知此求有不成二推無不是世稱無知者謂等木石太虗無情之流無情者無靈覺也流者類也世人説木石太虗及諸無靈覺之類為無知靈鑒幽燭形於未兆道無隱機寧曰無知靈鑒者智用也幽深也燭照也初句明智徹理源也形現也未兆者朕迹未生次句明照窮物始也道者不二理也機即機關運動喻智用也不二之道在智則不能潛隱後句明雙照理事也反顯智用豈同木石之無知未句結顯也此推無不無也三顯非有無且無知生於無知無無知也且者牒上辭也世有無知之名起於木石無知之體般若寂而常照故無無知之名體可陳無有知也此文影上合先云有知生於有知世有有知之名起於妄想有知之體般若照而本寂故無有知之名體可陳無有知也謂之非有無無知也謂之非無謂者評論也般若既無有無之名可詰必當以非有非無推詰評議之也故前云般若之體非有非無等也所以虗不失照非無也照不失虗非有也怕然永寂心靜曰怕怕即寂也智體本寂故云永寂靡執靡拘靡無也執拘皆心有所著智用無為豈有拘執敦能動之令有靜之使無耶不可執用為有執體為無而以有無陳之也二顯玄旨三初引經標玄故經云真般若者真簡虗妄標也非有體用虗寂非無體用無起體用非新生無滅體用非後滅般若中有六不今非有無即不增減無起滅即不生滅垢淨豈存故兼之又有無起滅各具四句謂一非有二非無三非有無同時四非有無俱泯起滅亦然所謂四面不可取也不可説示於人離上四句將何言説以示於人唯內證可得非見聞所知也二推釋玄旨何則既云非有無等為真般若何以又云不可説示耶言其非有者牒經言其非是有出經意也為明般若非是實有知照故説非有非謂是非有遣執不可聞説非有便謂般若屬無言其非無者牒經言其非是無出經意也為般若非是頑瞽之無故説非無非謂是非無亦遣執不可聞説非無便謂屬有是知經説非有非無等但遣執著畢竟不能言於般若故知般若不可説也非有非非有非無非非無此又雙拂上言迹恐有云由般若離二邊故經説非有非無雖不可以有無説則非有非無之言豈非説般若故今拂之並上二字牒經中間非字為能拂下二字為所拂良由二執情亡般若本無非有非無之名字此如病盡藥除之義離四句絶百非曰真般若也三結勸尋玄是以須菩提終曰説般若而云無所説此絶言之道知何以傳大品意云諸天子聞須菩提説般若諸天子云夜叉語尚可解須菩提語不可解須菩提云諸天子不解不知我無所説也良由真智絶言言不可及不知以何為傳授古詩云枯桑知天風海水知天寒今亦云知何以傳蓋言不知也庶參玄君子有以會之耳庶望也參玄君子者指劉公也望契會言外之玄旨耳二照用空有同時答二初略牒前問又云宜先定聖心所以應會之道為當唯照無相耶為當咸覩其變也牒上可見二正答所疑二初直敘疑情答三初敘問乖真談者似謂無相與變其旨不一覩變則異乎無相照無相則失於撫會謂前所問照用空有不許雙行甚違大乘實理今不欲直破故云似謂其旨者般若義趣也不一者空有不許同照故然則即真之義惑有滯也有無並照理事雙融故曰即真乃實教之義趣問者未曉玄旨惑而有滯也二示其正義四初引經立義經云大品習應品文色不異空空不異色色即是空空即是色此約境明智用雙行立上即真之義然色空有無多就情揀理事性相多約智論今據劉公所問不許互照滯於斷常故初句簡實色次簡斷空後二句一念雙簡得智用者則事不異理理不異事理事互融空有並照雖心經亦有此四句秦世未有故引大品為定也二悟惑對釋二初敘迷情二示正義今初若如來旨如汝來問之旨下同觀色空時照色空時應一心見色一心見空空色殊照故各一心若一心見色則唯色非空若一心見空則唯空非色即上云覩變則異乎無相照無相則失於撫會然則空色兩陳莫定其本也此實也陳説也真空幻色本自不二今既各説故失不二之本也二示正義是以經云非色者牒上經中即色明空義誠以非色於色經説真空即幻色故不非色於非色上非色是真空下非色是斷空不説真空是離色滅色故若非色空也於非色離色滅色太虗則非色釋上非理也空若離色唯太虗離色耳非色何所明出過也斷滅之空無知無用非修非證何必辨明若以非色真也於色幻也即非色不異色非色不異色色即為非色色空不二為經正義顯矣三結顯所以故知變即無相無相即變羣情不同故教迹有異耳羣情者執心不一也為執色為實者説不異空執空為斷者説不異色故立教設迹有異也考之玄籍本之聖意豈復真偽殊心空有異照耶考本者推校也玄籍者大品也偽者虗也俗諦幻有曰偽謂推考大品文意豈謂心有真俗之殊境有空有之異此亦破前所執也四會通前義是以照無相不失撫會之功覩變動不乖無相之旨造有不異無照色不異觀空造無不異有觀空不異照色未嘗不有未嘗不無嘗曾也理事雙照空有同觀故不照則已照則未嘗有異故曰不動等覺而建立諸法此是放光經前牒為問端故今重引證兼示之也三結責所問以此而推寂用何妨以用也用經正義推尋故知般若寂用同時何妨礙也如之何謂覩變之知異無相之照乎責也二就解推破答三初敘錯解恐談者脫謂空有兩心靜躁殊用恐者不定之辭脫錯也躁動也劉公所見未必如然或恐有此錯脫而謂聖心空有各照動靜用殊由此錯解故下牒彼所云故言覩變之知不可謂之不有耳二勸探玄若能捨己心於封內尋玄機於事外然般若等智豈獨在於聖心凡心既全真而起惑但當即惑以求真故今勸捨內封般若故非外得封執也內執有無勸之令捨玄機妙智出有無之事外勸之令尋尋言而得意者可以忘言忘言得意意無所得則誰曰不證耶齊萬有於一虗曉至虗之非無者此勸得已而用也齊平也一虗者至理也玄機發照則觸事皆理理不離事故至虗之理非無也者即牒指在人能如是者下云當言至人終日應會與物推移乘運撫化未始為有也此又勸其説化傳通當此之時可作此言也上三句即前俯仰順化等末句即而無照功三責所執聖心若此何有可取而曰未釋不取之理劉君前曰本無惑取之知而未釋所以不取理故今責之聖心本自無取故言不取不取之理何更待釋三雙非是當悟惑答四初牒前領問又云無是乃所以為真是無當乃所以為至當亦可如來言耳初牒前次領問如其來問亦可如此然劉公已知真智無知而知真境無相即相但未曉知即無知相即無相故前立至當非當真是非是而問故今先領其所悟次破其所執故云亦可耳二縱奪而答文二初縱其所悟若能無心若內無執異之心方為能善也於為是立真是而是於無是以真是對立於非是也雖知真智無知而知立此以為真是待之故有非是矣真非之見惑在執心若無執心方乃善了下當義同此無心於為當立至當而當於無當以至當對立於非當雖達真境無相而相若至當非當執心不亡則不可也者牒上也能絶是非之執者則終日是不乖於無是終日當不乖於無當既達無知而知則了終日知而無知又達無相而相則知終日相而無相也此則但除其執前義自顯矣二奪其所執文二初正明但恐有是於無是有當於無當所以為患耳有是者有真是也無是者無知也當義準此但恐劉公於無知立有真是於無相立有至當則執心不除惑患生也二徵釋何者徵也有何患耶若真是可是至當可當可是當者實有真智真境也下出過云則名相以形美惡污音是生生生奔競孰與止之形現也美好也至當真是名相現則美好心生非是非當名相現則厭惡心生欣厭不亡則輪回奔競孰能止絶此則正在無明深坑般若智照豈在是非可得耶又美惡心念紛紜奔競何能止息故非般若寂照如是三顯示正義是以聖人空洞其懷無識無知內心曰懷洞者亦空也心體寂滅空之又空故曰空洞也分別名識緣慮名知心體本絶故皆曰無此顯智體寂滅境智同如然居動用之域而止無為之境處可名之內而宅絶言之鄉此二句各明即用之體居動用處可名皆見心境歷然即心無心即境無境故止無為宅絶言也此顯前是而無是當而無當之義又上句明心境相即無相下句顯名即無名無名無相則湛寂有相有名則繁興故上云言用即同而異言寂即異而同寂寥虗曠莫可以形名得若斯而已矣若了全用之體體絶心境形名所解如此者則可如其來問也四結責非問乃曰真是可是至當可當未喻雅旨也喻曉也此上結責恐是當之生物謂之然彼自不然何足以然耳此非其所問也恐者不定之辭生起也物者俗諦萬物也然者如此也彼者真心絶相也心境是當起是非形對恐於俗諦萬物可説如此彼真心本絶能所異相何足強以是非之情而求也第三結勸探玄然前結問蓋因執言滯迹師承有殊雖擬聖心必成局執故今結前所答泯迹拂言而令直造玄微即心即智者矣文三初言迹迷悟文二初明迷則生執夫言迹之興異途之所由生也言迹者教義也即前所陳標位有本宗旨不同立教為言設義為迹且聖人立教詮義為所不達者以指標月也情見既多興言亦異若各興教義者則見解多途故曰異途之所由生也二顯了則造玄而言有所不言迹有所不迹言迹不能詮辨於至理蓋心言罔及故曰不思議也二舉善達之人是以善言言者求言所不能言善達言而聽言者方能求言在於無言善迹迹者尋迹所不能迹善達義而觀義者始能尋義在於無迹言迹既亡豈分宗異也三結顯玄微至理虗玄擬心已差非解所到況乃有言恐所示轉遠非言所及庶通心君子有以相期於文外耳庶望也通心君子者望劉公內照同契言迹之外為所期也三涅槃無名論明理智不二顯證一前論境則真俗互融智則根後體一今由境智不二一如無二如唯此一法本自無為真常寂滅離一切相而即一切法斯為證之至極為顯示此義故次來也約教理則前淺後深一道豎窮至此在行果則同時修證起必全真但心境不二而二為修二而不二為證故前論則能所未亡此論則泯絶無寄大凡實教從因至果一道用心始終如此故初住發心許有分真成佛之義故知即因即果即行即證矣華嚴云初心畢竟二無別如是二心先心難彼約事頓此約理頓故知不俟三祇方為果滿又此論來雖則理由前論發起亦在秦王秦王既先唱此宗論主乃迎述幽旨由此論來乃有二意一成立主宗故二圓滿教理故由斯二意故先有表文次方立論依此分文初表文二論文初中又二初表題上涅槃論表古題云并表今依近本此題亦後人立下奉於上曰上表外也伸明本意已在表文既因秦王作論論成故表進之也二表文三初總歎王德僧肇言肇聞天得一以清地得一以寧君王得一以治天下聞外書所説也即道德經文今文略彼云矦王得一以為天下政始皇諱正故云治天下伏惟陛下指階陛之下睿哲欽明此四者語出尚書堯舜二典今以至德歎秦王也道與神會無為曰道不測曰神神解契於道性曰會此明具王德妙契環中理無不統環之中蓋言於空也中不空則非環矣達空理故能統該羣物此歎知佛理也遊刃萬機弘道終日上句美王業下句讚外護威被蒼生垂文作則蒼生者言天之生靈威德覆被又垂訓以禮樂之文作則故所以域中有四大而王居一焉老子云道大天大地大王亦大二敘述宗由四初歎至理深玄涅槃之道標一乘果法蓋是三乘之所歸方等之淵府大乘了義曰方等水深曰淵府者聚也言一乘為三乘究竟所歸又為了義教所聚之處渺漭希夷絶視聽之域水無邊曰渺漭老子曰聽之不聞曰希視之不見曰夷皆語妙道深玄幽致虗玄句殆非羣情之所測殆且也二敘重恩謙感文二初敘恩感遇肇以人微猥蒙國恩得間居學肆微劣也猥鄙也皆謙詞蒙恩故出俗間居學肆也在什公門下十有餘載此即在學肆也載即年也論主十九師羅什三十一亡則知論成不久示寂也雖衆經殊致勝趣非一然涅槃一義常以聽習為先聽習涅槃義是了義中最勝故曰為先二謙力寡微肇才識暗昧雖屢蒙誨諭猶懷疑漠漠為竭愚不已亦如似有解然未經高勝先唱不敢自決不幸什公去世咨參無所以為永慨屢蒙羅什誨諭疑心尚暗故曰漠漠且竭愚不已似如有解但未歷明師印受故不敢自決此乃奉主之言又因羅什去世師問無所故慨歎長永三歎秦王明悟而陛下聖德不孤獨與什公神契目擊道存快盡其中方寸論語云德不孤必有鄰也神契者神解相契也目擊道存者出莊子仲尼曰若夫仁者目擊而道存亦不可以容聲快盡其中方寸者目之擊視頓領涅槃妙心故能振彼玄風以啓末俗振舉也玄風者涅槃真軌也玄風將墜故奮迅舉振以開下流故云末俗康疏云什法師亡後秦王通四科義一通聖人不住法住般若義二通聖人放大光明義三通三世義四通一切法空義第四即涅槃義秦王通云夫道者以無為為宗若其無為復何所有耶今歎此事故云也四序答旨幽深文二初正明一日遇蒙答安城矦姚嵩書問無為宗極安城矦者封受之爵也姚嵩即秦王庶叔書問者姚嵩有書問秦王三義不問三世義問一切法空義云不審明道之無為為當以何為體等文秦王答云吾意以無為為道道止無為未詳所以宗也等文論主遇蒙答旨即決疑心故遂作此論也下引秦王答文何者何謂無為之義夫衆生所以久流轉生死者皆由著欲故也欲者悕望心也未達萬法全真外求理事皆欲也故見實有生死流轉無窮若欲止於心即無復生死即事而真故理外無事可取事外無理可求即欲止也生死即真故無復生死既無生死潛神玄默與虗空合其德是名涅槃矣心即真故曰潛神境即真故曰玄默不二之道豎貫三際橫通十方故德合太虗即涅槃無為之義既曰涅槃復何容有名於其間哉百川入海各失本名萬法歸真並無異稱故曰涅槃無名此責安城矦所問以何為體之異見上並秦王語二美歎斯乃窮微言之美極象外之談者也下論主美歎也易云得意而忘象得象而忘言今美秦王窮極無為微妙之意故出言象之外也自非道參文殊德侔慈氏孰能宣揚玄道為法城塹參廁也侔並也二皆同義文殊是不足梵音具云曼殊室哩此云妙吉祥亦云妙首亦妙德即法王之子慈氏者姓也梵云彌勒名阿逸多此云無勝勝德過人故即一生補處菩薩今反美秦主道德非與此二大士參並何能宣揚玄道深旨為佛法之城塹焉使夫大教卷而復舒幽旨淪而更顯大教即佛教也幽旨乃無為深旨此二者去聖已遠今之重興故曰復舒更顯尋玩殷勤不能暫捨欣悟交懷手舞弗暇豈直當時之勝軌方乃纍劫之津梁矣尋文玩義不捨於心目一欣一悟交集於懷臆故手之舞之不暇也直但也當時者當今之時也津梁者津濟可以通舟運梁橋可以接道行今秦王立無為之勝軌使而今而後有出塵之正道故三奏聞作意二初明作意文二初讚前義幽深然聖旨淵玄理微言約可以匠彼先進拯拔高士懼言題之流或未盡上意先領前文義精當故曰然也聖旨淵玄者秦王義意高深無為理微王言簡約匠師也拯助也先進利根或有所疑可以此為師訓拯助進趣也懼言題之流者言題既簡不曉者懼之即中下之流恐未能盡於上意故今作論以備之庶擬孔易十翼之作豈貪豐文圖以弘顯幽旨庶望也擬比也孔易十翼者孔子作十翼以贊易道十翼者上經彖一下經彖二上繫三下繫四大象五小象六文言七敘卦八説卦九雜卦十今比擬仲尼所作豈貪於文圖欲顯易旨之幽深今亦不求多文但顯秦王之深旨耳輒作無名涅槃論論有九折十演即標下所作之綱領並如下釋博採衆經託證成喻以仰述陛下無名之致廣博採托佛經依託聖言為證量成立曉喻以此讚述秦王無為之義也豈曰關詣神心窮究遠當非謂關涉造詣秦王神解之心又非窮究秦王遠當之旨下云聊以擬議玄門班喻學徒耳但欲擬度無為玄門且班布開喻後學之徒耳二助末章高判文二初敘判斥之義論末章云秦王通第四義末章有此云諸家通第一義諦皆云廓然空寂無有聖人逍遙園諸家談一切法空之義泯絶歸空全同斷見吾常以為太甚徑庭不近人情吾者秦王自稱也太甚徑庭出莊子李頤音云徑庭激過也著空過甚不近人之情解也下難云若無聖人知無者誰知者證也既無聖人誰證無理此斥不達之流不能即有以契無實如明詔實如明詔論主歎也王言曰詔詔旨明白故夫道恍惚窈冥其中有精若無聖人誰與道遊老子云恍兮惚兮其中有物等今借彼文恍惚者似有若無不可見故窈冥者深邃不可測故無為之道者在乎杜絶思議之間有而精微遊者履也雖平等味同其道合其微其唯聖人乎若無聖人誰證道也頃諸學徒莫不躊躇道門怏怏此旨懷疑終日莫之能正幸遭高判宗徒𢄶然扣關之儔蔚登玄室頃向也躊躇者猶豫不進也怏怏者疑恨也此旨者空廓之旨高判者秦王判斥也𢄶者快也心之決了曰𢄶然儔倨也蔚者草木盛貌今取盛義疑心既決進道者盛也真可謂法輪再轉於閻浮道光重映於千載者矣此亦歎前佛滅後聖賢已隱法輪久不轉道光長掩耀今由秦王宣揚故使再轉重照也二伸述作之懷今演論之作旨曲辨涅槃無名之體秦王判釋已明今乃委曲更辨曲辨之意者下云寂彼廓然排方外之談寂滅也助秦王滅諸家廓然斷見又莊子云六合之外聖人存而不論則涅槃等義皆方外之教今明即事即真故非方外之談乃推排之也作論雅意其在此矣條牒如左謹以仰呈條録也左後也仰上也録牒在後謹而進上也二乞指授若少參聖旨願敕存記如其有差伏承指授少參者謙也似合上意願敕記而存之差則乞從指授耳僧肇言表畢音切佇除呂切痾於何切瘵側界切遘古候切彖羊吏切俊子竣切婉於遠切雍於龍切猥於隗切惘文兩切悒於急切釿牛引切漭莫朗切托之石切頤以之切窈於鳥切怏於兩切𢄶呼麥切蔚於胃切
