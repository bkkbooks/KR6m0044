body:
  text: 注肇論疏目錄論序慧達述曉月注卷第一疏序懸談宗本義卷第二物不遷論第一不真空論第二卷第三般若無知論第三卷第四劉公致問法師釋答上涅槃論表卷第五涅槃無名論第四九折十演者開宗第一覆體第二位體第三徵出第四超境第五搜玄第六卷第六玅存第七難荖第八辨荖第九責異第十會異第十一詰漸第十二明漸第十三譏動第十四動寂第十五窮源第十六通古第十七攷得第十八玄得第十九注肇論疏目錄終
