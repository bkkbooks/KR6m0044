body:
  text: 姑蘇堯峯蘭若沙門遵式述第二論文二初題目涅槃無名論第四泥曰泥洹涅槃此三名前後異出蓋是楚夏不同耳云涅槃音正也疏曰涅槃者是中國梵音西有五天竺唯中國音正如此方夏音正楚音訛故泥曰泥洹皆梵音之訛也秦曰無為亦云滅度然萬法雖眾不過心境心境乃生住異滅有為之事也事本無體起必全真真體湛然平等一相是故即有為而無生無住無異無滅心如境如故曰無為生死本無起滅煩惱本無縛脫故曰滅度此則前三論但境智未亡今境智不二故知四論說則前淺後深理則同時一致良由境則虗而無相智則寂而無知境智一如即今無為滅度之義然涅槃有四種一自性清淨涅槃謂理性本淨不待修也二有餘依涅槃謂煩惱永寂微苦所依未滅故三無餘依涅槃謂煩惱既盡餘依亦滅故四無住處涅槃謂真如出所知障大悲般若常所輔翼約修顯故唯識云一切有情皆有初一二乘無學容有前三此約定性唯我世尊可言具四然今一乘之教論此四者中二約應化前後約真實但由應必全真真不離應事皆攬理理外無事故真應不二通具四也但真外執應即為今之所破若即應即真竝今無為滅度之義又於四中後三約修初不待修若修即無修證即無證則三乘因果竝得一乘無為之果下之破立准此可知言無名者萬法歸本各失自相平等一味不容異名非唯即相無相亦乃即名無名故云以無所得故得阿耨菩提況涅槃也又前則真俗同一次則寂照同一今則心境同一不見二相豈容異名也論如前釋第四者次前三也涅槃無名之論依主釋於前五名中緣會諸法本無理智之異緣會即本無故曰一義二本文中二初標章九折十演者折者屈也即下九章有名之難辭演者水長流也取連續不斷之義即下十章無名之主義雖以有名屈折而無名之旨常通故曰九折十演者之一字牒前標後故二正論一十九章分三初一章開宗定義文二初章名開宗第一開啟涅槃無名真常之義為下十八篇所宗亦猶仲尼談孝先有開宗明義之章二本文中二初陳宗序意文二初陳宗二初引經總標無名曰主者之宗尚故標其所稱也經稱有餘涅槃無餘涅槃者此二涅槃諸經皆說餘殘也煩惱雖盡而身智未亡曰有餘至於灰身滅智曰無餘若定性二乘從有入無具此二種迴心二乘及一切菩薩不入無餘異二乘故佛應化身示現具二者即牒經也二依經釋義三初翻名釋涅槃秦言無為亦名滅度秦朝翻上涅槃有此二譯下自釋云無為者取乎虗無寂莫玅絕於有為虗無寂寞者真理無聲色也玅絕者即有而無也有為者三世四相心境諸法也夫全真之事雖事相宛然而即事之真真常虗寂故過現未來生住異滅一切有為本自不生今亦無滅無生無滅無去無來無色無聲顯示此義故翻曰無為也故楞伽云初生即有滅不為愚者說又楞嚴云生滅去來本如來藏滅度者言其大患永滅超度四流大患者生死也老子云吾有大患為吾有身四流者欲有見無明也華嚴亦說此四既常漂溺有情故曰流生死是妄果四流是妄因若知生死本真四流常寂故能滅大患度四流不歷僧祇而登玅覺者矣前是通翻謂一切有為皆即無為此約別翻生死煩惱即滅度也至於凡聖染淨依正等一一皆可以即平等也則涅槃義無處不顯故大唐奘師翻為圓寂謂德無不備障無不盡也二就理釋無名斯蓋是鏡像之所歸絕稱之幽宅也斯者指涅槃也鏡像者鏡中現像似有實無幽宅者聖賢所住深理也一切有為生死及四流皆同鏡像之不實推之不實則同歸一性性本平等故絕差別之稱乃曰涅槃無名如百川歸海各失本名三約應顯假名而曰有餘無餘者良是出處上呼之異號應物之假名耳良信也處居也從真起化居處人天故出現曰有餘息化曰無餘信此不虗皆即真之事也二序意余甞試言之甞當也試且也未敢決言其理當且議之二立義推宗三初標宗敘義三初明體超數表夫涅槃之為道也此句標所宗則知所議是無為之至道又道者所行處也眾生雖不失而常背此聖人雖不取而常履此今議聖者所行所證之處故此句為總下多句為別以別釋總則句句上皆有此句寂寥虗曠不可以形名得深廣不可測也寂兮無聲寥兮無色沖虗故深曠大故廣故不可以形名求也微玅無相不可以有心知微玅不可知也有心知者解心妄智不能及超羣有以幽昇非有也羣有者三界二十五有謂四洲四惡趣六欲并梵天無想五淨居四禪四空處此二十五處皆屬有情所居涅槃非有故曰幽昇量太虗而永久非無也量比也太虗常住體無生滅道亦如之故曰永久隨之弗得其蹤迎之罔眺其首弗不也罔無也眺見也隨順者無蹤迹可得瞻迎者無端首可見上句則得在於無得下句見在於無見無得者方能隨順無見者乃曰瞻迎玅在斯矣六趣不能攝其生即無生也天人獄鬼脩羅畜此六是迷塗生趣不能攝之故無生曰道力負無以化其體無滅也力負者變化之力趨新捨故故力莫大於無常不能化真常之玅體故潢漭惚恍若存若往積水曰潢水大曰漭今但語其深廣惚恍者不定也深廣之體欲言其有心色兩亡欲言其無幽靈常在故若存若往此顯不可思議也五目不覩其容二聽不聞其響肉天慧法佛眼曰五目左右二耳曰二聽理絕見聞故不可覩聽也冥冥深也窈窈遠也誰見誰曉誰何也以何為見以何曉了彌綸靡所不在而獨曳於有無之表彌綸者周徧義靡無也曳出也徧無不在而獨出有無之外上句則即一切法下句離一切相也然上諸句皆談涅槃玅道體本如是文雖似重義各有理且別中初句離名相故第二句絕知解故三離常情故四超斷見故五佛非新得故六菩薩莫窺故七八生滅難求九十存亡叵測故十一十二見聞不及故十三十四深遠難窮故十五隨緣普周故十六體常不變故如是之義皆語涅槃諸佛既以八萬四千塵勞一一為門即知有塵沙玅義今且略談十六句也二明比量難求然法相宗說有三量一心真見道曰現量相見道曰比量比度不真故曰非量今比之既難用比則失失乃成非是故一切深義竝曰言語道斷心行處滅唯現量者可證也然則承上也言之者失其真語言非是道用言則失真知之者反其愚愚者昧也道體常寂如愚知解非是道存知失寂滅有之者乖其性無之者傷其軀有無非正道存之滯二邊故傷其軀而乖其性蓋涅槃體離此四故四皆乖失豈知見之比度也非謂別有玄道不可四求三示現量之所以所以由比之不得故也釋迦掩室於摩竭釋迦始成道在摩竭提國阿蘭若法菩提場中七曰不說法同掩室也自受法樂故或云思惟行因緣行故今取前義行滿證圓現量親證故無所說七日之數或云一七二七乃至七七半年一年但為見聞隨機故諸經各異智論云佛初成道五七日不說法法華亦云三七日中思惟如是事等淨名杜口於毗耶梵云維摩詰此曰淨名杜默也梵云毗耶離此曰廣嚴即城名昔維摩詰與五千菩薩在毗耶城室內共談不二法門維摩默然無言文殊讚曰是真入不二法門須菩提唱無說以顯道釋梵絕聽而雨華大品經須菩提於巖中晏坐釋梵雨華為供善吉曰空中何以雨華天曰我見尊者善說般若波羅蜜曰我於般若未曾說一字天曰尊者無說我乃無聞無說無聞是真說般若波羅蜜又復雨華上所顯者初則果佛無說次則菩薩無說三則二乘無說四則天人無說是知證之則聖凡皆爾背之則比度皆非故引四事以證廣在諸經斯皆理為神御故口以之而默豈曰無辯辯所不能言也神者不測之智也御著控也理當以智御故口默也豈為無辯辯才不能及此矣此結成唯現量可到非比度可解二引教推窮二初引教明深經云真解脫者解脫是涅槃之一德權教三乘皆具解脫離縛之義今一乘三德簡異於彼故云真舉一即三故但云解脫離於言數寂滅永安言詮數量不及故曰離言數生滅滅已故曰寂滅真常不動故曰永安上總下別釋無始無終釋上寂滅義即樂德寂滅為樂故不晦不明不寒不暑體非晦明寒暑故數量不能及故釋上離數義即我德自在故湛若虗空水澄曰湛故不動如虗空溥徧常住釋上永安義即常德也無名無說體本無名故無說釋上離言義即淨德離言偏過非故未見涅槃經文理必如此論曰衍論涅槃非有有即乖性亦復非無無即傷軀言語道斷言即失真心行處滅知即反愚文竝可見二推窮顯玅二初總釋尋夫經論之作豈虗構哉作立也構成也推究經論皆以義立文豈虗成立而無詮表耶果有其所以不有不可得而有有其所以不無不可得而無果者決定義尋其涅槃玅體定非有無故不可以有無名數而得也非有無之所以下自推釋二推釋何者有何所以下釋本之有境則五陰永滅本者推求義五陰者色受想行識也此五覆法身真理故曰五陰即有為色心二事既五陰即寂滅方曰涅槃則不可以涅槃為有也推之無鄉則幽靈不竭幽靈不竭者寂寂惺惺之體無窮故不可曰無幽靈不竭則抱一湛然五陰永滅則萬累都捐抱一湛然者兩手相合曰抱合抱則同一湛然者不變也此幽靈不竭之體理智不二始終不改故萬累都捐者一切塵勞門總曰萬累捐者棄也即事而真故萬累當體都息矣萬累都捐故與道通洞洞者達也事與理同故曰與道通洞抱一湛然故神而無功不測之體絕二相故故無能所修證之功以能修能證即所修所證故修而無修證而無證等也神而無功故至功常存以無修無證無因無果同真際等法性故曰至功常存與道通洞故沖而不改沖者虗也由沖虗常不改故即塵勞而道體通達故淨名曰菩薩行於非道是為通達佛道沖而不改不可為有道體不改沖虗焉可曰有也至功常存不可為無平等至功豎貫三際橫及十方豈曰無也由上義故經論皆謂涅槃玅體非心言有無可得者故非虗構也三結示深玄文三初結難測然則總承前義有無絕於內離性相也稱去謂淪於外離名言也視聽之所不暨暨及也體超名相非聲非色故視聽不及四空之所昏昧外道所修四空定謂空無邊識無邊無所有非非想妄計為究竟於此玅道迷而不知故曰昏昧二結平等恬焉而夷怕焉而泰恬怕者心之寂靜夷平也泰通也涅槃玅心平等通達無所不在故九流於是乎交歸九流者欲界一地為一流上二界八地為八流九類雖殊理唯一致故曰交歸故會色歸空歸是即義眾聖於是乎冥會眾聖者三乘人也冥會者契合也三乘同歸一佛乘一佛乘者無為滅度故曰於是冥會也以九流對眾聖聖凡同體故曰平等也三結超情斯乃希夷之境太玄之鄉老子有希夷義即無聲色也楊子有太玄義玄者黑也黑故無異見即不可測也況玄之又玄曰太玄耶今惜語涅槃玅道既非思議所得故曰太玄之鄉也而欲以有無題牓標其方域而語其神道者不亦邈哉題牓謂書題牓示皆詮名也邈遠也此破三乘異見既不能即事契真乃謂實有有餘無餘名之與相以為涅槃者皆以書題牓示標指生滅方域語論玅道迷之甚遠也論主既欲返權順實理當如此也後一十八章問答推窮合為九重開解行證之次第大分為三初三就真應明等解次四對三乘顯等行後二就人法示等證初中三重一真應異同辯文二初敘應疑真問文二初章名覈體第二覈責也前云有無絕於內稱謂淪於外故今執示現生滅之相責覈推究涅槃真體何以絕有無名相也此據人天二乘所見應化為實故疑真身何以離名絕相二正問中二初序問有名曰難者所謂涅槃必有名相可得故標有名為難者之辭夫名號不虗生名因相有稱平聲謂不自起稱說言謂必由名起故不自然此上是汎敘經稱有餘涅槃無餘涅槃者即前經蓋是返本之真名神道之玅稱者也返者歸也由聖人歸本證神玅不測之道是此有無二涅槃故經文立此名稱也然今有名者陳相致問蓋以二乘所見應化為真未達真身畢竟寂滅報體相續長時故執示現生滅之身已為返本真實則知向下所說但認化身示成正覺以為大覺法身圓滿故說因果行相正符小教雖以法報標名釋義多論化相此意為欲破二乘及諸凡夫執化為真令達真化不一不二之旨耳請試陳之此句是無名者問曰試且陳之行相如何耶二立問中三初陳有餘相文二初牒名述相中三初牒名有餘者二述相有五初果德已圓相謂如來應身如來也謂從如實道來應眾生大覺自他覺滿故始興三十四心斷三界九地惑盡於金剛座上木菩提樹下初成正覺時法身初建即戒定慧解脫解脫知見五分法身初圓也即八相成道丈六之身具三十二相八十種好二乘既認此以為真佛故今標指之澡八解之清流憩七覺之茂林八解者八解脫大品云一內有相外觀色二內無色相外觀色三淨解脫四空處定五識處定六無所有處定七非非想處定八滅受想定此八有斷惑之能故如清流有浣濯之用佛已澡之故得上法身初建也憩息也七覺者即七覺分一擇法二精進三念四定五喜六捨七除一一有覺分之言或曰覺支即菩提分法共成覺道故如園林秀茂佛已憩其中也故得上大覺始興也此二義多用淨名彼云八解之浴池定水湛然滿布以七淨華浴此無垢人二因行已滿相積萬善於曠劫小乘亦說菩薩成佛定滿三僧祇修有漏四波羅蜜及百劫修相好等皆曠劫積善也蕩無始之遺塵直至菩提樹下三千四心一時斷惑遺棄也塵以坌污為義即明見修煩惱是無始可棄之塵垢盡故今曰蕩也即知小乘所說前三僧祇但是伏惑直至菩提樹下方有斷義若約始教菩薩則金剛心斷種義耳三明鏡於內神光照於外天眼知現在宿命知過去漏盡知未來曰三明由內證根本外發後得故有三明神光外照也此則智行滿結僧那於始心終大悲以赴難僧那是梵語此云四弘誓願即煩惱願斷法門願學佛道願成眾生願度前三是智後一是悲悲智願三即菩提體始結四心雙行二行自行已滿利他無窮故大悲終心長時赴難填度生願故也此則願行也仰攀玄根俯提弱喪上句智窮深理故曰玄根下句悲濟羣生故提弱喪弱謂劣機即樂小法者喪謂喪失即三界眾生此釋上四心不過此二故也超邁三域獨蹈大方超邁三域者出三界也獨蹈大方者已成佛道不共二乘故云獨蹈上句則報超三界下句則果異二乘三利他益物相啟八正之平路坦眾庶之夷途啟開也八正則八正道大品云正見正思惟正語正業正命正精進正念正定此是三乘出離正道故曰平路坦平也眾庶者不一之稱夷途者斷常二邊邪見也今以八正道為平等之正路平眾生之異見同歸正道故騁六通之神驥騁奔也即馳驟義六通者三明外更加二天耳三他心五如意後得自有曰三明赴他有六通天耳察聲故他心知他心行故如意速疾而往故神驥者健行千里馬也聖人六通赴機疾速如神驥之奔騁此明大悲願力利他無處不周也乘五衍之安車乘運也衍者梵音此云乘即五乘為五衍也三乘外加人天乘安車者安處車乘也以六通神驥運五乘安車即皆令出離三塗及三界故至於出生入死與物推移道無不洽德無不施洽霑也出入生死界中隨順五道示現受身無為道德悉施眾生如春澤普滋此結利他事也四二智常行相窮化母之始物極玄樞之玅用此明後得智達俗化母者因緣也一切事法皆由因緣從無而有故因與緣為物之始玄樞者俗智也爾雅曰制扇以附門傍者曰樞有動運義以喻智有照用簡異邪智故曰樞樞玅用極智用以窮事也廓虗宇於無疆耀薩雲於幽燭此明根本智達理廓徹也虗宇者真理虗寂絕邊疆故薩雲是梵語具云薩雲若此云一切智即真智也耀燭皆照義以根本智燭幽深理也五將欲示寂相將絕眹於九止永淪太虗欲絕未絕故云將絕眹者化迹九止即前九類是生靈止處聖人示現欲息息同太虗而有餘緣不盡餘迹不泯業報猶魂聖智尚存緣不盡即殘機未了迹不泯即化身未息此是無漏業報所招尚有神魂聖智存此赴應故也三結名此有餘涅槃也結相就名也二引經證成經云陶冶塵滓如鍊真金萬累都盡而靈覺獨存先喻後法鍊金之法陶汰溶冶滓鑛盡則真金現修行證性理亦如之定慧雙修二障盡則靈覺顯靈覺身智即有餘也二陳無餘相中二初牒名述相三初牒名無餘者二述相中二初總陳謂至人教緣都訖靈照永滅廓爾無眹故曰無餘教化也訖畢也靈照智也廓空也化相隨緣已畢智照亦滅身智既泯故空廓無眹曰無餘即八相中入涅槃相也二別陳中四初徵釋所因何則何以至人滅身智耶夫大患莫若於有身故滅身以歸無老子云吾有大患為吾有身今借彼語大患者分段變易二種生死有身故有故今滅身則大患永離勞勤莫先於有智故絕智以淪虗勞勤者斷惑證理棄妄求真行一切淨行皆䇿勤勞苦由智故有故今絕智則勞勤永息二乘厭於人天起行實有如此故滅身智以求寂滅然則智以形倦形以智勞輪轉脩途疲而弗已智因形故有生死之倦形因智故有損益之勞脩途者長途三界六道宛轉無始皆由身智互牽轉而不息二引證因起經曰智為雜毒形為桎梏毒藥能損身喻之如智則形以智勞桎梏者山海經云桎其足梏其手即械縛也喻之如形則智以形倦淵默以之而患難以之而起淵默即無餘涅槃由有身智故遠於無餘患難從生也三正明滅相所以至人灰身滅智捐形絕慮二乘不了化相示現執為真實故說佛身實有生滅為破此執特有斯問灰身者化火焚灰故捐形滅智者真俗智滅故絕慮內無機照之勤機智也滅智故無勤勞外息大患之本捐形故大患無本超然與羣有永分渾爾與太虗同體羣有三界二十五有身心滅故超越羣有同太虗空此明色心滅寂焉無聞怕爾無兆冥冥長往莫知所之無聲曰寂涅槃經云寂然無聲便般涅槃也怕爾無兆者滅聲色故但見冥寂不可測其所往四引喻以況其猶燈盡火滅膏明俱竭燈盡則火性滅膏油竭喻身滅光明竭喻智滅三結名此無餘涅槃也二引經證成經云五陰永盡譬如燈滅由此故立無餘之名也三雙結正難文二初雙結有無然則有餘可以有稱去無餘可以無名皆謂相上各可以立名也無名立則宗虗者欣尚於沖默有稱生則懷德者彌仰於聖功顯立名之益宗虗者即趣寂之人故欣尚沖默懷德者則大悲之人故仰慕有餘功行各從所尚而有進修也斯乃典誥之所垂文先聖之所軌轍名出勝鬘及諸經故曰典誥軌轍者軌則途轍皆證此二涅槃故也二牒前正難中四初牒前難而曰有無絕於內稱謂淪於外視聽之所不暨四空之所昏昧牒前也下難云使夫懷德者自絕宗虗者靡託靡無也因聞涅槃絕有無故懷有餘者絕趣向宗虗寂者無歸託二舉喻難無異杜耳目於胎殻掩玄象於霄外而責宮商之異辨玄素之殊者也杜耳目於胎殻即前視聽不暨也掩玄象於霄外即前四空之所昏昧玄象即四空天掩閉霄外四空天即昏昧不顯也責者問也宮商則五音之二玄黑也素白也則五色之二責宮商者要知五音清濁之異辨玄素者要別五色黑白有殊此則必有見聞之處即前所謂九流交歸眾聖冥會必有歸會之處此喻意謂涅槃既絕視聽又非四空如何令九流眾聖歸趣耶似杜絕耳目而欲問五音清濁辨五色殊異豈有此理也三詰責難子徒知遠句推至人於有無之表高韻絕唱於形名之外而論旨竟莫知所歸幽途故自蘊而未顯子者男子之通稱召無名者也徒虗也知理不諦故為虗知但以高絕才韻推涅槃出有無唱玅道超形名而不知旨無所歸矣涅槃幽途自此蘊藏而不顯四結無益靜思幽尋寄懷無所難者靜心幽尋前章也寄懷者解心無所寄託豈所謂朗大明於冥室奏玄響於無聞者哉大明即二相玄響即二名冥室是不見二相無聞是不聞二名眾生既無見聞之益故宜表示之令其熏善種既泯絕名相豈能示之以真相奏之以真名耶二真應異同答文中二初章名位體第三位次也則應化之相示生示滅從有而無位次如是體依也涅槃玅性本無名相為萬法所依曰體然即體之位全真而起故有出現入滅位次即位之體全應而顯本絕去來之形名前難者執化相以為真佛故以名相有無難前章絕名相之體今先令達真應假實不同然後示化位即體故曰位體二正答三初敘難非真二初翻前疑二初破前疑無名曰有餘無餘者蓋是涅槃之外稱應物之假名耳前云返本真名神道玅稱蓋不達示現耳今直破之也二遣前執而存稱去謂者封名志器象者耽形存執也志慕也封亦執也耽著也此四雖言別意同蓋不了聖人示現名相而執名稱言謂以為真慕形器色象以為實此則不了依他故起徧計而不知情有理無耳名也極於題目形也盡於方圓方圓有所不寫題目有所不傳題目者書題名目也涅槃真體本絕名相故方圓不能圖寫題目不能傳說下責云焉可以名於無名而形於無形者哉二示真應文二初明應化非真難序云有餘無餘者信是權寂致教之本意亦是如來隱顯之誠迹也難者所陳二涅槃相者是如來為執無者顯現有餘權相為執有者隱現無餘寂相致立教化之意誠實之事迹耳此明應化下顯非真但未是玄寂絕言之幽致玄寂幽致者是即事而真有無雙寂顯上權寂非此玄寂也又非至人環中之玅術耳環中者空處也術法也至人所證微妙至寂之道雖離一切相而即一切法隱顯二相非此玅術也二示正觀真體子獨不聞正觀之說歟召有名者曰子經有正觀之說何獨不聞維摩詰言我觀如來見阿閦佛品世尊問曰汝以何等觀如來耶此即答文彼有多句今此略引維摩以中道觀觀第一義諦真身如來也如謂真如來而無來故曰如來無始無終彼云前際不來後際不去今亦不住前際寂滅故無始後際寂滅故無終則中間寂滅故無住即三際而無三相故無始終也六入已過三界已出彼云六入無積眼耳鼻舌身心已過謂真身寥廓不可以根識塵六積聚處所攝也又非欲色無色界地所收不在方不離方非有為非無為方所也法性無住故不在也無處不全故不離也為者造作義體非新生不由修得故非有為不似太虗色外別有空豁之體故非無為不可以識識不可以智知緣慮不到其體故不可以識識五眼不見其形故不可以智知無言無說心行處滅彼云不可以一切言說分別顯示蓋為言說詮表心識分別皆不及故以此觀者乃名正觀以他觀者非見佛也彼云名為邪觀此者前諸義也他者即始終六入三界有無等相本覺真體當以中道正觀而契不可以有無邪觀即知有名者邪觀未正但認應化虗相豈見真常佛體二正明位體三初標宗顯義文二初標宗中三初引經放光云佛此云覺法相教說佛有三身謂法報化約理為法身約智用為報身約事用為化身又報身有二自受用他受用終教合之為二以自受用報合法為真身他受用合化為應身雖說二身而不一不二以實教理智體用雖有二義而無二體以始覺合本為真全真起用為應前難者但執丈六化身以為真佛尚未知自報相續無窮況法性真身湛然常住也今但引經立實以明不二之真佛則權義自破疑執自除矣如虗空喻也虗空有三義橫徧故豎窮故含容故真身徧一切處窮三際時具河沙淨功德故無去無來離有餘無餘去來相故此上明真體也下辨位應緣而現無有方所全真之應隨緣而現應以佛身得度者而現佛身乃至三乘天人八部等品類無有方所良由大悲願力稱法性故隨一一根緣現無方大用也二釋意然則承上經意聖人之在天下也此句總牒也既曰全真而應觸事皆真則聖人無處不周此語亦用繫辭彼云寂然不動感而遂通天下之故寂寞虗無無執無競此釋真身也上句約理寂寞者無聲色也本自虗無故若以色見聲求不能見如來下句約智執競者無明妄動我法潛興則有執著諍競今言無執競者始覺合本無明麤細俱離此則金剛位後一切種智圓滿之時故起信云遠離微細念故得見心性心即常住名究竟覺以為真身也此智與理不一不二故說自受用身土量周法界故上經曰佛如虗空無去無來導而弗先感而後應此釋應身也導者接引也機緣未熟故無先導之事機熟為能感之緣聖人定有應現此明應身定從緣起既隨緣各感故有十重身土及千丈丈六等別故上經曰應緣而現無有方所據前有名者但以丈六之身為問猶未知勝應況真身耶二喻釋譬猶幽谷之響明鏡之象以喻上真應身不一不二之旨山谷深遠曰幽隨召則有響明鏡當臺隨照則有象谷唯幽鏡唯明本無聲象以喻真身唯具性淨功德本無名相召之則有響照之則有象以喻隨緣應身示現名相也良由谷幽故能應響鏡明故能現象則以喻由智合理為真方能起應又由應響方知谷幽現象始知鏡明則以喻由應化無方始達理智究竟以喻求法反覆可思對之弗知其所以來隨之罔識其所以往恍焉而有惚焉而亡釋鏡像喻也此明非唯真身本無來去應身來去之相亦非實有如鏡中像對之則現來無所從隨順也順而推求求之既無以何為往但由外相對之則恍有有非定有不對則惚無無非實無應身示現之相理亦如是來無所從去無所往但由機緣感不感故見生滅耳動而逾寂隱而彌彰出幽入冥變化無常釋俗響喻也亦顯應身去來之名非實有也在召者見響曰動谷本常寂谷本無聲曰隱處召之應彌彰但由召者呵之則出幽不呵則入冥故曰谷響有無變化無常示現之名理亦如是但由根有感不感故說佛有去來名也二顯義三初約化體名相顯又二初即名顯義其為稱也牒二涅槃名因應而作作者立也顯迹為生息迹為滅生名有餘滅名無餘然則有無之稱本乎無名應本自真故無名之道於何不名由無名故能順一切名故曰於何不名二即相顯義是以至人牒上真應佛也居方而方止圓而圓在天而天處人而人前云方圓不寫今云隨方圓得方圓之相在人天得人天之形以方圓汎舉天人正論故又方圓約土人天約身非唯全真起於應身亦乃全真起於應土故祖教明以緣就性身土體同以性就緣能所差別今明以性就緣故在方圓為依人天為正故也原夫能天能人者豈天人之所能哉反明也豈有天人之所能能於天人之事耶果以非天非人故能天能人耳順明不二也由理絕天人故能隨天人之緣也二約化用施為顯其為治也治上呼即前有無二用故應而不為因而不施前云因應而作而體絕施為之相施謂施設為謂作為示現身土出生入滅住世說法皆施為也因而不施故施莫之廣應而不為故為莫之大雖絕施為之迹而施為應化廣大莫加其能廣大者蓋出真起故為莫之大故乃返於小成施莫之廣故乃歸乎無名返小成者以大用無方迴返丈六之身一佛小成之劣用以稱真廣大會三乘有作之用歸無名之化源此約法性宗即真之應收前二教也經曰菩提之道菩提約智涅槃約理理智無二體故今引經說菩提義意證涅槃義也不可圖度此句為總離下諸句圖度之相高而無上廣不可極淵而無下深不可測大包天地細入無間無上相故高不能圖度等極謂邊際相水深曰淵謂下盡相此二句是一相謂無高下是離豎窮相無廣極是離橫徧相此上遮相也後二表相言大則包藏天地言細則入無中間如隣虗塵更無中間之位亦全具道體故入無間故謂之道結上所明不可圖度是謂菩提也三結成然則涅槃之道不可以有無得之明矣以菩提絕圖度例涅槃亦絕圖度故不可以有無名相得之之義明矣二結責惑情而惑者不了真應之人覩神變因謂之有見滅度便謂之無此責前云有餘可以有稱無餘可以無名神變者示現出世不測之用也有無之境妄想之域豈足以標牓玄道而語聖心者哉妄想者倒心也牓者示也有名者執有無名相為返本真實神道妙稱故今責之有無唯妄心所居豈以此標示為涅槃而語論聖人心智耶又有無不可標玄道妄想豈足語聖心心為能證玄道是所證此責以妄為真也三述意顯解三初述解意意解心謂至人證極曰至人寄人以顯法體寂怕無兆真體常寂本無聲色隱無餘顯有餘同源應全真起存不為有示現有餘故非有亡不為無示現無餘故非無二徵釋何則雙徵上不有無義也佛言吾無生不生雖生不生無形不形雖形不形先單釋不有義佛出現事生必兼形形不兼生八相成道則有受生若千丈及十重身土現形非生凡可示現處無不受生現形既曰示現於生形則體常寂滅故曰存不為有以知存不為有結不有也經云菩薩入無盡三昧盡見過去滅度諸佛此下單釋不無義智為能入理為所入三昧此云正受亦云等持從理之智還契於理理智不二三際平等故不可盡即諸佛之正體示現之相雖滅此不可滅故盡見也又云入於涅槃而不般涅槃般入也示相入滅體本不生何有入滅故曰亡不為無以知亡不為無結不無也下雙述成亡不為無雖無而有示無而真體常住故存不為有雖有而無示有而真體虗寂故雖有而無故所謂非有雖無而有故所謂非無即應而真以顯佛體本絕有無矣三結定然則涅槃之道果出有無之域絕言象之逕斷矣逕路也故有無是言象之路既出有無則言象路絕斷定如是矣三結責乖旨文三初牒前非理子乃云聖人患於有身故滅身以歸無勞勤莫先於有智故絕智以淪虗此牒前文無乃乖乎神極傷於玄旨者也神極玄旨皆語深理也聖人證此尚無能所之迹況外有身智為患難而欲棄滅之事耶然此下論文古人多謂重破無餘涅槃以執有易遣滯無難除故乍觀可爾細尋則局以下有頓赴殊對象出心生等義非一向破無既迷上位體玄旨執生執滅竝為所破故科曰結責乖旨二以理推破三初引經立理經曰法身無象應物而形般若無知對緣而照前說聖人以身智為患故今引經立真應身智正義以為能破各有二句皆上句明真下句明應又上約理下約事法者軌持義身者體義法性有真軌持義為萬法所依之體聖人證此故曰法身所謂湛然虗寂本無色象故金光明曰佛真法身猶若虗空而能隨緣應現示種種形經又曰應物現形如水中月般若智體本自無知而能對緣不失鑒照既身智即真而應應本自真故即身無身即智無智何有患難而欲滅耶二釋成正理萬機頓赴而不撓其神釋上應物而形也羣機不一故言萬一時普應故頓赴既無形而形故無撓動千難殊對而不干其慮釋上對緣而照也雖異問殊對而無心普應不干動其思慮故動若行雲止猶谷神雲無心而出岫以喻頓赴而不撓其神谷無念而答聲以喻殊對而不干其慮豈有心於彼此情係於動靜者乎雙結上也既無心於動靜亦無象於去來即應而真故智本無心形本無象何有去來動靜而有有無決定之名相耶去來不以象故無器而不形動靜不以心故無感而不應即真而應故智無方形無礙器者皿也可承受義機熟受化則無不示形故三結破有無二初破有然則心生於有心象出於有象此先破前有餘之執悲智心生相好象出在根感故見有心象也象非我出故金石流而不焦心非我生故日用而不勤紜紜自彼於我何為我者即法身真我也金石流而不焦者劫火壞時金石流散此不可焦蓋由真體無相故又用無勤勞者由真心無念故紜紜自彼者身智之事自屬受化之機非法身如是此破有畢二破無所以智周萬物而不勞形充八極而無患次破前無餘之執前說身智為患今直非之八極者四方四維身智尚無況有患難耶益不可盈損不可虧損必有所益真體有必有所無前既無有此必無無有非有故益不可盈無非無故損不可虧下責云寧復痾癘中逵壽極雙樹靈竭天棺體盡焚燎者哉寧復者責詞何有此事也泥洹經云佛將般涅槃於中路患痢爾雅曰路有九達曰逵雙樹者即娑羅樹此云堅固有四雙八隻四榮四枯表四德破四倒如來於中頭西面南右脇而臥示現入滅靈竭者智滅也體盡者身滅也天棺者以千疊纏身內金棺中次銀次銅次以鐵棺灌滿香油依輪王棺法化火焚之也經中廣有異事皆是隨機見聞非謂如來體有生滅也三結責迷情文三初責有而惑者居見聞之境尋殊應之迹即前所陳有餘行相皆是殊異應迹耳秉執規矩而擬大方秉亦執也規矩者方圓也老子曰大方無隅方圓豈能擬議以顯真身湛寂有相豈能指陳耶二青無欲以智勞至人形患大聖謂捨有入無因以名之此責前所陳無餘行相因以名之者因捨有入無名為返本真實迷之甚也三結責豈謂採微言於聽表拔玄根於虗壤者哉採拔皆取也微言者諸經之妙言也即維摩放光等經玄根者法性真源也虗壤者不實之土以喻應相為前難者執權名滯化相故今責之豈能採實教微言於聽表又豈能取法性玄根於應化之間上釋真應異同辨竟二有無即離辨二初有無難出問中二初章名徵出第四徵者推問也因前章明涅槃出有無故今雙牒有無而推問涅槃出有無之理也正問二初汎敘難端中二初汎敘有名曰夫渾上呼元剖判萬有參分儒道窮五運之前天地未分三才渾為一氣故曰混元亦曰混沌至於剖判清濁則清昇曰天濁墜曰地和氣於中曰人則三才啟運萬物不過三而分之也有既有矣不得不無無不自無必因於有所以高下相傾有無相生此乃自然之數數極於是三才是有對有立無於有無中復暫有無或高或下相向相生此則物理之數自然如是非彊使之以此而觀化母所育理無幽顯道經云無名天地之始有名萬物之母母者母人有生育義故未有三才名字之前此為變化之本今觀此理幽顯萬物無不統攝也憰恑怪無非有也莊子云憰恑怪道通為一此則言其變怪殊形好醜差別無不屬有亦不過有無所攝有化而無無非無也有而後化化復歸無無不屬無然則有無之境理無不統三才屬顯變怪屬幽竝不過有無故理無不統意謂真實涅槃亦不過無之所統二引證經云有無二法攝一切法此證前為量二正伸難意文三初別經標指又稱三無為者小乘說無為有三相宗說六今約小乘人致問也虗空一也太虗非生住異滅故性離作為數緣盡二也數即智也以智為緣揀擇諸惑顯滅盡理即擇滅無為也非數緣盡三也即非擇滅無為不假智數擇斷而得滅盡如阿羅漢永離三界苦果果非擇斷故云非擇滅但斷集因即擇滅也數緣盡者即涅槃也標指擇滅所顯以為真實無為之義然前即雙執有無二相為真今則已知有相非真故疑無相必實雖則捨有取無意謂亦不過二相故責無為何離有無也二推求出意而論云有無之表別有玅道前云果出有無之域玅於有無謂之涅槃玅者不可思議故不可以有無思議謂之玅道請覈玅道之本請無名者研覈其本必不過於有無果若有也雖玅非無雖妙非無即入有境此牒前云雖無而有所謂非無乃徵之也道若是有玅局非無非無之玅即當入有故知非無即是有也果若無也無即無差無而無差即入無境又前云雖有而無所謂非有復徵之也道若是無玅在無差無差之玅即當入無總而括之即而究之無有異有而非無無有異無而非有者明矣有名者總以非有非無之文搜括推究玅道之本如是也無有者不可也異者非也不可非有又非無又不可非無又非有玅在非無則定有玅在非有則定無則非有非無微玅之道不過有無義已明矣三結責非理而曰有無之外別有玅道非有非無謂之涅槃牒前所言出有無也吾聞其語未即於心也未解此語故即者契也二雙超不離答文二初章名超境第五超出也境謂色等六塵界上難者先以有無名相求真次徵出有無之所以今顯真體超出色聲妄境故不可以應化為真故前云果出有無之域乃曰超境若了色性本寂有無元真故下云豈曰有無之外別有一有而可稱哉故科曰雙超不離也二正答文二初破汎難三初縱奪破無名曰有無之數誠以法無不該理無不統此縱也誠實也法即萬法理謂物理前有名者所陳有無實能該統諸法道理生則有攝滅則歸無故然其所統俗諦而已奪破也俗諦從緣故有無可統則知前章所明但以俗難真耳二引經破文三初引經經曰真諦何耶涅槃道是俗諦何耶有無法是皆上句問下句答雖真俗二諦不即不離然而難者以俗混真為問故今引經且就不即門以示之涅槃此曰無為既無生住異滅為作之相真諦豈有無可攝也故知前說有無能統者即俗諦且二推釋何則何謂有無是俗諦耶有者有於無無者無於有無而忽有故曰有於無有而忽無故曰無於有有無所以稱有無有所以稱無有其無故稱有無其有故曰無然則有生於無因無生有無生於有離有無無離無無有有無相生其猶高下相傾傾奪也似高下相形奪也有高必有下有下必有高矣三結非然則有無雖殊俱未免於有也有有故有無乃不過有為對待所攝故曰俗諦耳三結責此乃言象之所以形是非之所以生此出過也形現也因有無故言象可現是非可生下責云豈足以統夫幽極而擬夫神道者乎幽極者無為之理幽深以至於極神道者道不可思議故曰神豈以言象是非之理而統之耶二答正難三初明前章意是以論稱出有無者前位體論云果出有無也良以有無之數止乎六境之內覈體中所陳有無二相不過色等六境六境之內非涅槃之宅應化非真實故故借出以祛之祛遣也位體中言出乃假借之以遣覈體中執應之惑二正顯超境庶悕道之流髣髴幽途託情絕域得意忘言總勸離執也庶望也悕求也髣髴者近也幽途者正道也託情者寄心也望求道之人不可任情執而遠真旨當以非有非無正解髣髴近於正道寄解心於絕六塵之域得意趣而亡出有無之言固可求道矣體其非有非無此示正解也體解也真常法體即應化而不可以有無聲色推求方為體解豈曰有無之外別有一有而可稱哉此明不離義若即應而真真不離應故非有無相外別有真佛之體三示前經意經曰三無為者前引之經也蓋是羣生紛繞生乎篤患篤患之尤莫先於有此明經意紛繞者妄心紛飛眾惑纏遶篤重也患害也即善惡等業也由妄動故造業受報故曰篤患推其過尤本因執有而興絕有之稱平莫先於無經說無為為真欲絕有為惑業故權教三乘皆說擇斷惑業永離苦果而證無為方為真實故借無以明其非有假借無為真實以破有為顛倒明其非有非謂無也經中明其虗妄非有非謂無是真實又三乘之人若明有為非有更當了法性真常非謂斷滅之無故不可執權經疑實旨也三兩亦雙非辨二初雙非即離問二即離同時答初中二初章名二正問今初搜玄第六搜求也搜求前章玄旨何以非即又非離耶二正問三初牒前敘疑有名曰論旨云涅槃既不出有無前云豈曰有無之外別有一有而可稱哉又不在有無得意忘言體其非有非無不在有無則不可於有無得之矣不出有無則不可離有無求之矣求之無所便應都無即之不得離之不可恐應無道可求二重述疑意然復不無其道有名者又復疑之云道不可曰無其道不無則幽途可尋既疑有道必可搜尋所以千聖同轍未嘗虗返者也此釋不無所以千者大數也轍車轍有運載義眾聖同以涅槃出離未有不得而却返三界者乃知其道不無矣三搜求玄旨其道既存而曰不出不在必有異旨可得聞乎雖知道存乎不出不在之間未達不出不在之旨故求於聞誨此則解心已庶幾矣音切潢後光切漭莫朗切窅杳音溥怖古切撓女交切焦子姚切痾於何切癘力誓切逵奇歸切燎力弔切恑居毀切憰古穴切
