body:
  text: 姑蘇堯峯蘭若沙門遵式述夫森羅萬象一法印之所謂心也心也者寂然幽邃廓爾沖融無滅無生三際莫之能易非大非小十方不測其形圓明獨曜而無方清淨真常而有在雖靈靈絶待隨緣之色相千荖湛湛亡言普應之音聲萬籟故色心萬物各得其宜蓋得此也聖賢萬行各有所至蓋至此也衆生迷此而輪轉不息聖人證此而圓寂妙常是知非一心而萬法不存法非心也非萬法而一心不顯心非法也故如來出現憫物垂形身雲順感以無邊體離增減圓音隨願而周普理絶名言無形而形若澄潭之落月無説而説譬幽谷之傳聲鹿苑鶴林一大之因緣事畢五天震旦三時之像教流通聖賢迭興古今傳習東晉之世有大法師諱僧肇生當秦國名振異方少習外經後悟釋教決疑於龜茲羅什久居於逍遙譯場立義論之五章佐如來之一化觀夫宏才落落妙解徹於教宗玄旨昭昭深智窮於理域然因緣生滅事有千荖實相本無理同一味但以根後各照二諦不融寧知波水無荖金鐶不別所以列多名而標異立一義以會通建不共之深宗顯大乘之極致然則俗無異真之俗即真之俗諦不遷真無異俗之真即俗之真空露現真俗不二事理雙融非般若無以契真非漚和無以涉俗入俗而真源常顯權心必具於實心契真而俗事匪移實智必資於權智權實之心雙運中觀圓融真俗之境同時一諦凝寂情亡解泯諦觀渾融復本還源強名證道論之深旨綸緒如斯然古今解釋注疏頗多取意求文各隨所見推宗定教曾無一家遂令學者迷文宗途失旨遵式幼從師授虗己求宗後因習學華嚴大經常覩清涼判釋盡開五教取法古師權實之旨有歸行解之門可向常恨此論人亡則難致使深宗固多亂轍今則精研覃思三復竭愚但愧流通之心輒伸鄙作耳熙寧甲寅仲春十有三日南峯西庵序云稽首真應等正覺法性無邊智慧門如實修行諸聖賢願賜冥資釋玄義將釋此論略啓四門一教起因緣二藏教所攝三宗趣總別四隨文釋義今初夫聖賢立論必有所由今明起教因緣略以二門分別一通明諸論二別顯斯文通明諸論者論有二種一曰宗論二曰釋論釋論則隨文釋義無別因緣但由本義深玄則為發起宗論者佛法大海深廣難量權實多門理非一致圓音頓説異類各聞則不須論但以世尊滅後衆生宜樂不等宜經宜論樂實樂權受解緣殊與佛有緣則宜經與菩薩有緣則宜論雖有羣經而弗能領悟是以諸宗立論各被機宜為令隨論知宗隨宗得趣故有小乘論三乘論一乘論興二別顯斯文復二初總明二別顯總明者若原佛出現本為一事因緣但由根器荖殊見聞有異雖以三乘教化究竟唯為一乘不了斯旨多滯化門為令尋派討源得佛本意故此論興二別顯復有二一破二立破謂破權立謂立實破立之意四論即為四門一俗諦破常無常二倒立動靜相即故二真諦破有無二見立真俗理一故三般若破照用有無立權實同體故四涅槃破迷真執應立真應不二故由斯破立即顯真俗互融權實交映理智冥合心境泯亡故立一義為宗以盡究竟深旨中間雖有多緣不過大意二藏教所攝者三藏之中阿毗達磨藏攝二藏之中菩薩藏攝權實教中實教所攝然權實之義理亦多途且依賢首大師以義判教教類有五一小乘教二大乘始教亦名分教三大乘終教亦名實教四大乘頓教五一乘圓教此五相望前前皆權後後並實若據本教自宗各許自實他權今言權實就始終分之前二並權詮未究竟故後三俱實通詮一心故就此權實之中始教有法相破相二宗今以終實對之略敘十義即知此論文義終教所攝一法相立三乘定異實教立一乘無三下論云誠真一之無差又云第一大道無有兩正二法相説五性荖別三乘并無性及不定性實教談一性齊平下云九流於是乎交歸衆聖於是乎冥會三法相立二諦條然俗有真無實教乃真俗互即下云言真未嘗有言偽未嘗無二言未始一二理未始殊四法相説根後各照根本智證真後得智達俗實教談二照相須下云觀空而不證處有而不染五法相説四相前後生屬過去住異屬現在滅屬未來實教顯生滅同時下云一切衆生即寂滅相六法相説理智有異以有為智證無為理實教明能所混融下云此彼寂滅物我冥一怕爾無朕乃曰涅槃七法相説真如凝然實教顯隨緣妙用下云不動真際為諸法立處又云法身無象應物而形八破相説真智了空實教明靈知本寂下云終日知而未嘗知又云智有窮幽之鑒而無知焉等九破相説諸法無性無性為真如實教説本性真常下云涅槃之為道也量太虗而永久又云寂滅永安無始無終湛若虗空十破相説佛德亦空一切智智亦清淨實教明如來具德下云理無不契故萬德斯弘又云佛如虗空無去無來應緣而現無有方所以斯對辨權實昭然廣有義門恐煩不敘今此論義終實所收於理無惑其間或説權義意在會歸下云般若虗玄者蓋是三乘之宗極也誠真一之無差不接權門豈名終實又亦頓明法性下云言之者失其真等又云釋迦掩室於摩竭淨名杜口於毗耶直顯真常即兼頓攝但不明法界性海緣起無礙主伴無盡之義非圓教收若以深該淺以本攝末圓亦收此故曰實教所攝三宗趣總別者能詮所尚曰宗宗之所歸曰趣亦有總別總以唯心一義為宗真俗不二理智混融為趣別有四門一真俗相即為宗第一義諦為趣二權實互具為宗二用無知為趣三以不二理智為宗理智不二為趣四教義詮顯為宗絶解修證為趣由斯宗趣即知四論前淺後深別不過總第四隨文釋義文三初總標題目肇論肇即人名論乃是法以人統法將法從人肇之論故論通諸論肇揀當文以別揀通故凡立題有多種謂單人單法單喻此三復之謂人法法喻人喻或具足者今即單人也論者賢首云建立決了可軌文言判説甚深法相道理依決判義名之為論又云論者集法議論也謂假立賓主往復徵析論量正理故造論者有二不同一宗論二釋論今即宗論宗論復有二一宗經論文義如大乘百法明門論二以經論成立自宗如大乘起信論今論具斯二焉宗本一章即自所成立次下四論各以經論為宗故斯文有所據義有所宗宗論攝也然此總題細詳所立非論主也且此方西域儒釋二宗未聞作者以名自立為目又今觀下五章文勢非如次而作作之既備綸緒不無域內流通人皆寶得雖一一以法標目總推論主之文故以人名題之為總二作者示名後秦長安釋僧肇作後秦國號也當姚帝第二主諱興弘始年中行化正屬東晉安帝義熙同時論主生於秦長安城名即古之雍州僧傳曰釋僧肇京兆人行業如本傳據此示名合在義題之次古者既立總題題下示名此亦無違三正釋本文五章大分為二初一立義標宗後四依宗造論初文分二初標義題宗本義教之所尚曰宗言之所依曰本其猶根為樹本源為水本今以義為所依之本即為所尚之宗宗即是本義者宜也以能依能宗之教必與所依所宗義意符合故義即宗本也或問曰未知以何為宗本耶答曰謂此章所顯一義乃是所宗所依之本下五名及四論是能宗能依之教故知名教宗本於義義為名教之宗本矣次正立義文二一總立義本二別開義門然宗本一篇文有總別開總成別則四論不同攝別歸總同顯一義今初分三一列名二立義三推釋今初列名中五名疏分五段釋之今欲釋名須論詮表且五中前四詮理緣會詮事謂事有千荖總於緣會理有深淺四名統之今欲明理事不二一義之宗先釋理事不一五種名字或曰論主依何法體立此宗義答據斯宗義必依一心法立謂五名中上三詮心體下二詮心用由一心體用同時故得五名義一若然者論文何以不示一心耶不示之意有二一謂心法唯證智可到非言教所及故今但以義顯不以言示此如釋迦掩室淨名默然教外別傳亡詮得旨皆斯意也二謂理事體用三乘教部不説相融大乘極談方明不二今此論意欲會權入實故特散列五名融成一義故不先標一心法也此如毗耶室中五千大士各各先説二法然後入不二門由斯二意即知此論大同起信不無小異良由會權歸實從始入終與直造心性者優劣機異故立教不同也本無此名有二釋一本謂本來無即是寂謂一真心體三際湛然下云非推之使無故曰本無二本謂本源無即泯絶謂萬派歸源名相斯泯然上二釋先則本自是無次乃由無顯本唯第四論詮至於此彼明無為滅度二涅槃義生佛平等理智相泯方契本無實相實謂真實相即相狀真實即相乃無相也此亦二釋一真心本絶諸相絶相之真故稱實相下云實相自無二萬法相寂即真實相然此二釋前直就法體論相後委就諸法推實實由體相本真故得諸法皆實又由即法見實方知法法全真下物不遷不真空般若無知三論通約所詮皆齊此名約境則雙融真俗顯實相約智雙融權實顯實相行人於此似有能所之迹未亡故至涅槃方本無矣若約四論為門不同則唯般若可至於此以權實二智同出於實相法性之體體性常寂故曰般若無知法性法謂軌則任持性乃融通不改真常法體寂寥沖深三際不易令物可解故受法名雖融通於萬物而不失於無分故受性名華嚴偈云法性遍在一切處亦無形相而可得下云法性如是若賢首起信疏云法性者明真體普遍之義通與一切法為性即顯真如遍於染淨通情非情此則法是隨緣萬法性約真如不變斯亦順今所釋但不以法之一字直就真軌持義釋若用隨緣以釋法性者迷之太甚性空性是諸法從緣生滅之性空謂假而無實此亦二釋一以四性推檢萬法不自不他不共不無因都無一實下論云性常自空故二諸法性相於情似有於理實無如夜見繩懼是蛇蛇性蛇相元不有衆生若離遍計情了法依他無實性不真空論真諦為門正齊此名若約所顯第一義諦即詮至實相緣會疏助者為緣親起者為因會謂合也聚也統論佛教多宗因緣窮盡諸法生起之由直破外道無因邪因故實教則指的一心為源相宗皆明從種而有今但就俗諦詮顯故説衆緣合會色心諸法宛然下物不遷論俗諦為門唯齊此名既俗諦門中不窮諸法生起之源故但以緣會之名總該萬法下云一切諸法緣會而生大論云諸法從緣生等或曰此既不明諸法興由寧為盡理之論答曰若約五名非一緣會詮義實非盡理之名今由一義故緣會諸法以本無實相為因妄攬真成全真立妄故下反推緣會直顯本無故知一心真理是萬法親起之因故經云如來藏是善不善因能變興造一切趣生乃至若生若滅華嚴云心如巧畫師造種種五陰或説染法以無明為因及法相説業種親生並是今之緣義清涼疏云以不知三界由乎我心從癡有愛流轉無極故今正順大乘不違教理或曰論中何以唯立此之五名而無增減答若約名教實乃繁多窮理盡性不過此五今略以二諦性相束之即所立無過減之失緣會性空明俗諦性相法性實相明真諦性相本無一名真俗性相俱泯此有三重四句先明俗諦四句一俗相謂緣會二俗性謂性空三俗性俗相俱存謂合上二名四俗性俗相俱泯謂本無次明真諦四句一真性謂法性二真相謂實相三真性真相俱存謂合上二名四真性真相俱泯謂本無後真俗對明四句一俗性相謂緣會性空二真性相謂法性實相三真俗性相俱存謂通下四名四真俗性相俱泯謂本無具此三重四句教理圓滿又信解行證一一皆當具四闕一則並非真實是故立名盡理不過於五矣上釋列名竟二立義一義耳正立義也上所列雖有五名詮義是一所言一義亦有多釋且就五名中釋者上三詮心體下二詮心用已是一心體用故義一也又上四名詮理第五名詮事理外無事全不變以隨緣事外無理雖隨緣而不變理事不二故義一也若據下四論釋一義者即有三門一約境即物不遷論是緣會俗諦境不真空論是性空真諦境真俗不二以顯本無實相法性第一義諦境故曰一義二約智即般若無知論權智涉有緣會智實智觀空性空智權實不二則本無實相法性中道智故曰一義三約證即涅槃無名論應化之身不泯理事境智相故緣會性空也真實之體不存能所理智故法性實相本無矣存泯無礙真應不二故曰一義以斯教義被機則令三乘同歸一佛乘五性同會一佛性行則悲智相導因則空有雙修心則寂照同時觀則理事齊照故曰十方世界中唯有一乘法故立一義之宗以究如來出世大事所以淨名宗於不二法華本於一乘楞嚴究常住一心涅槃明羣生一性故知一義之旨足以統大乘終極之宗矣然此亦由對五名故號一義名既混融義亦無一能一能五非一非五方盡玄微故經亦云一亦不為一為破諸數故此上總義通為四論宗本矣三推釋二先推何則推也既有五名何成一義二釋成一義二初指事釋緣會二一指所詮事一切諸法俗諦事法也謂該世間出世間故云一切各有色心依正故云諸法即緣會名下所詮事法也然前列名約從本以起末則從無住本立一切法法本如是今此釋成約推末以顯本教理如斯故下四論詮理但依教道前前則淺後後則深不過今推釋之意欲使行人自淺之深即末契本是故釋成特反前列中之次也二釋能詮名緣會而生釋緣會名詮事之意染緣會則六凡依正興淨緣會則四聖依正現故十界依正必由染淨緣會而生故欲詮俗諦事法不過上緣會之名矣二顯理明一義四一顯性空理分二一推窮其性又分三一推前際空緣會而生則未生無有上句牒前下句正推生者起也謂觀諸法前際緣未起時無有法之性相故曰未生無有足知現有定屬緣生也二推後際空文二初正推也緣離則滅滅謂滅盡又觀諸法後際緣若離散性相皆滅故將緣散之盡以了緣會非真二縱推如其真有有則無滅先縱後推如其者若彼也若彼緣會之事真實有者則後際無滅今既有滅定了非真也三正推現空以此而推故知雖今現有有而性常自空以用也用二際不有以推之方了現今萬有自性依他故空故中論云因緣所生法我説即是空上句屬物不遷論下句屬不真空論言依他有二一依真理之他二依衆緣之他如波依水又復依風今取後義顯緣會故諸法自性空也二結顯性空性常自空故謂之性空結成也即事顯性空理故然此性空愚法教謂之生空始教謂之二空猶未能即事而顯今即緣會而性空理現故異權小也二顯法性理法性如是此即就緣會性空顯真法性也如是者指上緣會諸法由性空故本性常寂法性是如是矣又如謂真常不改是為離過絶非法性有如是之義意令達事本真故云法性如是然此觸事契理約機有二若由達事法性空方了法性即是權機入實屬漸來也若於事直見法性唯終教機屬頓入也起信云以一切法悉皆真故皆同如故三顯實相理故曰實相前則即事顯真性此則即事顯真相非唯緣會性空本即真性亦了緣會無相本即實相此乃即事見實相理也下云諸法實相謂之般若法華云治生産業皆與實相不相違背故今直於緣會性空立實相名乃云故曰實相然法性實相二名同出以真性無相故實相性寂故四顯本無理實相自無非推之使無故名本無此即事顯本無理也實相本無説有前後義亦同時前但會事歸理以顯實相今明實相之理非由推事見無本來自無故曰本無也前則有理可歸事必會理義當終教今顯理本自寂事理雙亡是頓教義既從淺之深至此之深深故此本無特躡實相而釋又法性顯真性實相顯真相本無顯真體本絶性相此三顯理不無深淺又上五名達緣會則離遍計推性空則了依他顯法性實相本無則證圓成圭山云從緣有故依他無性即圓成故故一義也上辨推釋之文已見論主但會事顯理以釋一義餘一之義皆可意求並如前説釋總義竟二別開義門三一約境雙破有無顯一義二約智雙融權實顯一義三約證雙泯理事顯一義此三節皆總中開出乃全總以成別即為下四論之所宗謂物不遷不真空二論宗境一義般若無知論宗智一義涅槃無名論宗證一義今初文二一假牒問言不有不無者牒彼所言也或曰若言緣會諸法性常自空以成一義何以佛教皆説不有不無二義耶故今牒之此但躡前釋成中云一切諸法緣會而生乃至性常自空故謂之性空之文假躡為問以開真諦不有俗諦不無為下前二論所宗之門顯真俗不二中道理為二論所詮故今不有即上性空不無即上緣會下顯中道即上一義問者但據前名異向下論主約上一義而立故雖開別而不失總此義既不離前故曰假問二辨諦理文二初明二諦文二一出教意以釋問不如有見常見之有邪見斷見之無耳不如二字兩句連用即能破之詞是上二不字也見謂妄解即所破之執上有無也所執雖多不出於二一常見滯有二斷見滯無且凡夫人未達緣生本空見有諸法計常住相故佛教以真諦不有治之故曰不如有見常見之有也又小乘及外道未能即事契真多尚虗無寂默厭患身智故佛教以俗諦不無治之故曰不如邪見斷見之無耳是知佛教真諦説不有俗諦談不無為破斷常二執以佛正見不似斷常二執故曰不如等故今先為出其教意但為直非二見耳二立縱奪以會前若以有為有則以無為無此縱前也為是也前釋中若以緣會是有亦以性空是無成有無二見乃違佛教也有既不有則無無也此奪上縱意會釋前義也既已也前釋中已明緣會之有即性空故不有則知性空之無即緣會故不無則二名一義方符佛教二諦不有不無之門重言無者不無也此約能示二諦有無相即故不有不無是一義也下文方會歸所示一實之義為一義仁王云於諦常自二於解常自一二會一義二初會二諦顯一義中二一正顯遮照夫不存無以觀法者可謂識法實相矣上約二諦以不有不無為門猶未顯門中實示何義今此會前真俗同歸顯中道第一義諦即前緣會性空不二則法性實相理顯夫諦境不過以四句論之一真故不有離增益謗二俗故不無離損減謗三雙照故亦有亦無離戲論謗四雙遮故非有非無離相違謗一二兩句已如前文今但會前明後二句雙遮雙照同時之義以顯中道耳言不存者無所住著也文中無字與下段有字影略互取由前不有不無故不住著於有無故云不存有無即雙遮也以觀法者雙照有無法也可謂下釋成也既用即遮之照故當正遮之時而能了別中道實相法也是謂雖觀有而無所取相此文下亦合云者可謂契法實相矣今影略也是謂者承上之詞雖觀有無雙照也而無所取相雙遮也但反上文令遮照互具中道實相顯於此矣故知緣會性空義一顯法性實相也二述成遮照然則法相為無相之相前則境觀合辨今則各別述成先約境述成言法相者通牒三諦境為是也無相者雙遮真俗相也之相者雙照真俗相也此則於境乃遮照同時成第一義諦聖人之心為住無所住矣次約觀述成也言聖人之心通標一心三觀得此觀者即聖人矣為亦是也住者雙照也無所住者雙遮也無真俗可住故此乃心觀照遮同時成中道觀此中道境觀即上強名之為實相法性也是知諦非觀而不顯融通觀非諦而不能迭耀雖正辨融通之境須約融通之心次漚和般若由此而生二會三乘顯一乘三初總標人法三法等觀性空而得道也三乘者菩薩緣覺聲聞也此三機不等分教定有實教定無等謂齊也觀者鑒照也性空者指前即俗之真理也得道者證中道理也然權教三人在本乘但見真俗迢然理事抗立教理既權人亦有異既為大乘之始始必有終故三乘入實則必觀真俗互融一理無差故説究竟涅槃常寂滅相唯一乘法無二無三今言等觀性空者此明三乘人同觀即俗之真故曰等觀性空證真俗不二中道第一義諦理故曰而得道也清涼疏云始教乃真俗二諦迢然不同終教則第一義諦該通真俗等良以權教三乘之人若信解一義之教則同用一心三觀照一境三諦入實則無異故曰等觀約本是稟權而來猶帶三乘之稱故賢首云或攝界外機令得出出世益者先以三乘令得益後乃方便得一乘者屬同教攝亦名回三人入一此如法華説由此證知正顯會權入實之義故説三乘等觀也若約直進之機便觀三諦融通不必須稟前教今為特顯權須入實實外無權故舉三乘而説等觀也下涅槃論多引法華破三歸一定知其旨如此無性闡提尚許同歸一性況三乘聖賢耶二釋成所觀二初正釋性空者謂諸法實相也先牒上也真不異俗故云諸法也即俗之真是第一義諦故云實相法華亦云諸法寂滅相不可以言宣二辨邪正見法實相故云正觀若其異者便為邪觀此約當教辨邪正若見真俗有異便為邪觀淨名云如自觀身實相觀佛亦然乃至云同真際等法性乃名正觀以他觀者非見佛也今小改其文正用彼義三重通妨難二一牒難縱破設二乘不見此理則顛倒也妨云若據三乘在權大小殊隔何謂於今等觀第一義諦之理耶此將在權望入實為難也故今先且縱破設若二乘到實不見三諦融通之理則與在權滯寂無異故云顛倒也二權實對辨是以三乘觀法無異但心有大小為差耳三乘入實同觀三諦融通之法無異但約在權心慕大小故分差別也法華云若我等有樂大之心佛則為我説大乘法等下論曰般若虗玄者蓋三乘之宗極也誠真一之無差既曰真一無差豈詮大小之心今言但心有大小者此乃實教引進三乘呵彼昔日自抑己靈強分大小耳正如法華淨名所破也昔人所解皆云三乘等觀性空各得道果又以悲智具不具説等觀之人大小心殊遣文粗通於宗甚失遂令教理多合權宗則五名一義之宗何在古者云以深為淺有謗法之𠎝得不慎乎二約智雙融權實顯一義三一牒問略釋漚和般若者大慧之稱也先假外問云若云一義為宗本者則境智皆一何以智有漚和般若權實之二耶故今牒釋之也言漚和是梵音準康師云此翻方便即權慧也般若亦梵音正翻曰智或約因翻慧以揀擇為義約果翻智以決斷為義今取因果合之即因果人通具之實智也或般若通翻智慧以智實慧權分之今亦不取已有漚和目權慧故下云權慧具矣又此二智亦名根本後得如理如量或真或俗皆權實之異名餘至本論釋題中辨次釋云大慧之稱者權實互具悲智兩全雙觀理事方曰大慧大慧一義具漚和般若即中道觀良以權實不二故稱大慧實則窮理權則達事所照既事理渾融能照亦權實相即故亦不過顯前之一義耳又本無實相法性理上起權實照用實則還照於理權則達緣會事權實不二乃契中道一義故知不離前五名一義今約智開為別義立下第三般若無知論之宗本也二返覆廣釋有三一明互具釋大慧諸法實相謂之般若能不形證漚和功也此下約所辨能先明般若中具漚和即俗照真般若實智也故云謂之般若形者現也此智慧中具方便之功不棄接化之心故不現證於理淨名云無方便慧縛有方便慧解適化衆生謂之漚和不染塵纍般若力也次明漚和中具般若也適者出也塵以坌污為義聖人出假導物即方便權用故云謂之漚和此漚和中具般若之力常契真實故不染能所感應之相淨名云無慧方便縛有慧方便解此上權實互資悲智雙運方曰大慧即不二之稱得之者三觀常融耳二約二門別釋二名然則般若之門觀空漚和之門涉有承上文勢故云然則若約二智為門不同實智唯照理故觀性空權智但入俗故曰涉有而皆云門者以開通為義開則二門定異通則二用相關實由不二而二故上辨其通今明其開故各曰門也三返覆釋成一義涉有未始迷虗故常處有而不染先約權門釋一義此句據義從便合云不迷虗而涉有今取文便也又連上權門涉有也今望下段且順義釋之謂即實之權而權不異實聖人得之故能居處於有而未嘗有相可染古所謂涉有而一道清淨也不厭有而觀空故觀空而不證次約實門釋一義謂即權之實而實不異權聖人得之故雖深觀空理未始棄有而證空古所謂觀空而萬行沸騰此上明觀智權實二而不二不二而二成中道觀還契本無實相法性之理即光還自照也故起信中今依真如門修止生滅門修觀二門不二止觀雙融即此義也三結成心觀是謂一念之力權慧具矣一念之力權慧具矣一念者實教行人一念觀心權實互具如車二輪如鳥二翼同一用而不可互闕故今上下兩句結之一念即般若權慧即漚和也好思歷然可解勸成心觀一義之旨思之可解由解發行則般若現前矣三約證雙泯理事顯一義前雖顯真俗理一權實智融但境智之迹未亡能所之相尚在今顯聖凡體一境智皆如一如無二如方為至契也是知前是解悟今明證悟於前五名中即事契本無之理至本無則事理雙絶名義兩亡乃曰證心源之究竟矣一標華梵以牒問泥洹盡諦者假牒外問也妨云若三諦融通則理事無二權實智一則真俗渾融何以教中皆令行人斷妄證真棄事歸理滅盡業果方得泥洹耶故今牒之言泥洹是梵語涅槃之音小轉至本論會釋盡諦是秦音即下論主翻為滅度之義謂滅大患度四流故則妄因妄果盡也亦即第三滅諦故法華云滅盡諸苦名第三諦若會前一義者於一切緣會法直顯本性虗無因果相盡境智雙亡方契究竟一義此為下第四涅槃無名論所宗矣二就盡諦以釋成直結盡而已則生死永滅故謂盡耳此先通明權實二教滅盡之義直者但也意云豈但也結者繫縛義即惑業也生死即是苦也三界輪轉不過此三謂一切衆生本具真常妙性由不如實知真如法一不覺心動妄念紛然強分能所我法執生名曰無明既迷一實故稱為惑迷惑既甚三業熾然造善惡不動三因名之為業由此業故不能出於三界生死縱脫分段未免變易皆因惑業招此繫縛故指惑業名之為結下論云結是重惑是知通以惑業為結也四諦之中即集諦因生死是苦諦果今言結盡永滅者若三乘人始因師教聞熏心所中慧數於見修道中發根後無漏智力斷三界煩惱直至無學位中惑業都盡生死永滅證無餘涅槃方為究竟故結盡永滅乃曰泥洹盡諦若實教行人始因衆生本覺內熏師教外熏惑業心中乃有始覺智興具前一心三觀大慧之力能鑒一境三諦乃悟惑業生死皆緣會假有惑業無性名大菩提生死性寂號大涅槃此則於結乃斷而無斷故云結盡生死則滅而無滅故云永滅是知兩教通以盡惑業苦三方名盡諦故今文云豈但結盡名盡更須生死亦盡故謂之泥洹盡諦耳三顯一實異三乘無復別有一盡處耳前雖明權實行人皆以妄因苦果滅盡以為泥洹猶未辨權實斷證何以為異耶故今云無復別有妄苦可盡之處以為泥洹也謂實教行人但悟心性常寂元無妄因苦果之相可得以何為滅盡之處斯則了妄名滅實無可滅之相既無妄可滅亦無真可證方為真滅豈同三乘行人實斷實證別有真如界以為妄盡之處故圓覺云知妄即離不作方便又云知是空華即無輪轉楞嚴亦云殊不能知生滅去來本如來藏妙真如性而於其中求其去來迷悟生死了不可得是則大乘教部究竟所説並不過此故今明之立下第四論之宗本義上釋宗本義竟音切泐力得切璞普角切繭古典切甍眉耕切憩去例切機飢雉切睿以芮切繕善音龜茲上丘音下慈音琰弋冉切核胡革切搜所鳩切汰他蓋切臧則郎切否否音箘奇隕切蚌步項切畎犬音廩力荏切猥於隗切宴烏見切昉甫往切蠱公戶切繪胡檜切雍於龍切盱以俱切鐫子全切齏祖稽切馭魚據切牘徒木切詰溪吉切畔蒲半切考考音森所今切邃雖遂切復方復切迢徒聊切抗可浪切𠎝去乾切坌蒲頓切沸方味切泥洹上奴雞切下胡端切
