body:
  text: 姑蘇堯峯蘭若沙門遵式述二即離同時答文二初章名妙存第七妙謂微妙不可思議也存謂在也涅槃之道在乎不出不在之間而不可以出有無在有無思議故曰微妙矣何也涅槃妙道非有無而不離有無非有無故不變真常即有無故隨緣起滅雖隨緣而常不變故不在有無雖不變而常隨緣故不出有無不出有無故應化即真不在有無生滅非實故曰微妙之道存乎不即不離之間矣二正答文四初顯超言念三初敘名相有無無名曰夫言由名起名以相生相因可相此敘有也可相者執相也徧計執之故有有無相生由相立名因名致言故可以言而求名相也無相無名無名無說無說無聞此敘無也若離徧計則相滅名亡無名可說以何為聞則有名者求聞於道殊不知道無可說以何為聞也二陳涅槃超絕文二初引經經曰涅槃非法非即有無法故不在也非非法非離有無法故不出無聞無說非心所知合云無說無間取文故不可以是有無非有無而說之故無聲名句可聞亦非解心所知所謂言語道斷心行處滅也二陳意吾何敢言之而子欲聞之耶理圓言偏言生理喪論主既不敢致言難者欲何可聞三明假言顯旨雖然擬議之辭雖然理絕言詮善吉有言眾人若能以無心而受無聽而聽者吾當以無言言之此明假言詮示也梵云須菩提常途三譯一云善吉無心而受等者受言無執心聽言無聞惑此二句似同而別聞聽屬耳識執受屬意識此則耳識及同時意識聞教受義無執滯於斷常故曰無心而受無聽而聽也受法之機無惑說法之者可以寄言既以無言之言而說無受之受而聽則說者聽者同符玄默淨名亦云夫說法者無說無示其聽法者無間無得斯之謂歟庶述其言亦可以言庶望也汝既欲聞吾於無言之中亦且寄言二正示妙存文三初引經標宗淨名曰不離煩惱而得涅槃天女曰不出魔界而入佛界此標妙存之義宗竝引維摩詰經前即阿舍利弗章全文次則觀眾生品意彼云天女曰佛說婬怒癡性即是解脫煩惱者根本有六隨有二十魔者具云魔羅此云殺者即婬怒癡等殺慧命故界者性義佛此云覺然三乘教皆須伏斷根隨煩惱種習俱離方證無為真理永斷婬怒癡性方入佛性斯則離妄為真未得一切解脫故今欲令其人究竟滅度則了煩惱實性本無生滅故曰無為又邪魔正覺體性無異故不出婬怒癡邪性證入真覺正性性無邪正故也然淨名據事理不二天女約真妄體同故此二文語異而意同觀其大旨正在妙存謂煩惱魔界是有無所攝今既得涅槃入佛果故不在有無也又涅槃不離煩惱佛界不出魔界即不出有無也是則涅槃佛界猶是對妄之真不出不在真妄兩亡方曰妙存玄道矣二釋經玄旨然則玄道在於妙悟玄道當以微妙而了悟不可以情計而測度妙悟在於即真悟微妙則在於即事而真即真則有無齊觀齊觀者有無即真故不出與不在齊觀也齊觀則彼己莫二出有無曰彼聖也在有無曰己凡也即出而在即在而出故彼己不二所以天地與我同根萬物與我一體天地萬物皆有無所攝我者涅槃妙理非有無也玄道在於不出不在之間故天地萬物與我涅槃同不二之根體同我則非復有無異我則乖於會通萬物同真則有無自盡有無與非有非無有異故乖於會通之道所以不出不在而道存乎其間矣釋成妙存此則理事存泯同時方為正解也三重徵再釋何則何謂不出不在道存乎其間夫至人寄人顯法虗心冥照理無不統雖有能證之人無別所證之體故能照之心虗而冥寂即所證理不二之理無不統攝懷六合於𮌎中而靈鑒有餘鏡萬有於方寸而其神常虗懷藏也𮌎中內也六合者四方及上下也靈鑒心也有餘者莊生云焉猶有餘地者哉蓋美道之無際也且六合已無邊表藏於靈鑒妙心而靈鑒之心猶有遺餘此則絕待之體無處不周非謂大有一物都包六合而更有餘鏡喻也方寸與神皆心也鏡現萬象而常淨心現萬有而常虗上句釋天地同根此句釋萬物一體至能拔玄根於未始即羣動以靜心恬淡上淵默妙契自然上標至人此顯能德能如是證也拔取也涅槃玄根無始無終唯聖人得之羣動者二死兩障是羣數擾動之物即此契於寂靜妙心故淡默之理本自如然方曰妙契故曰妙存所以處有不有居無不無此則即不出而不在有無也居無不無故不無於無處有不有故不有於有此則即不在而不出有無也故能不出有無有無即真故而不在有無真非有無故者也結成也三述成真旨然則法無有無之相聖無有無之知理事平等為所了境真俗不二為能了智故智無有無知境無有無相境即前第一義諦智即前般若無知耳聖無有無之知則無心於內智體本無妄想法無有無之相則無數於外第一義諦本無名相於外無數名相即無如如於內無心妄想即正智此彼寂滅物我冥一正智如如不二理智冥無二體故無如外智能證於如亦無智外如為智所證故曰物我冥一怕爾無朕乃曰涅槃怕謂寂怕無理智之朕迹平等無二故曰無為涅槃無名正解圓於此矣涅槃若此圖度絕矣圖量測度也在有無出有無俱不可量度此則言語道斷心行處滅四結責前非豈容可責之於有無之內前覈體中以有無名相推責涅槃真體故今責之又可徵之於有無之外耶又前徵出中出有無求涅槃真體今亦責之又搜玄中雙問不出不在之旨故今雙遣之是知妙道存不出不在之間而不可以不出不在而求故曰妙存此上就真應明等解竟次四對三乘明等行文二初通對三乘行二別對菩薩行初中三初對三會一文二初解一疑三問又二初章名難差第八難謂難問也差謂差異即三乘及菩薩有諸位差別此因上說物我冥一乃曰涅槃則平等一味更無高下何故修證此法人有三乘位有高下此則以解中法一難行中人差也二本文三初牒前法一有名曰涅槃既絕圖度之域則超六境之外不出不在而玄道獨存牒前也斯則窮理盡性究竟之道妙一無差理其然矣結成法一易云窮理盡性已至於命今於心境諸法窮緣性理極於真性真性平等人法不二方為究竟妙一之道境智無差之理定當如是故前曰物我冥一乃曰涅槃二別敘人三中二初通疑三乘而放光云三乘之道皆因無為而有差別此經亦同金剛云一切賢聖皆以無為法而有差別聲聞緣覺菩薩因證無為而有淺深故有三乘差別二別疑菩薩佛言我昔為菩薩時名曰儒童於然燈佛所已入涅槃儒童菩薩時於七住初獲無生忍進修三位梵云摩衲婆此曰儒童經說釋迦因中實經三阿僧祇劫初劫滿遇寶髻佛時位在初地次劫滿遇然燈佛時位在七地後劫滿遇勝觀佛時位在十地今據次劫滿時故曰七住初在然燈佛所也七住即七地古多此譯若以七住約下賢位第七即合云進修三十三位又初劫尚未滿非值然燈時故知即七地也又仁王以五忍配位無生忍在七地位中得故言已入涅槃者證無為理也若約始教初地已來分證無為若約終教初住證真今約七地說證者據獲無生忍深證悟說非謂前地未證無為以七地已前未得純無相觀七地已後有相有為永不現前故說七地已後入純無相觀於無相觀進修八九十之三位如順流舟自然流入薩婆若海據斯深證故曰已入涅槃言獲無生忍者華嚴七地云菩薩住此地善淨無量身語意業無相行故得無生法忍光明今引佛意但欲明證法之人證一味法何有諸位差別三以一難三若涅槃一也則不應有三人得平等法不應有三乘及三位高下故如其有三則非究竟人既得法有三則知法非究竟一味究竟之道而有昇降之殊昇降即高下若皆得究竟一味何以有昇降殊異眾經異說何以取中耶中正也若以眾經之說與論旨有異取何為正義也此下先答三乘至第十四章再問三位二開一成三答文二初章名辨差第九以涅槃法一辨別三乘人差別皆即一而三三皆即一故曰辨差然既一而三之義正為開顯三乘即一佛乘不礙存三乘斷證行相故教義章云一切三乘本未悉是彼一乘法何以故以三乘望一乘有二門謂不異不一也初不異有二一以三即一故不異二以一即二故不異二不一者此即一之三與上即三之一非一也今論正用彼不異門中二義此章是一即三故辨差是三即一故會異既一乘不待泯三乘故後章明漸廣有句義如該攝門明之二正答三初領前法一無名曰然究竟之道理無差也以三乘歸一佛乘方為究竟之道十方佛土中唯有一乘法無二亦無三故理無差然此一乘體即一心法本具智慧德相為佛正因故起信云摩訶衍者總說有二種一者法二者義所言法者謂眾生心是心則攝一切世間出世間法依於此心顯示摩訶衍義賢首疏云法者出大乘法體義者辨大乘名義又云出其法體謂如來藏心具三大義故名為大也有二運轉故名乘也是知究竟大乘法體名義全依具德一心故理無差也二開顯三乘文二初開一為三文二初引經顯法華經云第一大道無有兩正古譯經文最上無過故云第一無涯融通故云大道絕待無二故無兩正非獨超越諸乘故云第一實由一乘體外無別諸乘方稱第一也吾以方便為怠慢者於一乘道分別說三正辨差也為對三乘之機故說一乘以為三乘即無差而差也吾我也即佛自指方便者權方宜便故怠慢者慢有多種心不能速進曰慢怠謂懈怠但機劣根鈍不能直進一佛乘皆曰怠慢之者分別說三三轉四諦為聲聞乘十二因緣為緣覺乘四心六度為菩薩乘故法華云為求聲聞者說應四諦法等然此三乘能乘是智智有單雙所乘是理理有偏圓謂二乘但得生空智見生空理但除我執斷煩惱障自求滅度耳於中根稍利者能觀三世因果十二因緣名為緣覺根鈍者唯觀現在因果名曰聲聞若菩薩者得二空智見二空理雙除二執雙斷二障雙行二利名曰大乘故法華云內有智性自求涅槃是名聲聞乘求自然慧樂獨善寂深知諸法因緣是名辟支佛乘求一切智利益人天是名大乘此則全一成三皆方便教也二引喻指三車出火宅即其事也秦譯法華有三車喻長者於火宅中告諸子言羊車鹿車牛車今在門外而三車無實故賢首云界內示三車為教出為義而教義無體故今指云即分別說三之事也二開三為一以俱出生死同稱無為三乘人俱出三界生死各得無為自果法華云但盡生死其實未得一切解脫如諸子得出火宅到無畏處而未得車故清涼大疏以始教名三乘同教謂同出生死同坐解脫牀即此中文意所乘不一故有三名乘六波羅蜜十二因緣四諦理不一故有三乘如諸子雖同出火宅而求車有異統其會歸一而已矣統攝會歸也三乘皆一乘之方便究竟皆得一切種智故此顯差即無差也如宅內三車皆為賜白牛大車之方便到露地已等與大車故賢首云若先以三乘令其得益後乃方便得一乘者屬同教攝亦名回三入一教如法華說又清涼疏終頓教名一乘同教謂同歸一乘即今文意三答前所問四初牒前正答而難云三乘之道皆因無為而有差別牒前也此以人三三於無為方便教中由人三故說三乘各證無為有三也非無為有三也遣疑非謂所證無為本性有三差別是知宗本法體不失常恒一相也二引經證答文二初引經故放光云涅槃有差別耶答曰無差別一乘大道理無二故但如來結習都盡聲聞結習不盡耳結謂結使有五利五鈍依無明起即二障現行習謂習氣即二障種子或種子之後開習氣俱是微細但開合有異聲聞但斷煩惱結習未斷所知故結習不盡唯佛如來金剛道中二障種子方畢竟盡或云聲聞斷結不斷習故云不盡人以聲聞斷惑最淺望佛斷惑最深以例中間三乘賢聖皆由斷惑差別故涉理有淺深非謂無為理性有三此則開三會一皆大乘同教義矣二立喻請以近喻以況遠旨近取其事以況深理如人喻三乘人斬喻斷也刀喻三乘智木喻二障惑去尺無尺去一尺木得一尺無喻如來以二空智伏斷二障雙得二空去寸無寸去一寸木得一寸無喻聲聞伏斷煩惱單得我空此上喻人有差別脩短在於尺寸不在無也脩長也約斷木有尺寸故說得無有尺寸差別且所得尺寸之無即太虗空不可言其短長也故知三乘人斷惑不同故說證有高下若以三乘所證之理即真心之空則無為本無差別三敘根行答文二初正敘有差夫以羣生萬端萬是大數端者緒也此句總言下別明識根不一識心明則根利暗則根純於利鈍中熏習有邪正於正熏中復有多種故云不一也智鑒有淺深由熏習不一故從聞思而發智鑒答有深淺照理亦異所謂生空及二空故德行有厚薄德得也行之所招曰德鑒生空者多行自利鑒二空者兼四心六度雙行二利自利者行劣德薄二利者行大德厚此皆由利鈍熏習所致故有三乘不同也二釋成無差所以俱之彼岸梵云波羅蜜此云到彼岸生死為此無為為彼三乘所證理實無二故曰俱之而昇降不同觀現在苦集空者下乘也了三世因緣空者中乘也達我法二空者上乘也故於空理有昇降也彼岸豈異異自我耳真空理性則無異但由三乘人見有差別若會淺深之見俱到無差理性即三而一故曰同歸此則不待泯三而一乘現矣故演義云若約三乘理行即是一理佛因則會取昔三為今之一若約教果即癈三立一則會於昔三歸今之一今明會取廢立自顯故也四結會眾經然則眾經殊辨其致不乖前云何以取中今中諸經所說三乘必歸一致此理不乖斯為正義二推三得一文二初一異無三問文二初章名責異第十責問也異者三乘人異謂疑能證所證一亦無三異亦無三責問三乘因何有異然前難差但約人法一體法一不合人三今問一異俱無三乘此欲令知會權歸實之教不壞三而常一特為此問二正問三初法喻定難有名曰俱出火宅則無患一也喻也無患者到門外也同出生死則無為一也法也三乘同出界內生死證真理一也而云彼岸無異異自我耳牒前文彼岸則無為岸也我則體無為者也定前名義前說彼岸是所證無為理前云我是體究能證之人也二正陳疑難文二初開兩關請問有名者請問無名家我與無為為一為異前說法一人三未審人法為同一體為各有體二立二問中二初難同若我即無為無為亦即我人即法法即人更無二體不得言無為無異異自我也人法既一如何說法一人三耶此以妙存中物我冥一難辨差中法一人三也二難異若我異無為人法有異體者我則非無為則三乘人不以無為為體無為自無為法自是一無為理我自常有為三乘人異無為法自屬有為也冥會之致又滯而不通冥契也會合也則一切聖賢皆證真之義滯而不通何名物我冥一曰涅槃耶此但翻前難也三結三乘無由然則我與無為一亦無三此中正責異也人法體一法定一則人無三矣異亦無三人與法異則非聖賢何有三乘也三乘之名何由而生也由因也未知三乘名字因何而有二人法一異答文二初章名會異第十一會謂會融異則三乘殊異前問人法一異俱無立三乘之由今明一中有三非異中有三也此則一乘是立三乘之由謂一無為法巧順三機故今融會三乘即一而異故曰會異如即水之波波異今會波歸水曰會異前教章以三即一故不異即此章明之二正答五初正答問無名曰夫止此而此適彼而彼此立迷悟二門止住也適造也此即生死彼謂無為迷真理則住生死而曰此岸悟真理則造無為而曰彼岸是知理無高下人有悟迷今明真理隨迷悟二緣故有聖凡二相下明隨緣之義云所以同於得者得亦得之同於失者失亦失之真理隨悟緣則同三乘之得者則三乘得者皆得於無為真理隨迷緣則同凡夫之失者則凡夫失者迷失於無為此則迷悟得失在人人有多端凡夫失者尚不離真況三乘聖賢豈離真而有異也我適無為我即無為我者三乘人也三乘皆造無為法則三乘皆即一乘故曰物我冥一無為雖一何乖不一耶法雖是一證有淺深故不妨三故曰一切賢聖皆以無為法而有差別也此同法華中開顯三乘即一乘而不待泯三之意故云何乖不一彼云汝等所行是菩薩道漸漸具足悉當成佛等文二舉喻答譬猶三鳥出網同適無患之域三鳥在網喻凡出網喻聖既出網鳥空空無患礙無患雖同而鳥鳥各異三鳥在空必有遠近之異喻三乘證一理有淺深不同不可以鳥鳥各異謂無患亦異不可以鳥三而說空有三喻所證一理無差又不可以無患既一而一於眾鳥又不可以空一而一於三鳥喻能證三乘自異然則鳥即無患無患即鳥無患豈異異自鳥耳此結喻也由三鳥冥虗故說同空有遠近以喻三乘契理一理有淺深也三法合答如是三乘眾生合上三鳥俱越妄想之樊樊謂樊籠合上出網同適無為之境同得無為之法合上同到太虗無為雖同而乘乘各異法本自一人根有三不可以乘乘各異謂無為亦異不可執權教三乘而廢一實以理無二故又不可以無為既一而一於三乘也又開顯一實不待泯三乘以根有優劣故然則我即無為無為即我三人同證一理一理隨根有三此則答前物我冥一也無為豈異異自我耳法自一人自三此答前彼岸豈異異自我耳前則異中辨同此則同中辨異四釋所以所以無患雖同而昇虗有遠近釋喻也無為雖一而幽鑒有淺深釋法也理雖一味二乘但以生空智鑒曰證生空真如菩薩以二空智鑒曰證二空真如則人有利鈍鑒有淺深而所證理等無高下五結成答意無為即乘也乘即無為也結人法不異也此非我異無為以未盡無為故有三耳結一乘不待泯三非謂人三異於法一但於一法未能究盡故有三乘就一明三文二初法同人異問中二初章名詰漸第十二詰難也漸階次也因聞上法同而人異故今詰難既同證一法何以人有三種之漸次耶二正問三初明斷證同文二初汎陳迷悟有名曰萬累滋彰本於妄想迷也惑障不一故云萬皆能纏縛有情曰累滋多也彰顯也妄想者無明也由迷至理妄念忽動萬惑俱興也妄想既祛則萬累都息悟也三乘同證無為破妄出纏只合等無高下此以三乘俱破惑出離同證一理疑三乘人未盡無為之漸也二正敘所同三初智同二乘得盡智即生空智我生已盡故菩薩得無生智即二空智推檢我法四俱無生謂不自不他不共不無因故生之與法無生故空又清涼五地疏云盡無生智者無生是滅因亡曰盡即盡智也後果不起名為無生即無生智此盡無生是其滅體無學之智如是而知意在取滅為滅諦道據斯所釋則二乘但以因亡取滅曰盡智菩薩兼果喪為滅曰無生智乃道諦中智有上下取滅有淺深故分二名也二斷同是時妄想都盡本除結縛永除末喪也是時者三乘到無學之時也言妄想都盡者惑除也三乘無學俱無發業潤生故曰結縛永除三證同結縛既除則心無為三乘既無十使繫縛則障盡智圓同契無為真理二乘以我空證菩薩以二空證也然三界繫縛正在煩惱障能發業潤生故所知障即無此能但以菩薩入假利生恐障法空理故須雙伏雙斷今就三乘出離證真俱約煩惱障論故云結縛永除則心無為也心既無為理無餘翳三乘心契無為於理更無餘障二引證同義經曰是諸聖智不相違背不出不在其實俱空此引證智同也雖所了生空與二空不同而能了智不相違背大悲菩薩了三界故不出一切二乘離三界故不在其實俱證空理故同也又曰無為大道平等不二此引證所證理同故也既曰無二則不容異二再定理智同一之義既曰所證理無二則知能證心不可說異也三正詰漸次不體則已體應窮微而曰體而未盡是所未悟也體者解也三乘起智斷證既同同證空理本合歸一不解則止而不論解則必臻微妙何以前云未盡無為故有三耳未曉此旨也此一章為乍聞實教談一理無差之人未曉權中差別之旨便欲壞三立一而不知實教接權但就三會一非獨即三而一亦不妨即一而三不知此者未為得旨耳二就法顯人答文二初章名明漸第十三明辨也辨別同歸一乘之人從權入實本有三乘之漸次既知全一成三故明三乘之漸次也二正答三初領前法一無名曰無為無二則已然矣人雖於理有偏圓理本無二是故究竟真實同歸一乘無二之法理當如是矣二責前人同結是重平惑而可謂頓盡亦所未喻此約方便教中三乘顯然以機不等故結者二障分別俱生即用也惑是無明即體也無明體上重重之結故云重惑二乘但伏斷煩惱菩薩伏斷二障三乘五位位位漸除而前曰妄想都盡結縛永除故亦未曉此旨是知即實而權則三乘顯然即權而實理同一味但謂一理無差便泯三乘修證漸次者未為知悟也三正答漸次四初法喻正答文二初引喻經曰三箭中去的的謂紅心三箭同中一的喻三乘同證一理三獸渡河象馬兔三獸同渡一河喻三乘同斷三界結惑中渡無異而有淺深之殊同中一的同渡一河則無異喻同斷結惑同證真理而三箭到的有淺深三獸入河有深淺各別喻三乘斷惑有深淺證真有漸次者為力不同故也為者由也由為三箭三獸力有大小故入水中的有淺深之三非為河的有異也二法合三乘眾生合三箭三獸俱濟緣起之津濟渡也津河也緣起則十二因緣以法兼喻也合上渡河同鑒四諦之的合上中的然四諦十二因緣三乘別說互不相通如前引法華云為求聲聞者說應四諦等若約互通自有二義一通觀義如經云上智觀苦得菩薩菩提中智觀苦得緣覺菩提下智觀苦得聲聞菩提上上智觀苦得佛菩提則知二乘同觀四諦通離十二因緣三世因果但智用利鈍不同二互觀義說合十二因緣中過現五支因為集諦現未七支果為苦諦則聲聞觀苦集已了十二因緣辟支觀十二因緣已了苦集證滅修道二乘皆然但不如菩薩大悲行願長行六度爾菩薩五六雙修圓證二空豈不達三世因果具道滅耶此則三乘行門互具故緣起四諦通三乘斷證今論本意正約斷證二門以緣起是三世因果不出惑業苦三則三乘通斷故云俱濟緣起之津四諦是諦審世出世因果如實真理不過二空三乘通證故云同鑒四諦之的三乘既通名出世證真故不約別分行相也絕偽即真合上渡無異同昇無為合上中無異三乘人同離三界生死同到無為彼岸也然其所乘不一者亦以智力不同故也所乘不一者指三乘智行不同也聲聞乘我空四諦出緣覺乘我空十二因緣出菩薩乘二空六度出何故如此下云謂智力有大小不同故也合上淺深之殊為力不同也故知諸佛本意普欲令其如我無異為彼智力未及教有漸次也二校二乘智量夫羣有雖眾然其量有涯羣者不一之謂萬有也言其萬有則通一切有境若在佛智必盡無邊正使智猶身子辯若滿願梵云舍利弗怛羅此云身子弟子中智慧第一梵云富樓那此云滿願亦云滿慈弟子中辯才第一窮才極慮莫窺其畔窮極二聲聞辯才智慮不能窺度羣有之邊畔況乎虗無之數重玄之域其道無涯欲之頓盡也虗無重玄即一佛乘真常妙道橫豎無涯如何欲令二乘盡證有邊事相尚未盡知況無邊法體豈能盡證則知二乘淺智力劣故有階漸也三引外書明漸書不云乎為學者日益為道者日損書是道經今借文用為者修義學者斆也道者履於性也修學者日益於見聞知解修道者履於自性也則日損於知解惑結吾教有學有修止在於等覺為道者為於無為者也為於無為而日日損此豈頓得之謂修無為者解惑漸除而無為漸現此非頓得之言謂要損之又損之以至於無損耳此三句位位皆有即諸位中入住出之三心即加行正行勝進行之三行如斷初地惑在地前要損名加行入心要者欲義也入初地時又損即正損名正行住心至於無損求進二地名勝進行出心則地地皆有此三行三心至於無所損者方惑亡解喪心境一如故地地皆證一分真如又要損在三賢又損在地上至於無損在妙覺也此則約始教斷實惑說若約終教無斷而斷雖惑本自真而真隨惑緣亦能隨斷緣亦不妨斷故楞嚴云理雖頓悟承悟併消事非頓除因次第盡若無惑可斷義即歸頓矣四引經結智用經喻螢日智用可知矣淨名謂富樓那云無以日光等彼螢火螢光喻二乘曰光喻菩薩此據三乘對辯則知智有優劣也二別對菩薩文二初一乘諸位問文二初章名譏動第十四譏者責也動謂進修之心此問再敘前難差中疑此則通疑證真之人既心境冥合何故更有進動若據始教法相宗初地已得證真今約七地難者就三乘教論菩薩乘中至七地時入純無相觀得無生忍深證真平等法人既即法亦無心境二相所謂物我冥一絕於圖度何故更進後地三位別有所求七地尚爾況前地耶此以人法同寂譏責於進動二正問三初牒經動寂有名曰經稱法身已上入無為境此即前引儒童於然燈佛所已入涅槃涅槃此云無為法身者法謂法性身者依也以法性為依則證真者之通稱今約七地已上曰法身者謂純無相觀常依真理以法為依以真為體故又純無漏功德法分積聚故心不可以智知無分別心非分別智可知形不可以象測法身非質礙故形象不測體絕陰入所得法體離五陰六入心智寂滅能證心智純無漏觀無功用道寂滅無相如順流舟也此即前所謂物我冥一也而復云進修三位積德彌廣即前云於七住初獲無生忍進修三位更勝進後地慕廣大功德也二以動難寂夫進修本於好尚積德生於涉求生好尚心動涉求念好尚則取捨情現涉求則損益交陳取後位捨前位棄損無明增益功德既以取捨為心損益為體而曰體絕陰入心智寂滅以上動用疑寂滅義三結成相違此文乖致殊而會之一人無異指南為北以曉迷夫既動寂文義殊乖而會同七地一人豈了動寂之異有似以南為北豈能指迷者令曉南北殊方也二位位寂滅答文二初章名動寂第十五動是用寂是體謂行人修因契果斷惑證理皆以前般若為能修也謂以無知之般若修即真之因契如實之果斷不異真之惑證寂滅之理是則能所斷證即寂滅相動而常寂故曰動寂故清涼云良以非真流之智無以契真何有飾真之行不從真起此據實教入住已來直至究竟始終如此非謂七地已後方得動寂不二此論一乘正行在此章顯示二正答四初顯所修之行文三初引經總標無名曰經稱聖人引經通標證真起實行之人無為而無所不為為者作也三慧中屬修慧謂若稱真則無惑可斷無理可證無行可修無位可得故曰無為心雖明了力不自由見有幻相未除空塵不說當以如幻之智斷幻惑證幻理修幻行求幻位故曰無所不為直須斷至無斷證至無證方曰究竟今就因門從解起行則無斷而斷無證而證故曰無為而無所不為寂而常動動不乖寂也大意如是故曰總標二釋成大意無為故雖動而常寂釋上寂義修即無修是即動之寂無所不為故雖寂而常動釋上動義無修而修是即寂之動雖寂而常動故物莫能一無修中起修能所修相不一雖動而常寂故物莫能二修即無修能所一相物莫能二故逾動逾寂物莫能一故逾寂逾動逾過極之義言不二則能所同寂此乃即至動而見至寂言不一則二相宛然即至寂而見至動上則即隨緣同不變次乃即不變而不壞隨緣故動寂二名言之似異義實同時三結示所以所以為即無為進修即寂滅無為即為寂滅即進修動寂雖殊而莫之可異也事理二行名殊義一也二明能修之心五初引經標義道行云心能修之心體是本覺用即是智位位各具入住出三心通根本後得亦不有亦不無心體真實本非有無亦無能所修相泯同平等故華嚴亦云無有如外智亦無智外如今正約照用不滯二邊空有之病非唯所修之行為無為不二能修之心照與無照亦乃同時故云亦也二釋經大意不有者不若有心之有不無者不若無心之無寂照同時非有無二心故經曰不有不無三逆順推釋文二初問何者問上不若有無之義二釋文二初反釋責非有心則眾庶是也眾庶者不一也指三界眾生心皆有作攀緣釋上有心也無心則太虗是也釋上無心也眾庶止於妄想太虗絕於靈照豈可止於妄想絕於靈照標其神道而語聖心者乎進修所謂動此是以妄想語聖心又謂入無為是寂此是以太虗標神道焉可以邪而求正道二順釋正理是以聖心不有不可謂之無聞說不有寂而常照不可執無聖心不無不可謂之有也聞說不無照而常寂又不可執有此遣隨言執也不有故心想都滅想謂取像能證之心既無取著故經曰不有也不無故理無不契無不契者盡契真理能契之心非無故經曰不無也理無不契故萬德斯弘弘大也萬德者稱性之德不一故起信云如來藏具足無量性功德故心能證理則稱理之德一一廣大無涯故曰斯弘心想都滅故功成非我須菩提云我不作是念等況大乘菩薩能所一相心想都亡豈有我心成就功行故曰非我四結成所以所以應化無方未嘗有為達俗不妨證真動而常寂寂然不動未嘗不為證真而常達俗寂而常動五引經證義經曰心無所行平無所不行信矣行者斷惑證理修因契果皆名曰行行能行之心動寂同時斯可信矣三引前結示三初正引二初引前經儒童曰世尊因地為菩薩名曰儒童前難者但見文違未見意順故今亦就儒童所說引不二之義令彼信悟故昔我於無數劫以國財身命施人無數七地二僧祇劫滿故說昔曾以國位財寶捨身分或盡命以此內外財行施不可知其數量以妄想心施非為施也妄想不一所謂求佛果進上位要行滿欲因圓但有能所修相皆曰妄想竝非稱實之行也今以無生心五華施佛始名施耳智虗無生為能修心五華施佛體即無生為所修行能所同真而不壞以華施佛始名稱實之施豈動寂有異也言五華施佛者經說佛因中昔名摩衲婆此云儒童買五莖優鉢羅華即青蓮華施然燈佛此時心詣無生三輪同寂故然燈與記釋迦牟尼金剛亦云以實無有法得菩提故然燈受我記也二引別經又空行去呼菩薩入空解脫門入者證也解脫門有三一空二無相三無願今舉初攝後故言解脫謂離繫縛根本智為能入三解脫為門戶由此故能於一切法證真如性故曰入空解脫門此則以智契理耳方言今是行時非為證時方者始也菩薩但行三解脫行不求證三解脫相此則正行行時不見行相也非獨儒童空行菩薩亦爾二結成然則心彌虗行彌廣終日行不乖於無行者心也結上也彌極也既以至虗之心造行則行亦寂滅尚無二相豈有行耶三廣示是以賢劫稱無捨之檀賢劫經也梵云檀那此云施即六度之一也三輪同寂雖無捨而施行彌勤故曰之檀成具美不為之為成具經也此通一切竝皆無作而作禪典唱無緣之慈禪經也能緣所緣理同一味故無二相而大慈拔濟不息即四無量之一也思益演不知之知思益經也能修之智無知而知此即根後二智此四句經古人多配六度唯初後義現二三兩句文引難對今但隨文釋之此皆即真之行行行全真菩薩造修必當如是故起信發心先信真如及三寶故四責非玄悟文二初責其所執聖旨虗玄殊文同辨聖教旨趣虗寂玄微唯智可了非情所測動寂之文有殊不二之義同辨豈可以有為便有為無為便無為哉責前聞動執有為聞寂執無為菩薩住盡不盡平等法門不盡有為不住無為即其事也此引淨名經香積諸來菩薩向佛求法當還本土佛告曰有盡不盡平等法門汝等當學何謂盡謂有為法何謂不盡謂無為法則菩薩當住平等不住二邊不盡有為即有而無不住無為即無而有即菩薩動寂不二之行故云即其事也二斥其非喻而以南北為喻殊非領會之唱南北之方定異寂動二行常一將定異而喻常一豈能領解也已上顯等行畢後二就人法示等證文二初明人法同異文二初先後窮源問文二初章名窮源第十六窮謂推窮源謂本源前章已知一乘正行動寂同時今則行成必證未曉證法之人人法誰先誰後先者為源二俱有過故推窮之二正問二初先人後法過有名曰非眾生無以御三乘御者進也先有人方可進御三乘因行理合云御一乘今約從凡入漸漸必歸實據昔曰三乘也又問者多約權難實故也非三乘無以成涅槃非三乘行人無以成就一無為法然必先有眾生後有涅槃此則人在先法在後以人為源也下出過去是則涅槃有始有始必有終有為有始終無為無三世豈容有始終耶二先法後人過而經曰涅槃無始無終湛若虗空豎窮三際故無始終橫徧十方故湛若虗空則涅槃先有涅槃體常故先有下出過云非復學而後成者也無為既本有何假學者解行成就此果耶難者謂人在先則違經旨法在先則壞前解行故今窮之二平等同時答文二初章名通古第十七通謂融通古即時分上因以人證法故窮先後之源蓋未明法性甚深之旨猶以三乘滅妄證真問之今明法性真常融通今古由此隨緣方成萬法今行人了萬法以會真常乃名證入豈同三乘先人後法而有得證耶又真理雖則本有既能隨緣成事何礙事能顯理之解行耶以法性真常融通古今諸法即事顯理而答之故曰通古二正答三初明人法不異文三初正明無名曰夫至人寄極證人顯深玄法故空洞無象無為妙性寂而空洞體絕諸相故曰無象此約至人體性寂之又寂即明不變義也而萬物無非我造造者作也聖凡依正心境萬物皆由真理隨緣而有即不變而以顯隨緣全法成人依理成事義法本真常故經曰無始無終也會萬物以成己者其唯聖人乎會契也凡夫不能即事契真故輪迴不息三乘滅妄求真故積行不息今即諸法而契不變真常者故曰一乘聖凡一源唯獨聖人能即事契理不歷僧祗而成道以顯全人即法法雖本有不廢解行契會之相既非新得故異三乘也二推釋何則推也何以會萬物以成己者其唯聖人耶下釋非理不聖非聖不理理而為聖者聖不異理釋上即事聖理方為聖人也先反釋後順明然雖人法無二要由即事契真方證不二之道故由前解行成此證入也三引釋又三初釋智由理起故天帝曰般若當於何求大品經釋提桓因此云能天主問須菩提也般若聖智如何可求也善吉曰般若不可於色中求亦不離色中求色是法相之首今舉例一切也於一切法不即不離之間而妙契真常為般若故此則契理方為明智釋上理而為聖二釋理由智顯又曰見緣起為見法見法為見佛見竝證見為者是也緣起是事由見事體空是了法之真實故云見法真法即真覺體故曰見佛此則由智方即事契真釋上聖不異理也三結理智不二斯則物我不異之効也結上也物即理也我者智也以上二經證之則理智相由不異之効可見此結成即事會理唯在聖智故須解行之人證人法融通之性也二顯妙契即真三初正顯所以至人躡上物我不異今顯至人妙契之相戢玄機於未兆戢斂也玄機者智也未兆者無朕迹也此則收斂智用即於覺體而無智照之迹以智即理故方為至人之妙契也下諸句例此釋之藏冥運之即化藏覆也冥運者寂然運用即化者即今萬化也藏覆冥寂之體運用於即今萬化之間此即體不離用理即於事以為妙契總六合以鏡心以鏡喻心心本澄淨故四方上下皆不離心而有故以心而總之也此句收現在一去來以成體過去未來同歸一體此句泯過未融三際一體古今通終始同古今終始一法通之更無異相窮本極末莫之與二理曰本事曰末窮極理事義一名異浩然大均乃曰涅槃浩然者無邊涯也均平也以理融事即理而大均故平等無涯乃曰無為二引證經曰不離諸法而得涅槃淨名云不離諸法而得涅槃是為晏坐涅槃以諸法性常寂故不離相而證理此即理事不二又云諸法無邊故菩提無邊諸法體無邊涯菩提覺體亦無邊涯此即能證智與理不二上二經以明理事智三名異義一也三結成以知涅槃之道存於妙契雖理事常融要由妙契即真方曰證道故人法不二不廢解行證入也妙契之致本乎冥一契則萬法一致然則物不異我我不異物物我玄會歸乎無極人法不異契會玄微同歸一道更無過極三結非先後文二初正結進之弗先退之弗後豈容終始於其間哉不二之道進退求之不見先後之相豈容終始可得也二引證天女曰耆年解脫亦何如久淨名經舍利弗問天女曰止此室其已久如天曰如耆年解脫舍利弗言止此久耶天曰耆年解脫亦何如久此蓋身子以久近問之天女以無久近而答身子再審其久近天女以絕久近責之耆年者指舍利弗曰耆宿也意謂汝證解脫時我止此室今取責無久近之言以證涅槃絕先後始終之相一明得法有無文二初有無乖得問又二初章名攷得第十八攷謂推究得者證也以前章明物我不異之道要由契會之人未知能契之人如何證此平等之法此則將隣證位餘疑未決二正問二初引經雙立問有名曰經云眾生之性極於五陰之內此約界內眾生隨緣妄性體是無明色心依此而有妄心又依色心而住故曰極於五陰之內也此明住有則失又云得涅槃者五陰都盡譬猶燈滅燈滅者膏明俱竭喻色心滅此約相宗定性二乘入無餘涅槃義也此明同無曰得二得失俱非問文二初住有不能證然則眾生之性頓盡於五陰之內涅槃之道獨建於三有之外頓盡者盡同其中故眾生在三界無為非三界此即事理迢然也邈然殊域非復眾生得涅槃也邈遠也人有法無理事相隔故知眾生與涅槃殊別人無得法之分二離有無能證果若有得則眾生之性不止於五陰果決也決定有人得法則須性離五陰絕妄契真矣必若止於五陰則五陰不都盡五陰不盡則與涅槃相隔五陰若都盡誰復得涅槃者也若盡五陰灰身滅智則無眾生既無能證之人將何得所證之法此明能證之人有無俱不能證涅槃未知一乘實教行人欲證涅槃如何可得耶二即事玄證答文二初章名玄得第十九玄謂深玄即本無義也得謂證也本無可得故曰真得有名之問葢疑別有所得今無名之答但能於心境一切本無所得即真證涅槃平等妙體豎無初後橫無邊涯故云玄得非謂行人別有一理可得也此章為十九章之深深四論之至極前之新生義解何必存焉情盡見除本無所得故曰玄得二正答二初揀辯真偽無名曰夫真由離起偽因著生起者顯義生者現義然法本無住人有悟迷故離名相則真實顯著名相則虗偽現故知真偽但由人有迷悟異耳著故有得離故無名是以則真者同真法偽者同偽法則義同皆造詣也悟乃法則於真真無名相能證亦無故曰同真此則則真屬解同真屬證迷則法則於偽偽有差殊故事有萬種故曰同偽此則迷真曰法偽順妄曰同偽此上立迷悟二端子以有得為得故求於有得耳吾以無得為得故得在於無得也有名子以有所得為得故求有得之人以何而得涅槃此乃法偽同偽也無名者以無所得是得故得涅槃在於無得此乃則真同真矣二正明玄得文三初定宗議本且談論之作必先定其本且者汎詞大凡談論語必有本有本者所詮也則言有所起語有所歸如詮真性則可以語之曰不改變無生滅豎窮橫徧則語歸於性性為本矣既論涅槃不可離涅槃而語涅槃也今之問答既論涅槃則所說以涅槃為本不可離本而語也若即涅槃以興言誰獨非涅槃而欲得之耶誰何也若即本興言但說一切無得皆語涅槃何獨有非語涅槃之言而欲別有所得而談論耶此責前攷得之情惑也二推求語本何者推也何者之言是語涅槃耶下釋夫涅槃之道此標下語本也妙盡常數總句語也微妙出常情數量數量無所得故下別句語云融冶二儀罏冶可以和融異器天尊地卑同涅槃體即尊卑無所得下例知也滌蕩萬有萬是多數有為差別蕩無所得也均天人均平也天勝人劣均無所得故同一異對異有一一與異同故一異無所得內視不己見返聽不我聞無聲色可得故未甞有得未甞無得甞曾也涅槃無有得無得可得故又五性之中三分半人非無得一分半人非有得以緣就性無邪正可得斯為即本立言言皆語本則知一切無所得方為真得涅槃常住妙體故曰玄得豈令眾生別有所得而證涅槃三引經廣釋二初明不二中二初釋理無得為涅槃果文三初明不即離經曰涅槃非眾生亦不異眾生不即五陰性相性相無所有故不異五陰性相性相無所有即涅槃故此則無即離可得為玄得二顯不生滅維摩詰言若彌勒得滅度者一切眾生亦當滅度涅槃此云滅度彌勒是聖眾生是凡由聖無所得故彌勒得滅度又由凡亦無所得故眾生亦當得滅度此則聖凡不待泯而自盡故同玄得也所以者何有何所以眾生亦當得滅一切眾生本性常滅不復更滅眾生本性三際常寂滅故以無眾生可得為真滅不待滅眾生而別證滅理故云不復更滅故楞伽云初生即有滅不為愚者說此明生即無生故生無所得此名滅度在於無滅者也論譯成經意此顯滅度之名即在於無滅可得故涅槃云生滅滅已寂滅為樂此明滅即無滅故滅無所得以生滅無所得故方為玄得即凡聖真妄染淨依正皆為玄得故曰誰獨非涅槃此乃一切無得方真達常住妙體平等寂滅斯為玄證矣三結成理果然則眾生非眾生誰為得之者涅槃非涅槃誰為可得者生即無生滅即無滅以誰為能得之人復以何為可得之法則生滅雙遣人法兩亡理事俱泯平等一味乃曰玄得豈存能得之人而謂別有所得耶二釋智無得為菩提果三初遣有無放光云菩提此云覺即始覺智果也相教直至佛位上品四智俱圓方稱覺滿果位智強識劣故說轉八識成四智但轉其名不轉其體四智者一轉賴耶為大圓鏡二轉末那為平等性三轉意為妙觀察四轉前五為成所作法性宗中始覺滅相直至生相通名始覺生相若盡方稱覺滿皆菩提果但理智二果一異分之故二宗說異今此先約分教說故前明理此明智從有得耶答曰不也從無得耶答曰不也從有無得耶答曰不也離有無得耶答曰不也此遣有求為得初句有得為得次句無得為得三句亦有亦無得為得四非有非無得為得此既四處欲求有得故皆答云不可也經云般若如火聚四面不可取取則成謗然則都無得耶答曰不也此遣不求為得以菩提非都無所求而得故又前四墮作病此句墮任病此上五句竝為欲求可得之相故非玄得皆答不也二明玄得是義云何問得菩提之義答曰無所得故為得也非謂別有所得名得菩提但於一切處得無所得即菩提果滿非但無法可得亦復無智可得方為得智三結智果是故得無所得也得於無所得故曰玄得矣此則始覺合本斷生相盡微細念離二顯不二文四初結前不二無所得謂之得者誰獨不然耶菩提涅槃竝以無所得為真得則知理智不二同無所得何有不如此耶故知以理融智則理外無智以智融理智外無理理智融融泯絕無寄方為玄得二述成真體然則玄道在於絕域故不得以得之述上涅槃理果在於絕殊異之域故以一切無得為玄得也妙智存乎物外故不知以知之述上菩提智果在乎相外故以無念而知是真知也大象隱於無形故不見以見之大音匿於希聲故不聞以聞之述上理智不二為一乘果也真身大象本無理智之形真常大音本無理智之名故無理智聞見方為見聞此約證見證聞非解見也言隱匿者皆無也希聲者道經曰聽之不聞曰希則真果在無所得故曰涅槃無名三結體顯用故能囊括終古此句結體謂真體常徧故能包囊該括徧也終古無忒常也故大涅槃以常徧為義導達羣方此下顯用謂能隨緣起用也導化也達通也羣方萬法也謂化用遂通於萬法無所不周亭毒蒼生疎而不漏亭毒養育也蒼生人也順俗曰蒼天所生故十界眾生皆即真而起真體雖寂寥虗曠而萬化從興故曰疎而不漏老子曰天網疎而不漏今借此語汪哉洋哉何莫由之哉汪洋水深廣也離騷云臨淵號汪洋今明涅槃體深用廣何不由斯建立矣四引證體用故梵志曰吾聞佛道厥義弘深汪洋無涯靡不成就靡不度生八師經梵志者淨行之人也佛道者佛所證道弘者廣大也讚佛所證之道體深用廣如水汪洋靡者無也即真之應則依正三業功德莊嚴無不成就圓滿殊勝之事一切眾生若見若聞無不受度上句讚化德滿下句讚化用周此如空淨月圓潭清影落真常果體大用無方慈悲願力法爾如此此則以真應不二結上大意也總結大意然則三乘之路開真偽之途辨賢聖之道存無名之致顯矣此一段文古人節為流通分或以此都結四論蓋文義包博取釋在人理亦無爽但今大部不以三分科文前三既各有結文此段亦合自結當論文理甚順不在煩釋初句言開者顯也法華云開佛知見故即開顯三乘所行悉當成佛則一乘顯了矣次句云真偽者虗實也辨別也別權實故此意多義略釋有二一約理則理事不二為真理事各別為偽二約人則一佛乘為實三乘為權辨此真偽權實途路也第三句云賢聖者十住下賢十行中賢十向上賢此三十位亞聖曰賢十地曰聖此皆同證真如同修佛乘存此以為正因也末句云無名之致者理智相盡異名無得圓常妙體果滿斯顯矣又初二句義在十信第三句在賢聖末句義在妙覺又前二信解一乘故有開顯辨別之義次句行一乘因故有道存之說末句圓證一乘故曰致顯此則結上一十九章有開辨存顯一乘之能斯為甚深之教矣音切樊扶袁切祛丘於切迢徒聊切邈莫角切匿女直切括古奪切汪烏光切
