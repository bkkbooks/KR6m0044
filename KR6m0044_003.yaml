body:
  text: 姑蘇堯峯蘭若沙門遵式述大科第二明體用不二顯智一此論來意者前顯不二之境今明雙融之智故次來也然境非智無以顯融通智非境無以發互照良由智用和融方顯真俗理一但文不頓書理不頓顯故先明境此明智然智一之義意有兩途一則權實互具二乃二用同體實由二用同體故權實互通故對境則真俗互通在智則根後同體以一心三觀照一境三諦斯為般若無知焉文二初論文又二初題目般若無知論第三般若是梵語此翻曰智即用也通權及實或曰根本後得如理如量真智俗智名異義同或曰在因名慧在果名智或曰實則名智權則名慧今因果權實通得智名謂下論中竝不名慧故知但以一用分二故今通翻曰智又前宗本篇中有漚和之名文云權慧具矣今無漚和則知智通權實實智照理權智照事義分二照用乃相融此中實智照前不真空權智照前物不遷前既真俗相即此亦權實互具言無知者即體也體是本覺真心心性寂滅本無知覺故起信云所言覺義者謂心體離念即是如來平等法身說名本覺離念本覺即今無知為權實體故六祖以無念為宗神秀以離念為宗雖分頓漸皆明智體無知所謂如珠發光光還自照本覺起照還契本覺即理智不二之義華嚴云無有智外如為智所證亦無如外智能證於如般若無知之旨良在斯矣若對上五名一義者本無實相法性體上起智用權則達緣會實則照性空權實不二還照本無等理為一義也般若即無知持業釋般若無知之論依主釋二本文二初序意三初標宗陳惑夫般若雙標權實虗玄一心真理虗寂玄微為權實體不可以識識智知故曰無知者牒上所標蓋是三乘之宗極也法華云於一佛乘分別說三故一乘法是彼三乘所宗之至極也彼一佛乘者乃今即理之智為此論所宗故權實不異理乃曰般若虗玄所謂佛之知見故也故涅槃云佛性名第一義空第一義空名為智慧誠真一之無差誠實也智體真一故無差別經云唯有一乘法無二亦無三也此上標宗下陳惑然異端之論紛然久矣異端者語出論語今謂人隨情見解別言差正明權宗迷實故異論各興紛然不一自佛滅度權多亂實故曰久矣蓋彼境智不談一心為源故使異論紛紜迷之久矣二序聞悟之由三初明師教東來文三初標名歎德有天竺沙門鳩摩羅什者法理無舛解惑在人既有異端何以正之故今先標其人人能弘道道在於人故對彼惑者有此正師故標牒之也天竺是梵音正云印特迦此云月天竺有五僧傳云此師祖是南天竺之國相什生於龜茲出家後往天竺傳道故稱天竺沙門言鳩摩羅什是梵名具云鳩摩羅者婆義翻云童壽高行勝業備載本傳此即論主受法之師也少踐大方研幾斯趣賤履也大方語出道經云大方無隅今借語以目真理無際故少年乃心詣至理也研核也幾心也研核自心以般若為趣故此上歎其所得下釋其深契獨拔於言象之表拔出也言象之表者易所謂言生於象象生於意得象而忘言得意而忘象今美什師得智之深意故出言象之表也妙契於希夷之境契合也雖以智合理理外無智故契而無契曰妙契希夷者老子云視之不見曰夷聽之不聞曰希真理無聲色也羅什師契理於聲色之外故上曰少踐大方也此上序得理智下明利用齊異學於迦夷齊者平也伏也異學者外道也迦夷者是梵音具曰迦維羅衛是天竺一國之名康疏云此云赤澤什師在彼曾以智慧屈伏外道又溫宿國中亦曾摧伏外道備在本傳今且舉迦夷之一國以歎其能耳揚淳風以東扇淳風者春風也以其和而發物而况聖法能隨根起智言東扇者彼望此為東傳風曰扇此歎什師傳法東流智用之能事二美其來由將爰燭殊方而匿耀涼土爰欲也燭照也殊方者彼土來此是異方故匿耀者掩智用也涼土者五涼當後涼都姑臧什法師本因此土前秦符主諱堅建元十三年有德星現至十八年遣驍騎將軍呂光率兵七萬四伐龜茲呂光果克龜茲與什同回至涼州聞本主為姚萇所害光乃竊號關外遂稱後涼父子承襲三主一十八年什師亦在後涼一十八載匿耀韜光餘如傳述所以道不虗應必有由矣聖道埀應必待時至根熟方可傳通今十八年匿耀之所以蓋欲待時候機故也三流通年數弘始三年歲次星紀姚萇崩子諱興立位歲號弘始言星紀者爾雅曰丑月曰星紀丑年曰赤奮今避文拙故以月名號年歲星次在丑位故也秦乘入國之謀舉師以來之康引三十國春秋云後涼呂隆懼南涼北涼所逼表奏秦請迎羅什至五月秦遣隴西公石德伐呂隆隆至九月歸降方得迎羅什師入關謀計也舉用也師者衆即兵也秦王乘呂有入國之計故用兵伐涼迎什來之也意也北天之運數其然矣意也者牒上索意也前秦取什後秦次主方來而上云道不虗應其意何也今牒而釋之大品云般若於佛滅後先至南方次西至北北方大盛智論釋云北方謂北天竺也今謂北天般若運數轉興東國待時而至使其然矣此上序弘始三年為發教之時下明秦王為待熟之機也二秦王垂護二初標號歎德大秦天王者天王者法天而治使民歸往故道契百王之端德洽千載之下無為而治不言而自信不化而自行蓋王者之道德今歎秦王道德充實故契合百王之端洽潤千載之下遊刃萬機弘道終日信季俗蒼生之所天釋迦遺法之所仗也王者遊智刃日應萬機萬機之暇弘佛道於終日季末也蒼生者指萬民也既日應萬機下民仰之如天由弘道終日故使如來遺法倚仗流通也二明翻譯闡揚時乃集義學沙門五百餘人於逍遙觀躬執秦文與什公參定方等集聚也義學者學習譯場義理之人逍遙觀者逍遙園中有觀也躬親也秦文者新舊譯出之經方等者大乘般若教也羅什入關既重譯諸經故秦王親執新舊二文與什公參竝詳定方等至教之深旨也其所開拓者豈唯當時之益乃纍劫之津梁矣秦王與什師如是開拓於聖道不獨一時之益乃纍劫為迷津之梁道也故知般若真旨自羅什東來秦王參定義方明正矣三明預座聞悟余以短乏曾廁嘉會以為上聞句異要始於時也短乏者謙也廁預也嘉會者譯場也上聞者聞般若上義也昔因異端殊執正理無憑今預譯場聞此上義一乘異要甚深之旨始於時而領悟三讚深謙述然則牒上雖因羅什秦王護此聞悟下云聖智幽微深隱難測般若體用幽微量超數表故曰深隱由此故難測度也無相無名乃非言象之所得釋上體量難測無相故不可以象思無名故不可以言議為試惘象其懷寄之狂言耳今論者欲剖聞悟以示未來而口不能言心不能測也為試者且用也惘象者語出莊子但取無心之義狂言者蓋無定語也且用無心之心無言之言而議論之以息異端耳豈曰聖心而可辨哉試論之曰非謂般若言可詮辨且論之耳二正論文二初標宗正顯文四初標具用之體文三初引經標體放光云般若標能觀智無所有相無生滅相出體也言所有相者即現在所有差別相始自色心終乎種智世出世間相生滅相者過未相然般若體性過去非新生未來不滅壞現在無住異三際常平等等同虗寂故曰無相又中間不住異故非有前後無生滅故非無體超四相量絶百非故曰無相譬如虗空雖畢竟湛寂而前際無生後際無滅般若實體當知亦然故心經云不生不滅不垢不淨不增不減道行云般若無所知無所見成立上義然相則就體而論知見帶用而辨辨用歸體體本自寂故無知無見也言所知所見者所有之知見耳靈知正見言用則有言體則無今既明體故曰無知無見也然由體無知見故能知見如鏡無像故能照物又有知曰無明有見曰妄想智體無無明亦無於妄想由離迷妄故無知見也又體無相故非色無知見故非受想行識出世智體非蘊聚法故也二約體辨用二初牒經問用此辨智照之用而曰無相無知者何耶辨明也何耶是疑辭此論正明能照之智必有知用而放光曰無相道行曰無知見者何所辨耶二即體顯用三初正答果有無相之知不知之照明矣言果有決定有此義也無相之知者據放光答用也般若真體雖三際無相即體之用了了常知不知之照者據道行答用也不知者牒上無知也雖體無知見湛然寂滅而全體之用靈靈常照圭山云正念者無念而知若總無知何名正念明矣者體必具用義可見故也此則據理而答以實教言體則必具用談用必全體如水與波不相捨離極成之理明矣二推釋何者推也何以無相不知果有知照之義夫有所知則有所不知反釋也夫若有知之體而起於知用者必有所不知矣此則妄心逐事不能契真二乘證真不能達事皆有知故有所不知下順釋以聖心無知故無所不知全無知而起用故用無不知也然此義猶暗若謂以無知為體而起於知用者則尚惑矣當了即無知而知全體為用方真達般若體用之旨但言不頓說理實同時如全金成像思之不知之知乃曰一切知一切知者理事雙照真俗竝觀也但全體之用鑒照照用自然融通即佛正遍知義也所以知照之義在乎無相無知也三引證故經云聖心無所知無所不知信矣信體用不二也三會用歸體是以聖人般若體用不二得之者曰聖人虗其心而實其照虗寂心體必具權實照用終日知而未嘗知也終日照理達事未嘗有知也此述上體用同時下會歸于體故能默耀韜光虗心玄鑒無照而照曰默耀韜韞也藏也照而無照曰韜光心而無心曰虗心無鑒而鑒曰玄鑒此則默韜虗玄皆體也耀光心鑒皆用也此四二而不二者其唯聖人乎閉智塞聰而獨覺冥冥者矣閉塞者泯絶也聰者聽之明也冥冥者寂之又寂故雖體用常俱而體外無用若全用歸體則閉泯智照杜塞聰明唯本來覺性冥冥寂寂者矣故起信云遠離微細念故得見心性心即常住名究竟覺即般若無知之義二明即體之用五初明權實同體然則承上之辭智有窮幽之鑒而無知焉上明全體智用今開用為二一能窮理曰實二能應物曰權權用名神實用名智但由所照理事不二而二故能照智用權實有殊而其兩用未始抗行故下論中多影略言一學者必須互知今此先明實智也窮者照之極也幽者理之深也實智雖有窮理之鑒能照之體寂而無知神有應會之用而無慮焉次明權用也神者不測之義也應化之心不可知之故應會者感屬機應屬聖應與感合曰會慮則思念也無知無慮文別理同神有感應合機之用能應智體本無念慮是知照理應機二用雖殊無知無慮體一故曰般若無知也二顯一體同虗神無慮故能獨王於世表智無知故能玄照於事外獨王者唯一故自在也世表者處世不滯於世也無慮而應應無所滯故自在不染也玄照者照而無照也事外者不滯事也無知而照故即事而真故不滯事也三述成二用智雖事外未始無事實智窮理理不異事神雖世表終日域中權雖無慮終日化生四顯即體之所以所以俯仰順化應接無窮俯下也仰望也俯就仰望隨順應化接之無窮蓋權智之用也無幽不察實理幽深智無不察蓋實智之用也而無照功實體無照權體無功二用即體體無照功也五結成二用斯則無知之所知實也聖神之所會也權也三體用合明四初標指然其為物也此標牒之辭上所論般若體用有無無定未知照理照事是何物也故今牒而指之實而不有虗而不無用即體故實而不有體即用故虗而不無存而不可論者其唯聖智乎存在也般若體用常在乎不二而不可以有無議者其唯聖智如是也二推釋何者推之何故不可以有無論耶欲言其有無狀無名體無形狀離心緣相體絶言說離名字相故不可言其定有此釋上實而不有欲言其無聖以之靈聖人用此照理達事未嘗間息故不可言其定無此釋上虗而不無聖以之靈故虗不失照全體具用無狀無名故照不失虗全用是體照不失虗故混而不渝混融也渝變也用即體則混融常虗虗而不改此明不變之體終古不忒也虗不失照故動以接粗粗者對細之假相也對上理體細妙故指今事用粗著也體即用則運動接照而無窮此明隨緣之用不失也是以聖智之用未始暫廢求之形相未暫可得言體則無知無慮言用則照理照事此二者言異而義同故體用存而不可以有無論者聖智之謂也三引經故寶積曰以無心意而現行淨名經長者偈讚集起曰心分別名意唯第八賴耶集諸種子起現行故獨得心名第七緣內前六緣外皆分別故俱受意名八識竝妄真智離妄故無心意也又無心即無知也無意即無慮也而現行者常行照鑒故放光云不動等覺而建立諸法平等本覺之體動則曰無明不動曰究竟覺覺體雖寂而能建立境智諸法此上二經竝證體用不二也四結不二所以聖迹萬端其致一而已矣聖智之迹雖有知無知有應無應言量萬端不二之理本一如言水則靜言波則動波水動靜本乎一致此則起信真如生滅二門不二本乎一心也又依真如門修止即今實智依生滅門修觀即今權智止觀依一心而起即今無知無慮為權實所依也今會用歸體故曰致一也四境智結會二初結境智權實是以般若可虗而照實智無知而知也真諦可亡而知真境無相故實智亡相而知也此結實智對不真空論也萬動可即而靜事用不一故曰萬動各不失緣生此相故即動而靜聖應可無而為權智無應而應也此結權智對上物不遷論所以能照之體雖一由對二境發所有二既真俗二境相即故權實二智亦融二結權實同體斯則不知而自知不為而自為矣先指上所結曰斯則權實相本無知無為全體具用法爾曰靈知妙應故分權實耳復何知哉復何為哉知照為作但由體具非謂體有故曰般若無知也二問答推析者文有一十八段皆展轉躡跡假致疑難以導深旨古者分為十八科今合問答以為九重一體用二名實三心境四兩關五是當六取捨七應會八真妄九寂用各具問答然此九中據文則初一雙明次五唯實第七唯權後二雙顯據義則一一兼通蓋由體用互融故權實相即今初體用問答文二初知會有無難二體用同時答今初此因上云智有窮幽之鑒而無知焉神有應會之用而無慮焉有無相違故此興問也文二初牒用難體文二初敘難難曰夫聖人約人辨智真心獨朗物物斯照實智靈照真心用常獨朗不因境有故觸事而真故曰物物斯照應接無方動與事會權智應感無定動用皆與俗諦事相合宜也物物斯照故知無所遺動與事會故會不失機無遺者順理也實智能知知必順理權智能會會必合機會不失機故必有會於可會必有能會之智可以應會知無所遺故必有知於可知定有能知之智可以鑒知必有知於可知故聖不虗知必有會於可會故聖不虗會不虗者定有也二正難既知既會而曰無知無會者何耶無會者即前無慮據上所釋定有知會而前所謂無知無會其義何耶二縱奪重難此難意與上同但別有疑情故重問也若夫忘知遺會者牒所解也忘捨也遺棄也意謂實智有知權智有會但捨棄知會之心故曰無知無會者則是聖人無私於知會私己也自取知會之巧曰私聖人無此故知而曰無知會而曰無會此上縱下奪云以成其私耳若以無知無會為聖智者雖不取知會之功歸己返欲取無知會之功歸己也下難斯可謂不自有其知安得無知哉聖智若此權實定有知會但可謂之不自取知會耳何得無知會耶二體用同時答三初正答前難文二初答體用難文二初正答答曰夫聖人功高二儀前曰神有應會之用而不仁前曰而無慮焉功者業用也高者勝過也不仁者老子云天地不仁以萬物為芻狗王𢏺云仁者必造立施化有恩有為天地任自然無為無造故不仁也今聖人權智化生令獲出世之益故其功勝過二儀而能應之體本無思慮故同天地之不仁此答上權智即應而無慮也明逾日月前云智有窮幽之鑒而彌昏前云而無知焉逾過也彌極也日月唯明於世事而聖人實智能契出世真理故有過日月之明而能照之體本自無知極同於昏昧此答上實智即知而無知也此上竝答以全用之體二責非豈曰木石瞽其懷其於無知而已哉此責執無之見木石者無靈覺之物瞽者盲也前云無知無慮豈同此之無知也誠以異於人者神明故不可以事相求之耳此責執者之見誠實也人者心多妄計前云有知有應異於人之妄想也者字再牒上也未詳般若有知之義如何下云神明故則不測靈明之智不可實以知會事相而推求之也此責前難者以有難無乃謂般若有同人心無同木石豈知體用同時不二之旨也二答縱奪難四初敘計子意欲令聖人不自有其知而聖人未嘗不有知子意者彼難者之意解也欲令者解心使之故未嘗不有知者語反順合云定有知也般若本無此理蓋難者意解謂令聖人雖不自取知會之功而謂聖心定有知應也此即牒上問者邪解也據此文倒順合云子意謂聖人定有知而不自有其知也二斥非無乃乖於聖心失於文旨者乎無乃者斥辭乖迷也一迷聖心量二失聖教量故責也三徵釋何者徵也求上二量也經云真般若者清淨如虗空無知無見無作無緣此引大品經出聖教為量也真般若者牒二智實體也清淨者體性寂滅也如虗空者舉喻也智體猶如太虗無生滅染淨故無知等者釋上清淨義靈知真見實用則有體性則無作為緣慮權用則有體性亦無既明真體清淨故知本無此四也斯則知自無知矣此顯理量也據斯經義則知權實知會之體本自無知此理極成論中多單明實智會而無會文影略耳下皆類此四結責豈待返照然後無知哉結非前解也豈謂聖智實有知會返照不欲取之而說無知無慮耶二躡跡斷疑此下論文非答前難但前語意有迹故論者躡而斷之文四前二破疑執後二釋正理前二中但有牒辭即是疑意雖破當時現行即遮未來種子故取金剛遮斷之意以為此科文二初斷有知性空疑文二初牒疑若有知性空而稱淨者疑者因見上經云真般若者清淨如虗空等文乃疑云般若必有知但為智性本空故稱清淨無知等也故今牒之二正斷二初比破則不辨於惑智無明心能知名義曰惑智此智定是有知因境而有離境則無性本自空聖智同此何以辨別三毒貪瞋癡四倒無常樂我淨而計有者也皆亦清淨皆者總也三毒四倒七種顛倒皆從妄想心生既屬有知性空亦可同般若清淨之義二奪破有何獨尊淨於般若尊崇也若惑倒同聖智者何故經中唯推崇清淨無知在於真般若也故知聖教獨崇之智非同惑妄有知性空也二以境歎智疑文亦二初牒疑若以所知美般若疑者又云聖智雖非性空而定屬有知但由照真境時所知無相故美歎智曰無知矣故今先牒之二正斷二初敘定所知非般若此句定宗所知曰境般若曰智境智定不同故曰非也所知自常淨故般若未嘗淨此據疑者定義也疑者曰智定有知境屬無相故今定云據汝所說則所知之境常清淨無相般若之智常自有知未可曰清淨無知也二奪破亦無緣致淨歎於般若緣由也致立也若如疑者所見則經中秖合歡真境清淨亦無緣由立清淨之言歎真般若也今以經中唯歎般若之文為正量驗知非因境無相而曰智無知也二釋正義二切釋前經義然領前之辭所疑既非清淨無知之義何也故今領之經云般若清淨者此再牒前經也將無以般若體性真淨本無惑取之知將無以者擬議經旨之語本覺為智所依曰體體不可改曰性體即性也真淨者非離染之淨乃真實清淨也本無惑取之知者釋無知見等為真淨義非離惑取曰無知乃本自無惑取故曰無知本無惑取之知不可以知名哉結成清淨無知之義破前二疑也二重顯體用豈唯無知名無知知自無知矣豈唯體無知故名清淨無知有知之用常自清淨無知也故體用不二旨清淨故故曰真般若者清淨無知等也三結顯正義因答難斷疑已故結顯前權實體用不二之正義文二初結顯前義是以聖人以無知之般若照彼無相之真諦即體之實智照真諦理也然此但契自智之無知即照無相之真諦非謂外有真諦以為所照決定之相真諦無兔馬之遺般若無不窮之鑒兔馬之遺者婆沙論以三獸渡河入水深淺即象馬兔喻三乘造理有異二乘滅妄求真如兔馬之涉水泛身而過菩薩證唯心故如大象之渡河截流而過故無兔馬遺餘一乘智鑒無不窮極故前曰智有窮幽之鑒而無知焉此中更合云聖人以無慮之般若照彼不遷之俗諦俗諦無兔馬之遺般若無不應之用既一體二用約境義分境既真俗相融用亦權實不二故論中或秖就一用顯體已知二用不殊故今影略出之以顯前神有應會之用而無慮焉之正義也二明前所以所以會而不差當而無是此明前權智所以能會之智不差機宜言當是者以取應對之義至下文辨應而無慮故曰當而無是寂怕無知而無不知者矣此明前實智所以虗寂淡怕故無知無知之知無不鑒知二名實問答二初兩名求實問文二初泛陳名實難曰此躡上答中名異故今立難下自指前夫物無以自通故立名以通物通者運用不滯也凡世立物名蓋為物不能運用故以名召令得通用物雖非名果有可名之物當於此名矣雖體與名殊定有對名之體而對於名是以即名求物物不能隱二牒文正難文三初牒前名異而論云聖心無知又云無所不知此即牒上寂怕無知而無不知之文以有無名異為難也二敘欲一之意文二初自意意謂難者之意所謂也無知未嘗知知未嘗無知嘗曾也聖心若定無則未曾是有定有則未曾是無乃可歸一也斯則名教之所通立言之本意也若有所定方是能詮名教通運所詮智體亦是立言召物之本意理當如是二論意然論者者即指作論之人也欲一於聖心異於文旨尋文求實未見其當論主欲明聖心體一而立文有異尋此異文而求一體者未見有當名之定體三兩關正難何者徵也何謂尋文求實未見其當若知得於聖心無知無所辨辨明也有知得聖心無知明何事若無知得於聖心知亦無所辨無知得聖心知名明何物若二都無得無所復論平呼哉若二名都不得聖心未審前云無知無所不知復論何事耶又解二名既不得聖心未審對何名論召聖心之體耶二雙拂顯玄答三初拂迹雙泯答曰經云般若義者標也般若體上合宜道理曰義無名無說名詮自性說謂言說言由名起既不可名召故非言說所及也非有非無非實非虗非有無者轉釋上無名說義智性不同妄心有知又不同木石無知故不可以有無名言詮召也非虗實者轉釋非有無義非實故非有非虗故非無也虗不失照故非虗無體即用也不變即隨緣義照不失虗故非實有用即體也隨緣即不變義也斯則無名之法故非言所能言也斯則者牒歸上也由體用不二故非實非虗由非虗實故非有無性非有無不可以名召故曰無名之法名既不立如何言也前難者以名求體殊未達名所不能召也經義如此故當信之二釋妨述意言雖不能言然非言無以傳妨云既言般若義者無名無說等何以云言所不能言也故今上句領前也然者躊躇經旨也理非詮表無以傳達於後人故當藉言也故曰般若義者等文也故知為物有說理實無言是以聖人終日言而未嘗言也聖人言教終日說般若非有非無等但為破惑畢竟於般若未嘗有言說可及涅槃云始從鹿野苑終至跋提河如是二中間未曾說一字何謂經有可言也此上釋妨下述意今試為子狂言辨之狂言者不定之語也且為難者以不定之語詮辨之非謂般若可說也三正顯玄旨三初顯體用玄微夫聖心者標聖人所證一心具權實體用故微妙無相不可為有妙者不可思議也妙之至妙故曰微妙妙體無相為是也不是有故此明心體也用之彌勤不可為無彌勤之用照理達事不是無也此明全心之用不可為無故聖智存焉智用雙存故非無不可為有故名教絶焉不可思議絶名教詮表故非有也前經所謂無名無說非有非無蓋體用同時不在二邊也二釋知無知之意是以牒上體用二言釋言下之意言知不為知欲以通其鑒前言無所不知非謂智是有知蓋欲通般若有鑒照異於木石所以言知也不知非不知欲以辨其相前云寂怕無知非謂智屬無知蓋欲辨般若之體相異於妄心所以言無知也辨相不為無通鑒不為有正破難者執前知無知之言也辨體相故說無不是定無通鑒照故說有不是定有前何以將知無知定名取定聖心耶非有故知而無知此下正示非有非無之義非有故牒上通鑒不為有也謂靈知即無知故所以有非有也非無故無知而知非無故牒上辨相不為無也謂無知之體本自靈明所以無非無也良由體用知無知雖有二言定無二相三結不二深旨是以知即無知無知即知全用是體全體是用如波即水全水即波也無以言異而異於聖心也無以者勸不可也不可見前知無知言異而謂聖心體用有異也三境智問答二初以境求知難文三初泛敘難端難曰夫真諦深玄非智不測前云以無知之般若照彼無相之真諦躡前先敘境智反難無知也真諦無相唯般若實智能照自餘不可測度故曰深玄聖智之能在茲而顯茲此也由見真諦故名聖智般若功能在此真諦而表顯之也故前曰真諦無兔馬之遺般若無不窮之鑒也二引經成立故經云不得般若不見真諦真諦則般若之緣也經文語反由般若故見真諦也下成立經意云真諦為發智之緣故聖智之能在茲而顯也三結難有知以緣求智智則知矣若以所知發智之緣推求於智既有照理之能智必有知何謂無知般若耶二心境同無答三初以理正答文三初正答答曰以緣求智智非知也此明境智體同用異且夫真境無相真智無知今上句約用縱之以真境求真智義分能所下句就體奪之真智無知即真境無相理實無二故清涼曰智體無自即是證如二推釋何者推也以緣求智何以智無知耶下釋放光云不緣色生識是名不見色緣慮也識以了別為義經是簡妄反顯也般若不緣慮色境而生分別妄識是名般若不見色若妄心則緣境生分別故有知見則知難者以智為知乃是認妄為真也又云五陰清淨故般若清淨此明真心真境五陰者色受想行識也清淨者本來寂滅也色心既本自清淨故般若體性清淨無知故曰以緣求智智非知也三結顯般若即能知也五陰即所知也所知即緣也此三也字前二即結上經旨後一生起後文以前段就體推釋同虗此中約用結顯義分能所境智經云般若清淨即靈智無知以為能覺也五陰清淨即真境無相以為所覺也此乃以無知心覺心無知義分能所耳下句生後此所知無相境即發般若之緣由了無相方曰般若故二簡辨真妄此下論文由前難者以緣求智以智為知執妄為真故今簡辨令了真妄文四初總標境智夫知與所知總標也真妄二智俱曰能知真妄二境同名所知二真妄對辨相與而有相者當對也與者共同也難者以妄智對境有知有相故相與而無主家義分能所以真智對境無相無知故相與而無故物莫之有物者指心境也莫之者不能也真心境則同虗寂不能令有相與而有故物莫之無妄境智則同幻有故不能令無物莫之無故為緣之所起妄境為緣起妄智之分別物莫之有故則緣所不能生生起也所緣之境本寂不能起能緣之分別緣所不能生故照緣而非知境寂心空故智照所緣而無分別故上答曰以緣求智智非知也此釋真境智義也為緣之所起故知緣相因而生境為緣而起智是以能知所緣相因而生分別故古者曰未有無心境曾無無境心此即上難者云以緣求智智則知矣三結示起由文二初正示是以知妄智與無知真智生於所知矣迷自心則執境智起起之則境生故妄智曰有知了自心則境寂智虗虗而不二故真智曰無知故前問者答者俱曰以緣求智而有知無知之異者蓋迷悟之不同耳二徵釋何者真妄二智何故同生於所知夫智以知所知取相故名知妄智迷真心外取相故知妄境也真諦自無相真智何由知真境本無相真智以無知而契之故曰何由知四釋成所以二初牒所以所以然者有何所以故妄境智則知緣相因而生真境智則緣所不能生耶故今牒之二釋成文二初釋妄文二初正釋夫所知非所知所知生於知事本空無妄智不達執之為有見有境起所知既生知知亦生所知因有境故智有分別故有知心起所知既相生相生即緣法既境智相生即智為境緣境為智緣緣會故境智同有也緣法故非真非真故非真諦也從緣境智緣會則生緣離則滅既有生滅故非真諦門中乃稱為妄也二引證故中觀云物從因緣有故不真證上可知然中觀文有二句上句證前後句標下故今取義便隔彼後句以就次科也二釋真三初標不從因緣故即真不藉因緣生者方名真實標也二釋今真諦曰真真則非緣今真諦門中無相真境與無知真智是一心理智假分能所實無二相既非緣有故名曰真真非緣故無物從緣而生也無物者境智既不從緣故無緣生境智之物所以曰真境真智無相無知也三引經故經云不見有法無緣而生真諦門中不見有境智之法故無緣相生上明所以竟故知難者以妄問真也簡辨已畢三結答前問三初述成無知是以真智觀真諦未嘗取所知智不取所知此智何由知述成真境智顯無知義以真智不取是觀真諦義也二釋妨除疑然領前也智實無知如何契理下釋云智非無知但真諦非所知故真智亦非知智非木石之無知但以照而常寂故真境無外相即真智無知爾三結難非真而子欲以緣求智以智為知此牒彼執妄也緣自非緣於何而求知哉責迷真也緣自非緣者真境非外緣如何發智有所知耶四兩關問答二初不取違知難文二初牒論敘難難曰論云不取者牒上云智不取所知者下敘難為無知故不取為知然後不取耶開兩關也二兩關正難若無知故不取聖人則冥若夜遊不辨緇素之異夜遊者暗中遊方也緇素者黑白也智若無知故不取則聖心冥昧如人夜行豈辨境之黑白何以云真智觀真諦也若知然後不取知則異於不取矣若先有知後不取者知即是取與不取有異也二知即不取答二初雙非有無答曰非無知故不取又非知然後不取不同木石無知不同妄想有知木石絶靈照妄想居攀緣般若離二邊故非此二而說不取也二正答不二知則不取故能不取而知當靈鑒時本無取著故能無取著而長鑒知如摩尼珠現色而本無色無色而常現色此乃全用即體全體即用知與不取說雖前後義實同時五是當問答二初無當違有難文二初牒論敘難難曰論云不取者牒上知即不取故能不取而知正難下句也誠以聖心不物於物故無惑取也誠實也不物於物者不執著於物也既無惑取之心故曰不取無取則無是無是則無當是當之言諸教少有此論多說凡兩物不別曰相是敵對曰相當亦猶彼此是非蓋諸法相望之通名也今明境智相當相是故曰是當今且以智曰是境曰當釋之真心真境同虗故無惑取則無心是於境亦無境當於心此即難者解不取之義如是也二以無難有誰當聖心而云聖心無所不知耶誰何也心無是境無當但可云無知以何當對於聖心而云有知耶無所不知者有知也此則難者但解其體未達其用故為此難也二有無雙融答三初領問答曰然無是無當者前難者雖解境智同真未了即真心境故以無難有今先領彼所解後示體用雙融之正義也二正答夫無當則物無不當境則全理之事無相即相無是則物無不是智亦全體之用無知即知物無不是故是而無是知即無知照而常寂也物無不當故當而無當相即無相觸事而真也若達此知無知不二相無相無殊則何疑前云知即不取故能不取而知也三引證故經云盡見諸法境智歷然而無所見者也智無知境無相故也六取捨問答二初捨有滯無難文三初呈解立難難曰聖心非不能是誠以無是可是此因上是而無是故立此問遣後人之餘疑非不能是者即上云是也顯有照鑒故誠以無是可是者意謂由境無所是之相可是故曰無是此以有知之智對無相之境故曰是而無是也雖無是可是境雖無相可是故當是於無是矣聖心必須對於無相境也二引經成立是以經云真諦無相故般若無知者經是正義真諦無有無相般若無有無知也今難者解意不同意謂般若是有知由真諦無相可得故般若無知也者之一字牒經不自領經意云誠以般若無有有相之知信經所說則知般若定無照有之知以顯唯照無也三正難滯無若以無相為無相有何纍於真諦也為是也纍滯也聖心若以無相真境是無相者有何所以滯纍此真諦而取於無相耶雖不取有少異於妄心若取於無何殊於斷見故此疑問也二取捨俱離答二初直非所難文二初正破答曰聖人無無相也般若無此取無相之心也二推釋何者推上也若以無相為無相牒問無相即為相捨有而之無若以無相是無相無相即是相雖捨有相而著無相豈為智照也譬猶逃峯而赴壑俱不免於患矣逃避也峯者山之高處也壑者溪也逃避峯之危峻而赴于溪壑俱不免害身之患捨有取無俱不免乎取相般若聖智故非如是也二顯示正義文二初示正義是以至人約人顯智也處有不有居無不無居處者智之所詣故即事造理故處有不有理不異事故居無不無又處有居無照理事故即前是當也不有不無泯理事故則無是無當也雖不取於有無明不取也非唯不取有亦不取無也又即前無當無是義也然亦不捨於有無明不捨也正不取時即不捨故故云然亦又非但不雙取然亦不雙捨即前物無不是物無不當也又初句不有離增益謗次句不無離損減謗次句雙非有無離相違謗末句雙照有無離戲論謗四謗既無百非斯絶是當之義髣佛聖心也二出所以所以和光塵勞周旋五趣此顯已證之所以也和者謂渾雜也光者智用也聖人光有二一身光二教智光今明教智光塵勞者三界中五塵坌污勞擾之處是羣生之所居聖人渾和其間以教智光而開導之也周旋者周遍返覆也五趣者天人獄鬼畜鬼開修羅即六趣也四生不過五趣聖人垂形於五趣周遍返覆也前明說教此顯現身蓋聖人從根後智起大悲之化用也寂然而往怕爾而來雖往來於三界往無往相故曰寂然而往來無來相故曰怕爾而來前明處有此顯不有恬淡上呼無為而無不為心靜曰恬智純曰淡雖無作為之心而常照理達事故無不為此明上居無不無也七應會問答文二初無知生滅問又二初牒前敘難難曰聖心雖無知然其應會之道不差即前云會而不差也由無為而為故應會衆生不差失於機宜也是以可應者應之不可應者存之釋不差之義根熟則應之令入道未熟則存之令熟則金剛所謂護念付囑之義二正難然則聖心有時而生有時而滅可得然乎根熟則能應心生未熟則能應心滅既曰當而無是則無知無為何得有此生滅二用無生滅答四初真妄對明答曰生滅者牒所問也生滅心也妄心取相故隨境生滅聖人無心生滅焉起聖心無取故曰無心既不取境何有生滅二釋妨正答然牒上領問也問云既無心生滅何有應而不差之義耶故今領之非無心非同木石之無心但是無心無取著心心耳靈明之心長在此為應本經云菩薩清涼月遊於畢竟空又非不應非同二乘之不應但是不應不起分別之應應耳機感應生則悲應之心常存所謂衆生心水淨菩提影現中三舉喻結答是以聖人應會之道則信若四時之質直以虗無為體質實也應之不虗故直但也權智無心之心不應而應其由春夏秋冬雖應不失時虗而無體權智無心而應類此可知四結非所問斯不可得而生不可得而滅也八真妄問答二初惑智同真問文二初呈解難曰解中疑問聖智之無聖人無心生滅焉起惑智之無境有生滅智乃隨之離境智無生滅何有難者因前而解故此呈之二疑問俱無生滅同也何以異之如何分真妄之異耶二真妄同異答三初總標答曰聖智之無者無知體本無知故惑智之無者知無了知無體故此上標真妄其無雖同同無生滅所以無者異也無之所以真妄有異此標同異也二釋真妄中二初推釋何者推上異之所以夫聖心虗靜無知可無智體本無知見故曰虗靜三際常然可無生滅也可曰無知非謂知無此明真異於妄不假知了惑智有知故有知可無惑智取境隨境生滅智性空無生滅不有也可謂知無非曰無知也此顯妄異真也前則本無故無此則了空故無所以異也二結會無知即般若之無也智體本無生滅故曰般若之無知無則真諦之無也結會妄智為真境也難者既了惑智性空則惑智為所了境由了始無即事而真故曰真諦之無也故知無生滅則雖同本無今無有異也三釋同異三初正明文二初顯體同用異是以般若之與真諦牒上同無之境智也言用即同而異即同無而理智不泯是用也言寂即異而同雖理智宛然而同一虗無是寂也同故無心於彼此異故不失於照功體同故心境彼此無殊用異故不失能所之功二述成不二是以辨同者同於異辨異者異於同辨者解了也欲解同無但觀理智欲明理智須了同無此明互即下顯雙亡斯則不可得而異不可得而同也辨異於同故不可得異辨同於異故不可得同同異兩亡此答前云俱無生滅何以異之也二推釋文二初雙徵何者何故不可異而又不可同二各釋中二初釋不可同內有獨鑒之明外有萬法之實約心為內以境為外蓋指拄如此非有內外之相獨鑒之明者智也即心之照心外無法故曰獨鑒又以對下萬法故萬法之實者理也理為萬法之體故也萬法雖實然非照不得事本即真非智不顯內外相與以成其照功與共也由智顯理理顯曰智故共成鑒照之功也此則聖所不能同用也結異也聖智與理所以不可得而同者此明照用也二釋不可異內雖照而無知照體本寂外雖實而無相真理本空內外寂然相與俱無境智同寂此則聖所不能異寂也結同也聖智與理所以不可得而異者此明寂也三引證三初證辨同於異是以經云諸法不異者諸法者心境也不異者同虗寂也者字是牒經下釋之云豈曰續鳧截鶴夷嶽盈壑然後無異哉續鳧截鶴語出真經云鳧脛雖短續之則憂鶴脛雖長斷之則悲等夷平也嶽山也盈滿也壑溪也此則反釋經意豈謂令鳧鶴長短溪山高低等無差別而謂諸法不異非此說也下順釋云誠以不異於異不異之義於殊異中也則高低長短性不可異故曰不異也故雖異而不異也此證上辨同者同於異也二證辨異於同故經云甚奇世尊於無異法中而說諸法異大品經空生歎佛讚法雖諸法同真無異而境智宛爾差殊此證上辨異者異於同也三證同異不二又云般若智與諸法境亦不一相能所各存證上不可得而同也亦不異相同一真體證上不可得而異也信矣佛語實不虗故自信信他也九寂用問答二初寂用何異難文二初牒論難曰論云言用則異言寂則同牒上云聖所不能同用也聖所不能異寂也二正問未詳般若之內則有用寂之異乎此是請益問般若真一無差何以有一用一寂之異未詳審也二用寂同時答二初正答同時答曰用即寂不離境智之二而同一寂滅也故勝鬘云二而不二難可了知如全波是水故寂即用同一虗寂而能所歷然勝鬘又云不二而二難可了知如全水是波故此中言寂即權實同體言用即二用雙明竝體用同時故也用寂體一同出而異名言體者非所依真體此明相依之體用依於寂以寂為體寂依於用以用為體相依故體一也同出而異名者寂出用用出寂故有寂用之異名非謂別有一體為用寂之出處也更無無用之寂而主於用也又合云更無無寂之用而主於寂也今文影略更者定義也意云定無無用之單寂而為用之依主又定無無寂之單用而為寂之依主不有則已有則用寂同時既無二體如何一有一無二結會權實九重問答本因權實體用而起今迹亡疑盡理顯義圓故今結會歸前顯體用不二也文三初結義歸前是以承上用寂不二故智彌昧照逾明結實也彌極也逾過也體本無知故昧之彌極即體之照照徹理源其明過逾於常照也即前云智有窮幽之鑒而無知焉神彌靜應逾動結權也體本無慮故靜之彌極即體之應常應有緣故動之逾越也即前云神有應會之用而無慮焉下總責疑者豈曰明昧動靜之異哉明與昧動與靜豈當執異也二引文為證故成具云不為而過為證上權智靜而常用寶積曰無心無識無不覺知證上寶智即昧而明也淨名上卷實積偈讚云以無心意而現行今則小變其文也三總結文意斯則總指標宗已上問答等文也窮神權也盡智實也極象外有無曰象之談也般若體用不二故極有無之象外也談者指上所說也即之明文聖心可知矣結也明文者如證而說故曰明了之文思之可解又或近指上二經曰明文問答終此第三般若論畢音切驍古公切萇除良切襲似力切韜他刀切洽胡夾切拓他各切韞於昆切渝弋朱朱忒他得切瞽公五切髣佛上芳往切下芳勿切鳧扶音脛經郢切惘文兩切抗可浪切
