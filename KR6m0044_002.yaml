body:
  text: 姑蘇堯峯蘭若沙門遵式述大文第二依宗造論論有四章古釋多分為四科謂俗諦真諦明因顯果四論不同順文可爾於理則未然遂令前二則真俗不即後二則因果不融又真俗二諦非因人所知權實二智非果人所用故知四論同時説有前後此宗不修則已修則二智齊運二境同觀雖境智義殊定無二體從凡至聖一道如此方曰一義古者或謂前二論明二諦教真俗不二顯理第三約行第四明果此釋甚當更須知此四義通因及果今且順宗本分為三節初前二論明真俗不二顯境一次第三論明體用不二顯智一後第四論明理智不二顯證一今初分二初物不遷論立俗諦二不真空論顯即真今初所以先有此論者明俗諦事法也謂佛教顯理必須即事若事外求理俗外明真縱離邊邪亦歸權小故今先明事法後不真空論顯理故又凡人不達俗諦性相見生滅有無乃謂變易不停今並非之故先立此論即正推前緣會名義也大同華嚴開四法界先明所依體事此中文二初題目物不遷論第一物者事法也世間不離三科出世不過二果但有名相並稱為物縱説古今時分時無別體仗相立名但了名相無所不收言不遷者遷者動也即變易義今俗諦門中略有三義故萬物不能遷易一明物性二明物相三明物時火熱風動水濕地堅等即緣性不可易天尊地卑山高水澄聖淨凡染等即緣相不可易古今朝暮剎那前後蓋時不可易又此性相時有相由義相成義即中論云因緣所生法也此則正屬始教法相宗所陳百法名數各有體性乃至真如涅槃亦理果淨物故知俗諦一門攝法亦無不盡故曰物不遷正明動中有靜靜不妨動宜善得旨勿濫真常或曰凡夫一念轉成聖時何以曰不遷耶答曰秖由不遷故能轉也何也染淨二相各存故真妄二性各立故妄染時非真淨時故由性相時分各住本位故能從凡入聖矣論謂言議推詰次在最先故曰第一物即不遷持業釋物不遷之論依主釋二論文二初序意二正論初文四初標物示人情夫生死交謝生者起也死者止也此二亦云生滅或於生後滅前開之曰生住異滅蓋言物之性相緣會則起緣離則止故知俗諦生死能總萬物交互也謝往也生必交互於死曰生死必交互於生曰死故當生時死在當死時生存方曰交互也人情不曉此理見生時曰死往見死時曰生往也寒暑迭遷此以寒暑言物之時以陰極曰寒陽極曰暑今寒暑者蓋言陰陽之生極也或分四時則春生夏長秋衰冬落今不言四時而云寒暑者蓋四時不出陰陽陰陽之極曰寒暑故以寒暑對上生死為句故易云一寒一暑是謂迭遷又上生死既含四相令寒暑亦含四時故言萬物之時不過寒暑為總或約三世十世或約心念剎那延促不定耳迭者遞互遷謂動去也以寒遞互於暑曰寒以暑遞互於寒曰暑既能遞互即知各存人不曉之當暑時曰寒遷當寒時謂暑去有物即上生死寒暑所總萬有之物流動水動曰流即上交謝迭遷人之常情人情執動常自如此此上明所治之執此下亦破斷見外道撥無因果故二據理申己解三一據理推意余則謂之不然謂者評論之詞論主自所謂萬物性相道理交而不謝迭而不遷何者自徵上下然之意者何也二引經標牒放光云八部般若之一數法軌持為義真妄染淨色心依正各具軌則住持通得此名即上物也無去來無動轉即不遷也謂生住生故無來死住死故無去中間寒暑少壯各住故無流動轉變矣或去來約時轉動約性相緣生性相三世各住故曰不遷若般若宗多蕩相顯空色心至乎種智皆曰清淨今借文標為證信不取彼意下自推釋可見者牒經也三推釋正理尋夫不動之作推窮曰尋夫即語詞不動者經云無去來動轉作者推求也尋究經中於諸法推求不動者也豈釋動以求靜先破錯解釋捨也必求靜於諸動此顯正意經中定當推靜向於羣動故令動中達性相各住必求靜於諸動故雖動而常靜上句牒前下句釋成自意經中既求靜於動故我於生死交謝寒暑迭遷而見常靜所以謂之不然也不釋動以求靜故雖靜而不離動亦先牒前下句釋成經旨雖靜者法無去來動轉不離遷謝而顯故曰不離動則所見即動而靜與經即靜而動相符三明情解相違文四初總標解惑然則承上連續之詞因推經旨故動靜未始異以經證於自意則同辨緣法生滅性相常靜故動靜不異而惑者不同惑者生時不見死乃執生靜而死動等故動靜不同緣使真言滯於競辨真言者稱實之言也競辨者諍言也惑者執異與不異稱實之言相違故有諍言使真言成滯礙也宗途途者道也動靜不異之道為學者之所宗故屈於好異屈抑也惑者好異而強説故使宗途為邪解之屈抑二示理難言所以靜躁之極未易言也躁動也物之動靜理極於不二惑者執二而強諍故不可率易而言三推釋其意何者推難言之意夫談真則逆俗順俗則違真稱實言則逆世俗順俗見則違實理故未易言也違真故迷性而莫返出違真過也人情長迷於物理順之則不能返悟也逆俗故言淡而無味出逆俗過也淡即無味談真逆俗俗見不曉無義味可采故云言淡道經云樂與餌過客止道之出口淡乎無味四躡前起後緣使解人説動靜理同惑者執動靜有異乃為中人之惑緣也中人未分於存亡中根可語上亦可以語下故未能分辨解惑邪正為當存同亡異為復存異亡同下論正被此機上士已知動靜不異故下士撫掌而弗顧即前惑者也堅執不回弗顧正理撫掌者大笑之貌也道經曰不笑不足以為道矣此上二句語出道德經文小改耳近而不可知者物理近於人而不可以執動靜者所知者下云其唯物性乎唯獨也獨有萬物緣生之性動中常靜靜不妨動此理最近而人不知此即前三義中是約性一門華嚴大疏談不遷有三義一能依不遷即今約性相義二依所依不遷三唯所依不遷即涅槃論明真性隨緣常住不變義四顯立論之意然躡上生起之詞理極難言故當杜默然為中人不知物性如此故下云不能自已已止也聊復寄心於動靜之際聊略也際邊畔也動以靜為際故即動以見靜靜以動為際故即靜以見動略寄解心如此故乃言之也豈曰必然試論之曰必者決定也試且也豈謂決定如然且以此解心評論之耳二正論文三初正顯不遷次會釋教意三因果結益然萬物常與無常理本不二雖緣生緣滅剎那代謝而生滅各位聚散異時世之人情弗能諦審覩暫有則執住見忽滅則執遷此二皆自縛於斷常耳然而執住則易覺滯遷則難回由執遷故不知俗諦門中生滅性相各得自位善惡因果始終不差故先顯不遷正理次會釋常無常二教同致後以因果結令知益此論之意不過此三故今易古之六科但分三段耳今初文三初引教定宗文二初引經論道行云小品一數也諸法物也即色受想行識曰五蘊六根六境曰十二處更加六識即十八界世間法不過此之三科又略而言不出色心為總又菩提涅槃是出世法今並該之故云諸法本無所從來去亦無所至不遷也本者來之所起處至者去之所到處由諸法性相時分各住本位未嘗有從本而來去至彼所所謂本不見從凡中而來去至聖所又亦不見本從生死煩惱中來至菩提涅槃處故何也聖凡染淨各不相到故世出世法各住本位故餘可例知華嚴亦云各各不相知諸法亦如是若據般若本部多明無相真宗直顯萬法本空無來去相今借文標宗用意則別下定宗中可見中觀即中觀論今引之釋成經意云觀方知彼去觀則見也方通十方且舉東方例之彼者泛指彼人也我觀東方知彼一人從此而去去者不至方者即人也去東之人前步在前後步在後故不見從此至彼方之相故曰去亦無所至反知從東方來此方亦步步各住故曰本無所從來東方既爾餘九亦然人既即動而靜以例諸法遷而不遷故引中觀釋成道行以立不遷宗旨也次定宗旨斯皆即動而求靜以知物不遷明矣斯此也皆同也此上經論同即動而推靜用此證知緣生物理性相不遷義已明矣三量之申此約聖教量二破惑顯理文二初解惑對辨又二初境同見異夫人之所謂動者牒上有物流動人之常情以昔物不至今如以死交互於生則生為昔物死為今物故生不至今也故曰動而非靜惑者見死時無生謂生已謝故執動而非靜我之所謂靜者牒上余則謂不然也亦以昔物不至今同上也故曰靜而非動論主所解生為昔物在昔死為今物在今故昔不至今曰靜而非動也以生交死及寒暑等例上可知動而非靜以其不來惑者執動為見昔不來今故靜而非動以其不去論主見靜已知昔物住昔而不去此即前序中解惑耳二逆順結責然則所造未嘗異造詣也同見昔物不至今則所詣之境不異所見未嘗同解惑所見靜動不同逆之所謂塞順之所謂通逆理執動所謂塞滯之人順理見靜所謂通解之者古人多約論主説逆順通塞量無此理苟得其道復何滯哉苟若也道物理也若得物理無動而非靜豈有動之可惑滯也二遣惑顯理五初嗟迷執傷夫人情之惑久矣人被情執所惑從來不覺故可傷之目對真而莫覺真者即昔物不至今也雖見而執動故目對而莫覺也二陳迷情既知往物而不來牒前昔物不至今往昔也而謂今物而可往即前執動而非靜也往去也既執昔物不至今為動必當謂今物亦可遷往矣此乃情惑也三顯正理文四一標往昔也物既不來今物何所往去也惑者雖知昔物不來而不知今物不去若知今物在今而不去亦了昔物在昔而不去即不遷顯矣則古住古而今住今今古各不相往來二推何則徵上二句三釋文二初釋上句求向物於向於向未嘗無向昔也求昔物於昔時昔時定有故知昔住昔位責向物於今於今未嘗有推責昔物於今時今時不見昔於今未嘗有以明物不來明知昔物不至今也於向未嘗無故知物不去昔時見昔故知不遷去何以惑之而謂動而非靜耶此上釋成古無來去義次釋下句覆而求今今亦不往去也反覆更推今物即知今物在今而不去非唯不去於古昔亦知不向於未來故非動矣此上釋成今無來云義但變上文以向曰今今曰向來曰去去曰來讀之可見如人有老少少住昔而老住今人多惑之當老年衰朽不見盛乃謂少事已遷去殊不思當少之年膚腠潤澤故知在昔矣何於今而求之已自迷倒況求之不得乃謂遷去故知甚惑達物理者了今古各住無毫髮可易四結成是謂昔物自在昔不從今以至昔今物自在今不從昔以至今可見四引儒文二初正引故仲尼曰回也見新交臂非故文出莊子外篇田子方章云孔子謂顏回曰吾終身與汝交一臂而失之可不哀歟郭注云夫變化不可執而留也故雖執臂相守而不能令停康師疏曰郭注不當謂交臂之頃已失前人非謂交臂執手不能令停今取康師釋交臂此如兩臂相交秪此少頃之時已見新失於故若以論中次文指此以明新故各住之義而未知仲尼本意若何孔子若語不遷何必哀傷其事若謂吾汝終身同交臂之頃爾則郭注所謂變化不能令停亦甚得旨也今論中文有小改但取儒釋相符之義非謂彼彼也言見新者即前今物自在今非故者即前昔物自在昔秖少頃時今昔尚各住一世况日月年劫耶二結成如此則物不相往來明矣牒上仲尼所説則新故各住物無來往義已明矣五責情既無往返之微朕有何物而可動乎往返者去來也微朕者小迹也推諸法性相時分求去來之迹無毫末可得未知惑者有何物而可曰動而非靜乎自破題入序至此破執動之見已訖三舉事結顯然則旋嵐偃嶽而常靜自開章已下盡顯萬物不遷故今牒而結之旋嵐者亦云毗藍華嚴音義云正梵語云吠藍婆此云散所至即風名此風所至無不散壞又翻云不遲義翻為迅猛風偃息也嶽山也偃息山嶽即風之散壞也康云偃者仆倒亦取壞義舉迅猛之風偃息羣嶽無所不壞而風畢竟非山山畢竟非風既不相是亦不相到故曰常靜故知風山性相各有所住雖飄鼓迅猛而常靜矣下三句例知江河競注而不流水雖奔競前波後波各不相到故不流又畢竟不能易於濕性故不流動也野馬飄鼓而不動莊子云野馬也郭注云遊氣以三陽之月日氣鬱盛則見遊氣飄鼓歙歙然而前後各位故無所動日月歷天而不周歷涉也天輪左轉日月右旋時分各住故歷涉天輪不見有周匝之相復何怪哉怪者異也即動而靜四皆不遷何有動相可怪異也次會釋教意者佛教俗諦有二門一常門安立義二無常門推破義常門破斷無常門破常此二教同出而異陳雖教不並立而執須並除理須同會前論主即動以説靜使靜不異動則令二教相即顯不二理恐行者不曉斯旨乃假外賓引佛無常教義質之意令動靜不二之旨與佛教常無常不二之理無殊矣文二初引教詰難二初人法雙標二一約教理立難噫傷不平之聲教理相違故聖人聖通也孔子對哀公曰聖人者智通乎大道應變而不窮也今此方釋宗皆指佛為聖人蓋就應迹人倫窮達理事無所不通故曰聖人佛德難思且就正遍知義釋之耳有言曰人命逝速速於川流文引涅槃經云人命不停過於山水今小易其語言命者不相應行中一法曰命根即第八賴耶識體是受生總報主來為最先去為最後此識體上有連持計屬一報色心之功曰命根乍生乍滅不停如川水疾流此則説無常教詮無常理也二約行果定難是以聲聞悟非常以成道難者恐雖有教理未必可信故以行果成立教理決定也聲聞者聞聲教證道之人也成道者證偏真性也聖人説無常教聲聞聞之悟苦集滅道現在無常破煩惱障滅我執心證我空真理故八輩聖人通號聲聞緣覺覺緣離平以即真梵語辟支迦羅此云獨覺亦云緣覺獨覺人自悟緣覺者稟教今取緣覺也緣是所覺境即三世十二因緣覺是能了智即生空觀由聞無常教故覺三世萬法緣聚暫有緣離本空故云即真雖根利勝於聲聞破執障證我空偏真理不別二牒前正難苟萬動而非化牒前也豈尋化以階道非化者不遷也階道者次第證道故且萬物不遷無常教理則虗設豈有二乘尋此變化教理次第得聖道耶二乘既得道方知無常教理非虗將恐論主所説不遷教理未可取信二就理釋通二初歎無常教理幽深覆尋聖言三思曰覆尋聖言即前無常教也微隱難測歎俗諦不二理難測也微謂微妙事法不可以常無常定相思議隱謂隱密不二之義潛密在於教下故難可以言教測度若動而靜似去而留據上説教詮事則似云動去在物理則動而常靜去而常留乃聖人不二之本旨上句明立教下句明詮事故有重句也可以神會難以事求神解必可契會事相固難推求二明常無常幽深教理文三初明教異意同二一就本教顯異同三初明執殊教異二初明異是以言去不必去間人之常想間防也人心起常見聖教説諸法無常以防禦之非謂定無常稱住不必住釋人之所謂往耳釋解也人執無常遷往聖教説萬物常住因果決定以解之令捨所執非謂定常二責異豈曰去而可遣住而可留耶可定也去住二教為破斷常二執二執若除教不定立故知教雖異而意同歸也二證成教異意同故成具云成具光明定意經也菩薩梵語具云菩提薩埵此云覺有情三義釋之如金剛疏處計常之中而演非常之教證上言去不必去間人之常想摩訶衍論云諸法不動無去來處證上稱住不必住釋人之所謂往此上證教異下顯意同斯皆導達羣方群者不一也方法也經論法門不一皆為導達執情故兩言常門説住無常門説去一會常無常理一以會之何也且萬法雖生滅不停而生滅各位雖不失本位而起滅何常既動靜不殊則理本自一蓋俗諦不二之旨縱隨機各陳理無殊致即聖人之深旨微隱難測也豈曰文殊而乖其致哉不可以常無常教異而謂不二之理有殊故知物不遷之談足以盡聖人俗諦教意也三述成不二是以言常而不住稱去而不遷言常稱去是兩言為對二執常即不住去即不遷是動靜理一也不遷故牒上下句雖往而常靜即動以見靜也如於生死中見生不到死生死各住例諸法亦然不住故牒上上句雖靜而常往即靜以見動雖死生各住而生死不停此下二句但翻覆文異語意是同雖靜而常往故牒上即靜而動往而弗遷以顯動而常靜雖往而常靜故靜而弗留矣但反上準之前是以靜為首靜即動動即靜今是以動為首動即靜靜即動以顯兩言一會矣二寄外教顯異同文二初舉此方儒道説動以顯靜然則牒上動靜不二宗也莊生之所以藏山莊子內篇太宗師章云夫藏舟於壑藏山於澤謂之固矣然而夜半有力者負之而走昧者不知也郭注云無力之力莫大於變化今取彼意山有鬱茂欲其不凋若藏之於陂澤者變化暗易豈能令停固昧者不知耳仲尼之所以臨川論語云子在川上曰逝者如斯夫不捨晝夜今亦借意仲尼以人事速變勸進學立德此二聖人大同佛教説無常破常而其教意必使捨一取一豈令即當而達無常耶斯皆感往者之難留豈曰排今而可往排推也可定也莊孔二教皆感歎遷往之事難以停留乃一向見動論主所見者豈謂推排今物定有遷往耶即動中見靜已顯上往而弗遷之意也二舉西土鄰人説常以顯無常文四一標正意是以觀聖人心者不同人之所見得也以前動靜不二之理而觀察佛聖人設教之心必當如是者則不可以人情所見而得其意二推常執何者推上人情所見下釋人則謂少壯同體少則幼年三十曰壯年同體者凡人謂少壯同是一身百齡一質齡年也百年處世亦一軀質徒知年往不覺形隨徒虗也虗知有少有壯年年遷往而不覺形隨年變衰盛體殊由不覺故而執同體一質此是滯常之情三引彼文是以梵志出家梵者具云梵摩此云清潔寂靜即淨也西土事天婆羅門此稱為淨志亦云淨行出家者即彼事天修遷之法十五入山以草果為衣食至三十歸家納妻生子令種族繼世至五十再入山永不歸故曰出家白首而歸有一梵志三十不歸人皆曰死白首之年而歸鄰人見之曰昔人尚存乎鄰近也五家曰鄰鄰居識者曰昔人梵志三十不歸謂死矣今尚存此乃鄰人執常也梵志曰吾猶昔人非昔人也猶尚也上句牒鄰人指吾尚為昔人下句語之曰少年昔人已謝我今年老故非昔人此乃梵志滯無常也鄰人皆愕然非其言也愕驚也鄰人堅執聞説非昔人也故驚愕不信其言故曰非其言也此上所引雖梵志執無常鄰人執常唯寄鄰人常見以顯無常故下結云四顯無常所謂有力者負之而趨昧者不覺此借莊子文結斥也鄰人雖執昔人尚存而不知莊子所謂無常有力者負之而走新新不住念念不停蓋鄰人昧者不覺此無常之理然則鄰人執常唯見昔梵志執無常唯見今若以今昔各住常即無常合此二見方為正理今但寄鄰人執常結顯無常即前云靜而弗留矣其斯之謂歟其是也斯此也謂則言也莊子云昧者不知今鄰人不知常中有無常正是此言也歟語助耳二顯教權意實前雖明教異意同恐未知其同異之旨故今示之令達權實也文五初雙標教意是以如來是應身如來説俗諦常無常教故因羣情群者不一即斷常二執故之所滯滯有無二境此上所治之病以為起教之因則方言以辨惑聖人立常無常方便之言辨柝其惑情即能治之藥乘莫二之真心照常無常理不二者曰真心乘運此心而設教故吐不一之殊教吐説也對二執説二教也乖教異而不可異理一者牒上同異其唯聖言乎唯獨佛教有此言異而意同二雙明權實故談真動中説靜曰談真有不遷之稱破執無常者撥喪因果之流也導俗俗見多保守生事故靜中説動以導接之有流動之説無常剎那不停古今代謝上顯教權下明意實雖復千途異唱會歸同致矣千者言其多數途道也雖因執設教説有多途若契會所歸之理必須動中見靜靜處見動故曰同致則知教權而意實也三責執教之情而徵文者徵執也前執文詰難之者聞不遷則謂昔物不至今前境同見異中以昔不至今論主曰靜而非動難者聞之乃謂是靜也聆流動者而謂今物可至昔聆聞也聞上人命逝速之動乃謂今物可去曰動此亦不離前文動而非靜之情耳難者既未達不二之旨故於昔物不至今見靜乃以今物可至昔為動並為情計故前責曰往物既不來今物何所往情既未破尚執動靜二教生難下責執動之見云既曰古今而欲遷之者何也既曰古則住古今則住今而執惑之者欲遷今為古者意之何也四遣無常之見謂前難者執無常教理行果詰難上既顯二教理同故今遣彼偏執也是以言往牒無常教不必往遣執也古今常存以其不動古今各存一世而不動故豈聞無常便謂定往或作往昔釋之意欲遣執常教之者但今正破執動設難之者故不從也稱去亦牒無常教也不必去遣執也謂不從今至古以其不來前之遣執令知古今各存此之遣執令達今不去古古不來今並就無常教中説此常理與前即動求靜教理相照故不來故不馳騁於古今馳騁者去來不息也不動故各性住於一世古住古今住今故各一世也五結成不二然則牒上教權有異意實為同羣籍殊文諸經説常無常百家異説諸論説去説住苟得其會豈殊文之能惑哉若契會常無常不二之旨則殊文豈能為惑也三重宗教意復顯不遷文四初宗教顯意是以牒上佛教對機有異理意是同人之所謂住我則言其去今人執常論主語之以無常此宗無常立教人之所謂去我則言其住人執無常論主語之以常此宗常立教然則去住雖殊對機教殊其致一也前句即常中説無常後句無常中説常故知全動見靜全靜見動故同致也非但後宗如此前動中求靜本意如斯二引證幽深故經云正言似反誰當信者正理之言説常無常似有相反未達不二之理者疑而不信者字是牒經古疏云此文出普曜經斯言有由矣斯言者不信之言也因由理不二而言二故不達者多不信矣三推釋動靜何者微上致一之義人則求古於今謂其不住凡人今時不見古物執古物遷而不住吾則求今於古知其不去論主古時不見今物知今物在今而不去今若至古古應有今古若至今今應有古反釋今而無古以知不來古住古而不來古而無今以知不去今住今而不去此上順釋也若古不至今今亦不至古事各性住於一世有何物而可去來事者今時事在今古時事在古四結示不遷然則牒上動靜不二四象風馳春夏秋冬曰四象四時遷變馳疾如風璿璣電卷尚書云在璿璣玉衡以齊七政璿即玉名璣衡皆王者正天文之器衡則橫於上璣則動於下並以玉為飾故曰璿璣玉衡七政謂日月五星璿璣下轉王者端視於玉衡寸穴則知其天文變動以審政事今借彼意唯取璿璣轉動若閃電之疾速故曰電卷古多謂璿璣是北斗之二名者恐非其説得意毫微雖速而不轉毫微者毛端至小也若於一毛端達性相時分各住本位則萬物皆曰不遷雖見四象璿璣速若風電之不停而位位各住即動而靜矣上因外人不知論主動中説靜故執無常教理行果致難已明權實同異會不二之旨不殊於佛教今即動顯靜結成令行人再照前不遷之旨定為俗諦所宗或曰若然者二乘道果孰是非耶答權則為是實則為非今此論廢權立實之教二乘道果正當所破謂彼偏滯無常教故若達動靜不二之理自然空有雙照捨權歸實並契中道故知前引二乘行果為難理不極成上明會釋教意竟大文第三因果結益者聖人立教必有所益既即動以顯靜已知俗諦理實如是今舉因果者令悟由因住古果亦住今故佛教説因成果定萬劫難逃豈謂萬法無常能逃因果不遷之益其在茲焉文二初就果推因文六初正明是以如來就佛舉果也然如來有二身全智歸理曰真身全理起智曰應身法相宗説佛有二身謂法報化報中有自報他報今他報合化為應身自報合法為真身真身寂滅本非因致縱假了因所顯定非生因所生俗諦門中未明此義今正就應身如來以果推因也應果身相地前地上所見多種廣如諸教所辨又此特就如來果上推因不遷者以顯此論宗在一乘無二無三故功業也明應果往因曰功始自十信初心中間四十一位所修十波羅蜜萬行之因俱名功業也流萬世水動曰流言萬世者萬舉多數世者時分也梵云劫波此云時分起信論明信心尚經十千劫況入住已來歷三阿僧祇其中所修功業今言萬世者蓋指遠因遷流至果已經多劫故也而常存果上知昔因在昔故曰常存道説文曰所行之謂道又道路也皆取可履踐義行人以智詣理所作皆真曰修道此則以修正行曰道道即因也通百劫而彌固彌久也昔日行道流通至果雖經多劫定知在昔故曰彌固二引喻成山假就於始簣論語云譬如為山雖覆一簣進吾往也假者籍也簣者土籠即取土之具既籍始簣之土疊之成山即簣土住初而不滅以喻昔日功業常存也修途託至於初步道經曰千里之行始於初步今云修途者長路也託依也欲行千里之途始託於初步至千里已則知初步在初而不滅以喻昔日道行彌固矣此以成山修途喻果顯簣土初步明因存既果籍因招則果成因在定矣三結成果以功業不可朽故也果決定也以喻況之果然決知如來昔日功業在昔不朽則因不遷矣功業不可朽故雖在昔而不化不化者不朽滅也不化故不遷不遷者不來今之果時也不遷故則湛然明矣水澄曰湛今顯因位不動故曰湛然明矣者義已現也四引證故經云三災彌綸而行業湛然三災者水火風也彌綸者充遍也劫壞時火至初禪水至二禪風至三禪三禪已下無不壞散唯行人道行功業湛然不動信其言也佛語可信故五徵釋何者徵也果上不見因何以知其不化不遷耶下釋果不俱因俱同也果在今而因在昔故不同時因因而果上因即因由下因是因行雖昔因今果而果籍因成故因因而果因不昔滅既籍因成果果時定知因不可滅故故上曰雖在昔而不化也果不俱因因不來今因果既不同時定知因住昔而不來今之果時故上曰不化故不遷也不滅不來則不遷之致明矣以果求因已知因中功業道行不滅去不遷來則在昔之理明矣六結責復何惑於去留踟躇於動靜之間者哉去留者即動靜也踟躇者進退不前之言物理在乎動靜不二之間何以疑惑而不進趣耶故今責之二舉事結顯此結通二一結當文二結一論然則承上所推因果今昔之事動靜不二故乾坤倒覆無謂不靜易云天尊地卑乾坤定矣天上覆而地下載今言倒覆者設若天載而地覆則乾坤尊卑不失陰陽本位故無不靜洪流滔天無謂其動洪流者大水也滔天者瀰漫也尚書云滔滔洪水方割以諸波各住自位故無所動苟能契神於即物斯不遠而可知矣若能心契神解即物會理則不二之理不遠中根之人可於此而知存亡矣第二不真空論顯即真者前明俗諦今辨即真顯真諦故有此論來然終實之教談真必先立俗言俗必藉於真説則空有兩陳理則真俗一貫二諦三諦或合或開教有多門理無殊致前是即真之俗今明即俗之真真俗不二顯第一義諦為般若所照所證之境故此一論望前則真俗互融為對望後則境智能所為對故次來也又凡人秪知萬物緣生生而復滅而不了生非真生滅非定滅生滅由緣緣從真起良由從緣萬物無一法而非真空不知此者強執有無為破此執故立此論於前五名中此真諦門以性空推緣會故即事顯法性真理已至於本無故知二論同時真俗不二即第一義諦故曰一義也但境智猶存未及涅槃圓寂之一義釋此分二初題目不真空論第二不真者非實也緣生故物性非實有緣起故物性非實無以此而推性非有無故曰不真也言空者寂也由事相不真以顯性本虗寂故此則不字是能破智真字是所破執乃即俗雙破有無也空字是所顯中道第一義諦也故中論云因緣所生法我説即是空不實有也亦名為假名不定無也亦名中道義空寂也又不了緣生者執有執無或起異見迷於至理今以不真雙破二執令即事契理理本自寂故曰不真空又前物不遷立俗即緣法不定無今明即真顯諸法不實有二論同時顯中道理理本寂滅真俗雙亡故曰空又物不遷論雙照有無位各住故不真二字雙遮有無緣不定故空之一字兩亦雙非契中道故不真之空能顯所顯故不真空之論能詮所詮故皆依主釋二論文中二初敘立意有三初明理深難悟分四初標宗顯妙夫至虗至極也虗寂也理本虗寂乃真極之虗故曰至虗即中道第一義諦理也且虗之一言泛通太虗及待實之虗今真理絶待離斷滅故曰至虗又至者到也推窮物理極到於寂滅故曰至虗故諸教指此為真際曰實際曰本源等皆以到於極故也無生不從前際生不向後際滅中間亦無住故淨名云本自不生今亦無滅是寂滅義又不從有生不從無生不即有無生不離有無生離四句絶百非理本如此故曰無生者牒上所宗之理也蓋是般若玄鑒之妙趣蓋是者指拄之辭也般若此翻智慧也鑒照也趣向也至虗無生是般若照鑒趣向之處般若為能鑒能趣至虗無生為所鑒所趣般若能鑒鑒而無鑒故曰玄鑒理為所趣趣而無趣故曰妙趣此標不真空論與後論理智為對也有物之宗極者也萬有為能宗至虗無生為所宗宗之至極故由真理隨緣有萬物故此標即俗之真真不離俗顯此論與前論理事為對也此上理智事三智為能照即事契理為所照一論大意不過於此二約智歎深二初逆敘智能自非聖明特達何能契神於有無之間哉自非何能者皆倒語也聖明特達者即般若是聖人之靈明有挺特通達之照用故神者不測也契不測之妙理即於萬物有無之間自非般若何有此能此顯至虗唯智所證非情所及即事契理須假於智二順明智用文二初明智體照用是以承上理由智悟故至人證極曰至果滿位極示迹人倫唯佛稱之今寄果人説智故標至人但能即事契真皆得至人之智用不可高推在聖自負己靈通神心於無窮窮所不能滯通者無擁也神心者三解中即靈照心也窮者推照也照而無照故曰無窮下論云智有窮幽之鑒而無知焉且至人不測靈照之心通達在於無照當照而不滯於照故曰窮所不能滯此上明智體下顯照用極耳目於視聽聲色所不能制者極耳在於聽聲極目在於視色而聲色無一可以制礙於耳目者何也下釋云豈不以其即萬物之自虗故物不能纍其神明者也纍者繫縛也萬物本虗故靈智照了無一物可以纍縛於智用故聲色不能制礙也此乃即體之用照即事之理故曰不真空也二釋照用之能是以聖人牒上聖智即事契理也乘真心而理順則無滯而不通乘真心者運無照之真智契無生之真理理智相符故曰理順理外無事故智無惑滯不通之處此釋上通神心於無窮義審一氣以觀化故所遇而順適審者諦察也一氣者語出道書以虗無之道曰一氣今借語指至虗中道為一氣也觀化者照萬物從緣而忽有也適者造詣也聖智了至虗而觀事則所遇之事皆順於理也釋上極耳目於視聽即萬物之自虗也無滯而不通故能混雜致淳覆釋理智義混雜淳者皆和同義致立也理智相順故智虗無照理虗無生故能混雜同虗立不二淳和之理此釋成上理智對顯體同故也所遇而順適故則觸物而一覆釋上理事義觸對也事皆順理則凡觸對物皆同一理此釋成理事對顯不二故三結事不真如此則牒上理事不二之義萬象雖殊而不能自異即事顯理也事雖萬殊皆由理異離理之外事不能自異也如水外無波波不能自異不能自異故知象非真象萬象無真實由全理隨緣而有故象非真象故則雖象而非象事不真而理全現故雖象而非象觀云如波相虗令水體露現故題云不真空理事不二是當論之本義四述前主後然則物我同根物理也我智也理智體同故曰同根結上理智對是非一氣是非者有無事法也事皆歸理故曰一氣此上二句述前也顯至虗無生為般若之玄鑒又為有物之宗極下明生後潛微幽隱殆非羣情之所盡理在事內曰潛不可思議曰微無形無相曰幽情解不及曰隱殆者且也即語詞此明真理潛微且非羣生情見可盡二敘異見迷宗文二初標興由故頃爾談論由理非情盡故也頃爾者向來也談論者指諸宗立論之者也至於虗宗每有不同於此虗宗各有不同之論夫以不同而適同有何物而可同哉此則總斥諸宗也以不同之見而皆欲造適於同理理本無異將何可同故但除異見不必求同下責云故衆論競作而性莫同焉由衆論競作遂令性義多途莫能同焉所謂多歧則亡羊矣二伸破立文二初推何則推上何謂衆論競作性莫同耶二釋文三初破心無義文二初敘計心無者康疏云破晉朝支慜度心無義欲敘而破故先標也無心於萬物萬物未嘗無彼謂但無心執於萬物故名即事契理非謂萬物是無二正破此得在於神靜失在於物虗且得心神澄靜未達萬物本虗存境有心心豈澄靜此是一家異見注云破支慜度心無義也二破即色義三初敘計即色者下注云破支道林即色義康疏云晉朝支道林立即色遊玄義此先標也明色不自色故雖色而非色也此語出林法師集妙觀章云也明者指彼所明也色不自色者彼明色法須待緣成不是自有之色雖有緣成之色色非實有故空故云雖色而非色彼欲明佛教説色即空即事顯理也二明解異夫言色者牒彼言色也但當色即色緣色果色皆是色也豈待色色而後為色哉豈待緣色合會成果色然後方為色耶三正結破此直語色不自色未領色之非色也直但也此師但説果色不自色達果色空未領解緣色亦空也注云破道林即色義也三破本無義四初敘情計本無者下注云破竺法汰本無義亦晉朝人先標也情尚於無多觸言以賓無尚好也賓伏也此師情見偏尚空無多觸對佛教談玄唯賓伏歸無以無為當此是論主敘彼情見也下出所見云故非有有即無非無無即無由彼見解偏錯故聞教云非有乃謂無於有故所以云非有聞教云非無乃謂無於無故所以云非無此則一向歸無也二示正義尋夫立文之本旨者論主究諸教立非有非無之文本旨所解不如此者字牒本旨也下出意示之云直以非有非真有但以言非有者萬物緣生非實有故非無非真無耳言非無者不壞緣相非實無故三責異見何必非有無此有非無無彼無何必者責詞也此彼者但指拄之言非謂分定彼此何必聞非有謂無於有聞非無謂無於無四斥謬計此直好無之談豈謂順通事實此師但是好尚歸無之談論豈是順通非有非無之言教即事契於中道實理下斥云即物之情哉捨有著無皆羣物之情執耳注云破竺法汰本無我也此上略明三家異見各執一端故使至宗無同異中熾然成異今為正理惑異故有論興亦因異立同耳理無同異何在言也故上云有何物而可同哉三述意謙陳三初敘名物不相到夫以物物於物則所物而可物以用也物物者物之名也於物者對物之相也用名對相所有之物必可名之也以物物非物故雖物而非物以物之名向於無物雖有物名定無物體如云兔角有名無體下明不相到是以物不即名而就實釋上所物而可物顯體不到名即者是也就實者得實名也物不是名故物上不得名之實詩云見人空解笑弄物不知名蓋物上無名如嬰兒得物而不能知名此顯物不到名名不即物而履真履真者到物實體也名不是物故名不能到物之真體如人言火不熱於口蓋名上無體也此顯名不到物二顯至理絶言思然則真諦獨靜於名教之外世之名物可言可見尚不相到況乎真諦非言思所及獨出於名教之外豈容言議故下云豈曰文言之能辨哉此二段之為論主既排諸宗異説未知正義理合如何故今泛敘世間名相尚不相到況出世深理無相無名非言可及下寄之於言詮者但欲令人解正知邪非謂虗宗言解可到三謙陳擬述意然不能杜默然者牒上理雖不可言而世多惑異故不能杜默絶言論也聊復厝言以擬之試論之曰復者重前立論故厝致也擬者未決之詞蓋謙云聊致其言擬議試且論之二正立論古科為六今為三段一通論諸法直顯即真二別指色心因緣推釋三推窮名實結責迷情然夫真理隨緣成諸事法凡夫不了執事迷真或生異見故今先顯即真統論諸法未知因何即理故次約因緣別指色心推釋色心既總萬法萬法不過因緣因緣故空空故即實若謂因緣本空何以名能召體體上立名故後推窮名體由執故生情執本無名體何有故此三科後則離遍計中則了依他初則證圓成文雖從深之淺義則以後釋前良由不達名體因緣焉了諸法真實今初三初引教標宗摩訶衍論摩訶云大衍者云乘云諸法俗諦事法不一故云諸亦非有相亦非無相亦者重又之語非唯至虗之理非有非無俗諦諸法亦非有無故又上云諸法即有無法也有而非有故云亦非有無而非無故云亦非無也然真非有無者有二義一無狀無名故非有體用真常故非無二不可以常見而取故非有亦不可以斷見而求故非無今俗諦諸法亦不有無者仗緣而生故非實有不壞緣相故非實無若了緣生非實有即知真本無名狀故不可以常見求若達緣相非實無即見真體具妙用故不可以斷見取今此正明俗諦有無不實次引中論以顯即真中論中觀論也云諸法不有不無者牒上俗諦諸法雙非有無故即真諦者第一真諦也此明真俗不二顯中道妙理絶諸對待不墮數量故云第一法鼓經云一亦不為一為破諸數故然相宗多明俗諦是有為則不過有無生滅真諦屬無為則非有無不生滅未了即俗是真絶待第一今此論所宗正為會權入實所以先推俗諦後顯真俗不二又真故不有俗故不無第一義諦雙非有無又俗諦諸法具三句一有二無二亦有無真諦當第四句非有無真俗相即則四句同時良以對俗之真豈越數量若達不二永絶對待故云第一此論所詮不過於此故標為義宗次推釋宗義二初明即俗之真文三初反覆推釋文三初牒前尋夫以上衍論言教為量研窮諸法因緣道理故云尋夫不有不無者正牒衍論也二反推豈謂滌除萬物豈謂者反責之辭滌除萬物者泯染淨名相之境也杜塞視聽杜塞視聽者絶耳目鑒照之心也寂寥虗豁然後為真諦者乎寂兮無聲寥兮無色牒上泯境也太虗豁爾無知無用牒上泯心也豈謂泯絶染淨心境諸法後為不有不無真諦之義非如此也三順釋誠以即物順通故物莫之逆誠實也論之實意即萬物順通不有不無因緣之理物不能逆於理也此推俗諦不有不無即偽即真故性莫之易偽假也真實也俗諦因緣故假真諦本性自實了因緣不有不無即真性不有無故不待易俗為真此推即俗之真真諦不有不無也性莫之易故雖無而有雖真空常寂而幻有宛然物莫之逆故雖有而無雖幻有森然而真空不隱雖有而無所謂非有幻有即真空真性湛寂故同一非有雖無而有所謂非無真空不礙有真性常住故同一非無此上明即俗之真不有不無之義已顯二就俗結顯如此則隨上所推非無物也不壞緣相故上云亦非無也物非真物緣生非真故上云亦非有也物非真物故於何而可物但由俗諦非真以觀萬物物何可有故前衍論即諸法不有不無以顯真諦之理也三引經證成故經云色之性空非色敗空秦譯淨名云喜見菩薩曰色色空為二色之性空非色滅空色性自空今引以證成也敗者滅也色性緣生故空非有也非待色滅見空故非無也下自釋經意云以明夫聖人之於物也以用也明證信也之向也用上經義證知聖人向對萬物之智也向之如何下云即萬物之自虗了緣生本自虗故亦非有也釋上色之性空豈待宰割以求通哉宰者治也制也皆取折伏為義割截也斷也皆去除義他宗所説多用比觀伏惑現觀斷惑故宰伏斷割惑妄方曰證真今實教即物顯理豈待如此也既非除物見真故亦非無也釋上非色敗空是以寢疾有不真之談寢疾者淨名示疾於毗耶離城獨寢一牀問疾品云衆生病非真非實有菩薩病示非真非實有良以衆生緣空病豈真實大悲示現豈真實哉超日有即虗之稱超日明三昧經云不保命四大虗稱者言也亦有即四大而見虗之言已上三經同證俗諦非實有無然則三藏殊文統之者一也結上引意也經律論曰三藏上雖略引二經三文以明緣性非實有無實則盡三藏之文凡言緣性皆同此理蓋以不有不無之理統三藏之文為一故也二明真俗不二文三初引經標異故放光云第一真諦無成無得此引放光釋上中論所明第一義諦真俗絶待以為第一今引放光經以第一真諦對俗而論者良由説則不過二諦為門第一真諦非言所及故前中論雖云第一真諦但就即俗明真以顯第一真諦故今重引經標欲推不二之深旨無成者成菩提也無得者得涅槃也理智二果真諦不立故此即真諦不有也世俗諦故便有成有得成正覺證真常俗諦之中二果顯然俗諦不無也二釋成不二夫有得即是無得之偽號有得意兼有成俗諦言有得真諦談無得俗無自體全真立俗故有得是真中之假號如即水之波波假也無得即是有得之真名真諦言無得是即俗之真真理自實故無得是即俗之真名如即波之水水真真名故雖真而非有偽號故雖偽而非無真定不有俗定不無是以言真未嘗有言偽未嘗無述上對俗之真故前論云諸法不有不無也二言未始一在言説為門不同故本不一二理未始殊真俗不二證之則木自不殊也不二之理即強名第一真諦也所以即俗之真絶諸對待故名第一也三引證不二故經云大品般若經真諦俗諦謂有異耶答曰無異也據門間異約理答不異此證上二理未始殊此經直辨真諦以明非有俗諦以明非無此經之言意可通二一則指前放光又可指上大品問異也豈以諦二而二於物哉物則理也諦門雖二理不可二也故經答曰無異也三述成正理四初述成然則承上之辭萬物俗諦事法果有其所以不有果決也推萬法緣性果決有不有之義有其所以不無緣性又亦果決有不無之理有其所以不有故雖有而非有幻有非實有有其所以不無故雖無而非無性空非實無雖無而非無無者不絶虗性空之無非斷絶太虗無也雖有而非有有者非真有緣會之有非謂真常有也若有不即真無不夷迹夷者平除也迹謂蹤迹有不常有故不有無不除迹故不無然則有無稱異其致一也説緣性有無則似異有即不有故無無即不無故有有無不二之理不殊不殊之理即第一義諦故曰不真空二引證故童子歎曰説法不有亦不無以因緣故諸法生淨名經寶積童子歎佛善説諸法由因緣生故性非有無也此則推緣會顯性空也瓔珞經云轉法輪者亦非有轉亦非無轉彼經云諸法如空故亦無有轉亦無無轉車輪有用轉之則運動摧輾聖人法門有用説之則破惑出塵故曰轉法輪者牒也説者受者及中間名句文義皆從如來大悲心及衆生善根緣上而起緣性皆空故非實有無也是謂轉無所轉結也俗諦云轉即俗之真則無所轉此乃衆經之微言也此即真之義乃為衆經言之微妙也微妙故不可以有無得矣三推釋何者推也謂物無耶則邪見非惑此先逆説無也邪見者正理之外起見偏滯斷滅物若定無邪見執無則非為迷惑謂物有耶則常見為得逆説有也常見者執諸法常住起見偏滯實有物若定有常見執有乃得正理下順顯非有無以物非無故邪見為惑以物非有故常見不得由萬物緣性定非有無非二見所了故執有無者迷惑正道也四結成然則非有非無者信真諦之談也既談真實諦理故不可以有無所議乃曰非有非無是謂言之微妙也二別開色心因緣推釋然古之科文多謂前約境此約心則令文義成局豈前諸法之言而不該於心此中物從因緣而不通於境今以總別分之者但開前諸法不過色心故引道行標心中觀標物復以因緣所以釋成其理前則文總義高此則文別義細然其大旨不殊前段耳亦分三初引教重標故道行云心俗諦緣生之心通凡聖皆靈照故亦不有亦不無重又曰亦非但第一義諦非有無俗諦緣生之心亦不有無故又有而不有無而不無故云亦也然夫真心本非有無不可以因緣推釋非今所明今正明俗諦聖凡緣生之心耳聖心者隨緣而有故不有感而常應故不無凡心者因境而有故不有對境則起故不無是知俗諦聖凡二心皆由緣故非實有無即顯真諦門中聖凡有無之心俱絶又即俗而真則聖凡不有即真而俗故聖凡不無真俗不二即顯第一義諦雙絶有無也中觀云物從因緣故不有緣起故不無引論推因緣以標不有無之所以然因緣之義佛教咸宗但隨事推求離因緣而成未之有也但親起者曰因助生者為緣如穀子為因水土人時為緣故得禾苗成穗聖人以大悲大願為因衆生善根為緣故有應化心生衆生以無明為因境界為緣故有取著心生若本覺為因師教為緣則有了悟心生故俗諦中凡聖迷悟若心若境皆由緣有故不真有緣起故不定無達此緣性了然即真真俗既融一理斯顯故今言物通心及境也二再推宗義五初敘意牒前尋理即其然矣究尋諸法由因緣故不有不無道理即當如此二推釋所以二一推釋不有文中各先逆後順今初也所以然者牒上尋理之所以也夫有若真有有自常有豈待緣而後有哉心境若實決定常有何待緣會而有譬彼真無無自常無豈待緣而後無真無有二一太虗斷滅實定常無二真心虗寂究竟凝然此二無雖藉緣顯不假緣成今引此實無以喻緣有之不實有也此上法喻逆説下順明不有若有不能自有待緣而後有者故知有非真有假待於緣定非實有義甚可見有非真有雖有不可謂之有矣結心境有而不有之義故上曰物從因緣故不有二推釋不無不無者牒上緣起故不無夫無則湛然不動可謂之無湛然者水澄停貌也動者改轉義心境若定無則澄湛凝然更不改轉其猶太虗永無移易可以謂之無也萬物若無則不應起萬物者心境也應當也若決定無者不當從緣而起也此上逆推向下順顯起則非無心則違緣起瞋順緣起貪迷緣起癡乃至善友緣則起善惡友緣則起惡非無心也境則各各從緣和合而有故非無境又心境互為緣起故非無以明緣起故不無也結無而不無義故上云緣起故不無也三引大論證故摩訶衍論云此下有四句前二句明緣生故有緣假故無後二句即無顯不無即有明不有引證前文大意如此一切諸法一切因緣故應有從緣而生緣會應有即假有也一切諸法一切因緣故不應有既由緣有故不實有即空無也此上二句推求因緣法幻有空無也一切無法一切因緣故應有緣假之無不壞性相常有故前云以明緣起故不無等此即就次句言無以明不無也一切有法一切因緣故不應有緣生之有本非實有故前云雖有不可謂之有等此即就初句言有以明不有四反覆釋成尋此有無之言豈直反論而已哉恐謂大論但將有遣無將無遣有秪破二邊非別有理故特釋之言尋此有無之言者前初句説有末句説無第二句説無第三説有今推尋之非謂但欲反其議論有無互破而已若應有法若定有即是有大論秖説第一句應有不應言無不當説第四句不應有也若應無法若定無即是無大論秖説第二句不應有不應言有不當説第三句應有此上逆説下順明言有是為平呼作也假有以明非無第三句言有是假作此説欲以明第二句中無非斷無故借無以辨非有第四句借無之言以辨初句中有非實有故知因緣心境有非實有無非斷無大論故立四句也五總結玄旨此事一一切事法以四句不二一義貫之皆中道也稱二有不有無不無其文有似不同四句異而意不異故云似不同苟領其所同則無異而不同若知萬法皆同緣性則無有殊異而不同歸一理也中論云因緣所生法我説即是空亦謂是假名亦名中道義則空假中三不離因緣為門故無異而不同也三復述正理三初正述然則承上所推宗義道理萬法心境下一果有其所以不有不可得而有果然由因緣有而不實有欲謂之有必無此理定不可得有其所以不無不可得而無但翻上也緣起性相欲謂之無理亦不可得此中但明因緣故不有無即真之義已在前段比校前文意多如此故知前則意高此則意細耳二推釋何則推上不可得而有無欲言其有有非真生仗因緣故非真也欲言其無事象既形既形者已現也緣起則心境事象已現也象形不即無無而不無非真非實有有而不有三結成然則不真空義顯於茲矣由上推之則因緣性相不實有無有無雙寂之義顯於此也故題曰不真空然緣法不有無即顯性空義若有無雙寂即顯第一義諦乃法性實相之義但境智未亡故未及本無之義三推窮名實結責迷情者此文望前則後後釋於前前為不了前因緣即真義故執名著相遍計情濃故今推窮結責欲使即名體以達緣空方契真空文雖從深至淺欲令自淺之深以後釋成前文也文三初引經標義故放光云諸法假號不真俗諦諸法由住情見故有名有體情本虗妄故名號假立體不真實名之與體情有理無下舉喻譬如幻化人幻者不實而有結巾草以為兔馬仗物假術於實起虗蓋惑愚目耳化者無而忽有也人者所幻人也幻術化成男女則名相宛然妄情執法見有名體則以幻術喻妄情化人名相喻諸法名體也非無幻化人在幻術中無而忽有名相宛然衆生在迷諸法名體宛爾差殊幻化人非真人也若知人由幻術而有則名相全空若悟法因迷執而興則知名體虗假達因緣者即假以會真迷因緣者執名而著相引經立義正責迷情然此段經古科連上以為引證義亦可通今謂正顯名體不實理順後段故今科歸下文為下之標義於理甚便二正推名體四初名體互求夫以名求物物無當名之責以用也當是也用名推求於物而體上定無是名之真實若以物體是名者則一切物體皆同音聲文字此則用名求見體不實矣以物求名名無得物之功又用物推求於名名上定無得物之功用名中若得體一切火名皆須炎熱故知火名定不得火體此用體求見名號假也物無當名之實非物也因求物不是名則知物是妄執非實物也名無得物之功非名也又由名不是物則知名亦虗妄非實名也故圭山云色是虗名虗相無纖毫之體故即真空也二雙結同空是以名不當實實不當名名實無當萬物安在安何也俗諦萬物不過名體既不相是即知同空空故何在以是義故前明俗諦因緣即真良由諸法名體但離妄緣即如如矣三推立名因三初引文陳惑故中觀云物無彼此恐疑者云一切物皆可名召何謂名無得物之功耶故今引文釋之萬物體上本無虗名也名有千差且舉彼此一端為例釋之而人以此為此以彼為彼如東方有惑人以東為此以西為彼彼亦以此為彼以彼為此彼者西方人也却以東為彼西為此適此今曰彼適彼今曰此也此彼莫定乎一名而惑者懷必然之志由二人各執故此彼之名不定也在惑者所見而起必定之心則知名由執有也二結指惑情然則彼此初非有惑者初非無初者本來義彼此之名物上本來不有若以惑者所執則本來不無故知物上無名名不是物但由情惑假立虗名惑本自空名豈真實故上曰名無得物之功也三舉名結例既悟彼此之非有由上已達名空以為能例有何物而可有哉例知彼此之物體離執亦何有也故上云物無當名之實非物也以彼此名體轉例萬物云故知萬物非真體假假號名假久矣從來迷惑故執假名虗體久矣此結歸上放光宗義也四引文證成是以成具立強名之文彼云是法無所有強謂其名證上名假園林託指馬之況此借莊子意康疏云莊子曾為漆園吏故曰園林指馬之況者齊物篇云以指喻指之非指不若以非指喻指之非指以馬喻馬之非馬不若以非馬喻馬之非馬音義云指百體之一體馬萬物之一物則且各舉一以言之且夫是非彼此百體萬物一一有之莊子唯明齊物是則皆是非則皆非此蓋自然之理故天地一指萬物一馬今借之以況彼此是非之體皆由人執以證上體不真如此則深遠之言於何而不在結上所引經書皆顯名體不實此深遠言論何所不在三約證結顯三初舉人顯證是以聖人乘千化而不變履萬惑而常通通達名體即事證真故曰聖人也乘運也悲願身土雖運化千端即事之真而真常不變履踐也惑者癡昧之心心事不一故言萬惑聖人雖居處履踐於塵事而常通達於玄微淨名云若菩薩行於非道是謂通達佛道者牒上二句下釋所以以其即萬物之自虗即事而真物本自虗聖人證此故不假虗而虗物也破權小也不能即事而真者須假觀慧推析滅事證真二乘則灰滅身智方曰無餘權宗則斷盡實惑乃曰涅槃今正簡異故曰不假也二引證即真故經云甚奇世尊大品經空生歎佛也不動真際真理是萬法之源窮事見理乃為際畔故立強名曰真際不動者不離也為諸法立處真理為諸法建立之處非離真而立處立處即真也建立萬法之處即是真理故處千化而不變履萬惑而常通也上則即真而俗此則即俗而真聖人證此豈為名體所惑耶三雙結玄旨然則承上立處即真道遠乎哉觸事而真道者可履可向即所照之理曰道遠乎哉蓋言不遠也凡觸物皆真此結上理事不二聖遠乎哉體之即神聖者能證之人體者證也神者不測之智用也聖智亦不遠既即俗證真即不測之聖智也此結上人法不異又此結文通結歸前由至虗無生為有物之宗故觸事而真至虗無生為般若玄鑒之妙趣故體之即神又觸事而真故結前二論真俗不二故體之即神生後般若無知已上釋不真空論竟音切餌如至切膚府隔切腠倉奏切嵐力含切偃於蹇切鬱於屈切歙呼及切噫於其切愕五各切聆郎丁切騁丑領切璿似緣切璣居沂切閃式斂切簣其貴切壘力水切踟躇上直知切下直於切瀰莫爾切漫莫半切厝千故切摧在回切輾豬輦切穗釆音
